óximo). A distinção espacial/referencial é importante no NT."}, {"q": "O caso do pronome relativo é determinado por:", "opts": ["Seu antecedente", "Sua função na oração relativa", "O verbo principal", "O gênero do substantivo"], "c": 1, "ok": "Correto! O caso do relativo depende de sua função na oração relativa, não do antecedente.", "bad": "O caso do pronome relativo é determinado por sua função na oração relativa. O gênero/número concordam com o antecedente."}, {"q": "<span style='font-family:serif;font-size:16px;color:#2d6a4f'>τοῦτο</span> é o neutro de qual demonstrativo?", "opts": ["ἐκεῖνος", "αὐτός", "οὗτος", "ὅς"], "c": 2, "ok": "Correto! τοῦτο é o neutro nominativo/acusativo de οὗτος (este, esta, isto).", "bad": "τοῦτο é o neutro de οὗτος: oὗτος (m.), αὕτη (f.), τοῦτο (n.) = este, esta, isto."}, {"q": "Em João 3.16, <span style='font-family:serif;font-size:16px;color:#2d6a4f'>οὕτως</span> tem valor:", "opts": ["Temporal", "Qualitativo (a extensão/forma do amor)", "Negativo", "Condicional"], "c": 1, "ok": "Correto! οὕτως aqui indica a qualidade extraordinária do amor de Deus, não apenas que ele amou.", "bad": "Chamberlain destaca que οὕτως em Jo 3.16 tem valor qualitativo — aponta para a forma extraordinária do amor de Deus."}, {"q": "Os pronomes demonstrativos usam sempre a posição:", "opts": ["Atributiva (entre artigo e substantivo)", "Predicativa (fora do artigo)", "Adverbial", "Independente"], "c": 1, "ok": "Correto! Demonstrativos sempre ficam em posição predicativa — nunca entre artigo e substantivo.", "bad": "Demonstrativos sempre ficam em posição predicativa. Nunca ocorrem entre artigo e substantivo."}]}, "10": {"c": "<h3>O Imperfeito do Indicativo</h3>\n<p>O imperfeito expressa uma ação <strong>contínua ou repetida no passado</strong> — aspecto linear (───) no passado. É o tempo da narrativa vívida, do hábito passado e do processo inacabado.</p>\n<h3>Formação do Imperfeito</h3>\n<p>Fórmula: <strong>aumento ε + radical + desinências secundárias</strong></p>\n<p>O <strong>aumento</strong> é o prefixo <span class=\"lw gk\">ε-</span> que indica passado. Radicais que começam com vogal têm a vogal alongada (aumento interno).</p>\n<table><tr><th>Pessoa</th><th>Ativo sg.</th><th>Ativo pl.</th><th>Médio/Pass. sg.</th><th>Médio/Pass. pl.</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">ἔ-λυ-ον</span></td><td><span class=\"lw gk\">ἐ-λύ-ομεν</span></td><td><span class=\"lw gk\">ἐ-λυ-όμην</span></td><td><span class=\"lw gk\">ἐ-λυ-όμεθα</span></td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">ἔ-λυ-ες</span></td><td><span class=\"lw gk\">ἐ-λύ-ετε</span></td><td><span class=\"lw gk\">ἐ-λύ-ου</span></td><td><span class=\"lw gk\">ἐ-λύ-εσθε</span></td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">ἔ-λυ-ε(ν)</span></td><td><span class=\"lw gk\">ἔ-λυ-ον</span></td><td><span class=\"lw gk\">ἐ-λύ-ετο</span></td><td><span class=\"lw gk\">ἐ-λύ-οντο</span></td></tr></table>\n<div class=\"warn\">⚠️ Note que 1ª sg. e 3ª pl. do imperfeito ativo têm a mesma forma: ἔλυον. O contexto determina a pessoa.</div>\n<h3>Usos do Imperfeito</h3>\n<p><strong>1. Contínuo</strong> — ação em progresso no passado: \"ele estava ensinando\" (<span class=\"lw gk\">ἐδίδασκεν</span>)</p>\n<p><strong>2. Iterativo</strong> — ação repetida no passado: \"ele costumava ensinar\"</p>\n<p><strong>3. Incoativo</strong> — início de uma ação: \"ele começou a ensinar\"</p>\n<p><strong>4. Conativo</strong> — tentativa de ação: \"ele tentava ensinar (mas não conseguia)\"</p>\n<div class=\"tip\">💡 Dobson: \"O imperfeito é o tempo que pinta o pano de fundo da narrativa — enquanto o aoristo marca os eventos principais (pontuais), o imperfeito descreve o que estava acontecendo ao redor.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#457b9d\"></span> Dobson, Aprenda o Grego do NT</span></div>\n<h3>Verbos Depoentes</h3>\n<p>Verbos depoentes têm <strong>forma média ou passiva, mas sentido ativo</strong>. Não existe forma ativa para eles. Os mais importantes do NT: <span class=\"lw gk\">ἔρχομαι</span> (venho), <span class=\"lw gk\">γίνομαι</span> (torno-me), <span class=\"lw gk\">ἀποκρίνομαι</span> (respondo), <span class=\"lw gk\">πορεύομαι</span> (vou, parto).</p>\n<h3>Aumento dos Verbos com Prefixo</h3>\n<p>Em verbos compostos com preposição, o aumento vai entre a preposição e o radical: <span class=\"lw gk\">προσέρχομαι → προσ-ῆλθον</span> (não <span class=\"lw gk\">ἐπροσέρχομαι</span>).</p>\n<h3>Aplicação Exegética</h3>\n<p>Marcos 1.22: <span class=\"lw gk\">καὶ ἐξεπλήσσοντο ἐπὶ τῇ διδαχῇ αὐτοῦ· ἦν γὰρ διδάσκων αὐτοὺς ὡς ἐξουσίαν ἔχων</span>. O imperfeito <span class=\"lw gk\">ἐξεπλήσσοντο</span> (eles estavam se maravilhando) e <span class=\"lw gk\">ἦν διδάσκων</span> (estava ensinando) pintam o pano de fundo — a ação contínua que causava espanto. O estilo de Marcos usa imperativos com frequência para dar vivacidade.</p>", "q": [{"q": "O imperfeito grego expressa ação com que aspecto?", "opts": ["Pontual no passado", "Linear (contínua/repetida) no passado", "Resultante no passado", "Futura"], "c": 1, "ok": "Correto! O imperfeito tem aspecto linear no passado — ação contínua ou repetida.", "bad": "O imperfeito tem aspecto linear (───) no passado. Ação pontual no passado = aoristo; resultante = perfeito."}, {"q": "O sinal característico do imperfeito é:", "opts": ["Sigma (σ) entre radical e desinência", "Reduplicação", "Aumento (ε-) prefixado ao radical", "Sufixo -κ-"], "c": 2, "ok": "Correto! O aumento ε- prefixado ao radical é o sinal do imperfeito (e do aoristo do indicativo).", "bad": "O aumento ε- é o sinal do imperfeito. σ = futuro; reduplicação = perfeito; -κ- = perfeito ativo."}, {"q": "Como se traduz o imperfeito conativo?", "opts": ["Ele estava fazendo", "Ele costumava fazer", "Ele tentava fazer (sem êxito)", "Ele começou a fazer"], "c": 2, "ok": "Correto! O imperfeito conativo indica tentativa: 'ele tentava fazer, mas não conseguia'.", "bad": "O imperfeito conativo indica tentativa sem êxito. Contínuo = 'estava fazendo'; iterativo = 'costumava fazer'; incoativo = 'começou a fazer'."}, {"q": "O imperfeito de εἰμί na 3ª pessoa singular é:", "opts": ["εἰμί", "ἔστι", "ἦν", "ἐστί"], "c": 2, "ok": "Correto! ἦν é o imperfeito de εἰμί na 3ª sg. — 'era/estava'.", "bad": "ἦν é o imperfeito de εἰμί. É muito frequente no NT, especialmente nos evangelhos."}, {"q": "Um verbo depoente tem forma _____ mas sentido _____:", "opts": ["Ativa / passiva", "Passiva ou média / ativo", "Média / passiva", "Ativa / reflexivo"], "c": 1, "ok": "Correto! Verbos depoentes têm forma média/passiva mas sentido ativo — não existe forma ativa para eles.", "bad": "Depoentes têm forma média ou passiva com sentido ativo. Ex.: ἔρχομαι (forma média) = 'venho' (sentido ativo)."}, {"q": "Em Marcos, o imperfeito <span style='font-family:serif;font-size:16px;color:#2d6a4f'>ἐξεπλήσσοντο</span> indica que o espanto da multidão era:", "opts": ["Um evento único e pontual", "Uma reação contínua enquanto Jesus ensinava", "Um evento futuro", "Uma ação completada"], "c": 1, "ok": "Correto! O imperfeito indica ação contínua — eles continuavam se maravilhando enquanto Jesus ensinava.", "bad": "O imperfeito indica continuidade — eles estavam se maravilhando continuamente, não apenas uma vez."}, {"q": "Em verbos compostos (preposição + verbo), o aumento é colocado:", "opts": ["Antes da preposição", "Entre a preposição e o radical", "Depois do radical", "Não há aumento"], "c": 1, "ok": "Correto! O aumento vai entre a preposição e o radical: προσ-ῆλθον (não ἐπροσῆλθον).", "bad": "Em verbos compostos, o aumento vai entre a preposição e o radical verbal."}, {"q": "Qual destes é um verbo DEPOENTE?", "opts": ["λύω (desato)", "γράφω (escrevo)", "ἔρχομαι (venho)", "λέγω (digo)"], "c": 2, "ok": "Correto! ἔρχομαι é depoente — forma média, sentido ativo 'venho'. Não existe forma ativa ἔρχω.", "bad": "ἔρχομαι é depoente: forma média mas sentido ativo ('venho'). Os outros têm formas ativas normais."}]}, "11": {"c": "<h3>Introdução ao Aoristo</h3>\n<p>O aoristo é o tempo verbal mais frequente no NT depois do presente. Seu aspecto é <strong>pontual (●)</strong> — a ação é vista como um todo, sem detalhar duração ou repetição. Não é necessariamente \"passado\" — o aoristo expressa aspecto, não tempo (exceto no modo indicativo).</p>\n<div class=\"tip\">💡 Wallace explica: \"O aoristo descreve a ação como um evento, uma ocorrência — como uma foto instantânea, não um filme. Isso não diz nada sobre a duração real da ação.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#4a148c\"></span> Wallace, Sintaxe Exegética do NT</span></div>\n<h3>Diferença entre Imperfeito e Aoristo</h3>\n<table><tr><th>Aspecto</th><th>Imperfeito</th><th>Aoristo</th></tr>\n<tr><td>Tipo</td><td>Linear ───</td><td>Pontual ●</td></tr>\n<tr><td>Ideia</td><td>\"estava acontecendo\"</td><td>\"aconteceu\"</td></tr>\n<tr><td>Metáfora</td><td>Filme (processo)</td><td>Foto (evento)</td></tr>\n<tr><td>Uso narrativo</td><td>Pano de fundo</td><td>Evento principal</td></tr></table>\n<h3>O 2.º Aoristo</h3>\n<p>O 2.º aoristo usa um <strong>radical diferente</strong> do presente (como em português: \"ir\" → \"fui\"). As desinências são as mesmas do imperfeito, mas o radical muda. Tem aumento no indicativo.</p>\n<h4>Paradigma — λείπω (deixar) / 2º aor. ἔλιπον</h4>\n<table><tr><th>Pessoa</th><th>Indicativo</th><th>Subjuntivo</th></tr>\n<tr><td>1ª sg.</td><td><span class=\"lw gk\">ἔ-λιπ-ον</span></td><td><span class=\"lw gk\">λίπ-ω</span></td></tr>\n<tr><td>2ª sg.</td><td><span class=\"lw gk\">ἔ-λιπ-ες</span></td><td><span class=\"lw gk\">λίπ-ῃς</span></td></tr>\n<tr><td>3ª sg.</td><td><span class=\"lw gk\">ἔ-λιπ-ε(ν)</span></td><td><span class=\"lw gk\">λίπ-ῃ</span></td></tr>\n<tr><td>1ª pl.</td><td><span class=\"lw gk\">ἐ-λίπ-ομεν</span></td><td><span class=\"lw gk\">λίπ-ωμεν</span></td></tr>\n<tr><td>3ª pl.</td><td><span class=\"lw gk\">ἔ-λιπ-ον</span></td><td><span class=\"lw gk\">λίπ-ωσι(ν)</span></td></tr></table>\n<h3>Verbos com 2.º Aoristo Importantes</h3>\n<table><tr><th>Presente</th><th>Significado</th><th>2.º Aoristo (3ª sg.)</th></tr>\n<tr><td><span class=\"lw gk\">λέγω</span></td><td>dizer</td><td><span class=\"lw gk\">εἶπον/εἶπεν</span></td></tr>\n<tr><td><span class=\"lw gk\">ἔρχομαι</span></td><td>vir</td><td><span class=\"lw gk\">ἦλθον/ἦλθεν</span></td></tr>\n<tr><td><span class=\"lw gk\">ὁράω</span></td><td>ver</td><td><span class=\"lw gk\">εἶδον/εἶδεν</span></td></tr>\n<tr><td><span class=\"lw gk\">λαμβάνω</span></td><td>tomar</td><td><span class=\"lw gk\">ἔλαβον/ἔλαβεν</span></td></tr>\n<tr><td><span class=\"lw gk\">γινώσκω</span></td><td>conhecer</td><td><span class=\"lw gk\">ἔγνων/ἔγνω</span></td></tr>\n<tr><td><span class=\"lw gk\">βάλλω</span></td><td>lançar</td><td><span class=\"lw gk\">ἔβαλον/ἔβαλεν</span></td></tr>\n<tr><td><span class=\"lw gk\">ἄγω</span></td><td>conduzir</td><td><span class=\"lw gk\">ἤγαγον/ἤγαγεν</span></td></tr></table>\n<div class=\"warn\">⚠️ O 2.º aoristo tem as mesmas desinências do imperfeito. A diferença está no radical: λύ- (presente/imperfeito) vs. λιπ- (2.º aoristo). Além disso, o 2.º aoristo tem aumento.</div>\n<h3>Aplicação Exegética</h3>\n<p>João 1.14: <span class=\"lw gk\">Καὶ ὁ λόγος σὰρξ ἐγένετο</span> — \"E o Verbo SE FEZ carne.\" O verbo <span class=\"lw gk\">ἐγένετο</span> é 2.º aoristo de γίνομαι — um evento pontual, histórico e único. O aspecto aoristo é teologicamente crucial: a encarnação não foi um processo gradual, mas um evento definido na história.</p>", "q": [{"q": "O aspecto do aoristo é:", "opts": ["Linear (contínuo)", "Pontual (vê a ação como um todo)", "Resultante", "Iterativo"], "c": 1, "ok": "Correto! O aoristo tem aspecto pontual (●) — vê a ação como um evento, sem detalhar duração.", "bad": "O aoristo tem aspecto pontual (●). Linear = presente/imperfeito; resultante = perfeito."}, {"q": "A diferença entre imperfeito e 2.º aoristo nas desinências é:", "opts": ["As desinências são completamente diferentes", "São iguais, mas o radical muda no 2.º aoristo", "O imperfeito tem aumento e o aoristo não", "Não há diferença"], "c": 1, "ok": "Correto! O 2.º aoristo tem as mesmas desinências do imperfeito, mas usa um radical diferente.", "bad": "O 2.º aoristo usa as mesmas desinências do imperfeito, mas o radical muda. Ex.: λύ- (presente) → ἔλυον (imperfeito); λιπ- (2.º aoristo) → ἔλιπον."}, {"q": "O 2.º aoristo de <span style='font-family:serif;font-size:16px;color:#2d6a4f'>λέγω</span> (dizer) na 3ª pessoa singular é:", "opts": ["ἔλεγεν", "εἶπεν", "λέξει", "ἐλέγετο"], "c": 1, "ok": "Correto! εἶπεν é o 2.º aoristo de λέγω — radical completamente diferente.", "bad": "εἶπεν é o 2.º aoristo de λέγω. O radical muda de λεγ- para ειπ-. ἔλεγεν é o imperfeito."}, {"q": "Em João 1.14, ἐγένετο (se fez) é um aoristo indicando que a encarnação foi:", "opts": ["Um processo gradual e contínuo", "Um evento pontual e histórico definido", "Uma ação repetida", "Uma ação futura"], "c": 1, "ok": "Correto! O aspecto aoristo pontual indica que a encarnação foi um evento único e definido na história.", "bad": "O aoristo indica evento pontual — a encarnação foi um acontecimento histórico específico, não um processo gradual."}, {"q": "O 2.º aoristo de <span style='font-family:serif;font-size:16px;color:#2d6a4f'>ἔρχομαι</span> (vir) é:", "opts": ["ἐρχόμην", "ἤρχετο", "ἦλθεν", "ἐλεύσομαι"], "c": 2, "ok": "Correto! ἦλθεν é o 2.º aoristo de ἔρχομαι — um dos aoristos irregulares mais frequentes do NT.", "bad": "ἦλθεν é o 2.º aoristo de ἔρχομαι. ἐρχόμην = imperfeito; ἐλεύσομαι = futuro."}, {"q": "Na narrativa grega, o imperfeito é usado para:", "opts": ["Os eventos principais", "O pano de fundo da narrativa", "Eventos futuros", "Comandos"], "c": 1, "ok": "Correto! O imperfeito pinta o pano de fundo; o aoristo marca os eventos principais.", "bad": "O imperfeito é o 'pano de fundo' narrativo — descreve o que estava acontecendo. O aoristo marca os eventos principais."}, {"q": "O 2.º aoristo de <span style='font-family:serif;font-size:16px;color:#2d6a4f'>ὁράω</span> (ver) é:", "opts": ["ἑώρων", "εἶδεν", "ὄψεται", "ἑωράκειν"], "c": 1, "ok": "Correto! εἶδεν é o 2.º aoristo de ὁράω — radical completamente diferente.", "bad": "εἶδεν é o 2.º aoristo de ὁράω. ἑώρων = imperfeito; ὄψεται = futuro; ἑωράκειν = mais-que-perfeito."}, {"q": "O aoristo é chamado de 'tempo da fotografia' porque:", "opts": ["É muito rápido de conjugar", "Captura a ação como um evento único, não como processo", "É usado apenas para eventos únicos na história", "Sempre indica passado remoto"], "c": 1, "ok": "Correto! O aoristo 'fotografa' a ação — captura-a como um todo, sem detalhar duração ou processo.", "bad": "A metáfora da fotografia descreve o aspecto pontual: o aoristo captura a ação como um evento (foto), não como um processo (filme = imperfeito)."}]}, "12": {"c": "<h3>O 1.º Aoristo</h3>\n<p>Enquanto o 2.º aoristo usa um radical diferente, o 1.º aoristo mantém o radical do presente e acrescenta os sufixos <span class=\"lw gk\">-σα-</span> (ativo/médio) ou <span class=\"lw gk\">-θη-</span> (passivo). É a forma mais regular e frequente de aoristo no NT.</p>\n<h3>1.º Aoristo Ativo e Médio</h3>\n<p>Fórmula: <strong>aumento ε + radical + σα + desinências secundárias</strong></p>\n<table><tr><th>Pessoa</th><th>Ativo sg.</th><th>Ativo pl.</th><th>Médio sg.</th><th>Médio pl.</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">ἔ-λυ-σ-α</span></td><td><span class=\"lw gk\">ἐ-λύ-σ-αμεν</span></td><td><span class=\"lw gk\">ἐ-λυ-σ-άμην</span></td><td><span class=\"lw gk\">ἐ-λυ-σ-άμεθα</span></td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">ἔ-λυ-σ-ας</span></td><td><span class=\"lw gk\">ἐ-λύ-σ-ατε</span></td><td><span class=\"lw gk\">ἐ-λύ-σ-ω</span></td><td><span class=\"lw gk\">ἐ-λύ-σ-ασθε</span></td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">ἔ-λυ-σ-ε(ν)</span></td><td><span class=\"lw gk\">ἔ-λυ-σ-αν</span></td><td><span class=\"lw gk\">ἐ-λύ-σ-ατο</span><td><span class=\"lw gk\">ἐ-λύ-σ-αντο</span></td></tr></table>\n<h3>1.º Aoristo Passivo</h3>\n<p>O aoristo passivo usa o sufixo <span class=\"lw gk\">-θη-</span> com desinências ativas (exceto na 1ª sg. que termina em -ν):</p>\n<table><tr><th>Pessoa</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">ἐ-λύ-θη-ν</span></td><td><span class=\"lw gk\">ἐ-λύ-θη-μεν</span></td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">ἐ-λύ-θη-ς</span></td><td><span class=\"lw gk\">ἐ-λύ-θη-τε</span></td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">ἐ-λύ-θη</span></td><td><span class=\"lw gk\">ἐ-λύ-θη-σαν</span></td></tr></table>\n<h3>1.º Aoristo do Subjuntivo</h3>\n<table><tr><th>Pessoa</th><th>Ativo</th><th>Passivo</th></tr>\n<tr><td>1ª sg.</td><td><span class=\"lw gk\">λύσω</span></td><td><span class=\"lw gk\">λυθῶ</span></td></tr>\n<tr><td>2ª sg.</td><td><span class=\"lw gk\">λύσῃς</span></td><td><span class=\"lw gk\">λυθῇς</span></td></tr>\n<tr><td>3ª sg.</td><td><span class=\"lw gk\">λύσῃ</span></td><td><span class=\"lw gk\">λυθῇ</span></td></tr></table>\n<div class=\"tip\">💡 O aoristo do subjuntivo é muito usado em proibições (μή + aoristo subjuntivo) e em orações com ἵνα para indicar uma ação pontual de propósito: <span class=\"lw gk\">ἵνα σωθῶσιν</span> = \"para que sejam salvos\" (evento pontual).</div>\n<div class=\"warn\">⚠️ O 1.º aoristo indicativo da 1ª sg. ativa termina em -α (ἔλυσα), não em -ν. Esta é uma diferença importante em relação às outras desinências secundárias.</div>\n<h3>Mudanças Fonéticas no 1.º Aoristo</h3>\n<p>Radicais terminados em consoante oclusiva sofrem mudanças ao receber -σα:</p>\n<table><tr><th>Tipo</th><th>Presente</th><th>Aoristo</th></tr>\n<tr><td>Labial (π,β,φ)</td><td><span class=\"lw gk\">γράφω</span></td><td><span class=\"lw gk\">ἔγραψα</span></td></tr>\n<tr><td>Gutural (κ,γ,χ)</td><td><span class=\"lw gk\">διώκω</span></td><td><span class=\"lw gk\">ἐδίωξα</span></td></tr>\n<tr><td>Dental (τ,δ,θ)</td><td><span class=\"lw gk\">πείθω</span></td><td><span class=\"lw gk\">ἔπεισα</span></td></tr></table>\n<h3>Aplicação Exegética</h3>\n<p>João 3.16: <span class=\"lw gk\">οὕτως γὰρ ἠγάπησεν ὁ θεὸς τὸν κόσμον</span> — \"porque assim amou Deus o mundo\". O aoristo <span class=\"lw gk\">ἠγάπησεν</span> (1.º aoristo de ἀγαπάω com aumento η- porque o radical começa com vogal) expressa o amor de Deus como um evento pontual e histórico — a doação do Filho na cruz. O aspecto pontual não diminui o amor, mas o ancora na história concreta.</p>", "q": [{"q": "O sinal característico do 1.º aoristo ativo é:", "opts": ["Reduplicação", "-θη- entre radical e desinência", "-σα- entre radical e desinência", "Aumento interno"], "c": 2, "ok": "Correto! -σα- é o sufixo do 1.º aoristo ativo e médio.", "bad": "-σα- é o sufixo do 1.º aoristo ativo/médio. -θη- é do aoristo passivo; reduplicação = perfeito."}, {"q": "O 1.º aoristo de <span style='font-family:serif;font-size:16px;color:#2d6a4f'>γράφω</span> (escrever) é:", "opts": ["ἔγραφον", "ἔγραψα", "γέγραφα", "ἐγράφην"], "c": 1, "ok": "Correto! ἔγραψα — labial φ + σα = ψα. Esta é a mudança fonética de labiais.", "bad": "ἔγραψα é correto — φ + σ = ψ (mudança fonética de labial). ἔγραφον = imperfeito; γέγραφα = perfeito; ἐγράφην = aoristo passivo."}, {"q": "O aoristo passivo de λύω na 3ª sg. é:", "opts": ["ἐλύσατο", "ἐλύθη", "λυθείη", "λυθήσεται"], "c": 1, "ok": "Correto! ἐλύθη — aumento ε + radical λυ + sufixo θη + desinência zero (3ª sg.).", "bad": "ἐλύθη é o aoristo passivo (ele foi desatado). ἐλύσατο = aoristo médio; λυθείη = optativo passivo; λυθήσεται = futuro passivo."}, {"q": "Em João 3.16, ἠγάπησεν tem aumento η- porque:", "opts": ["É um verbo irregular", "O radical começa com vogal (α → η com aumento)", "É 2.º aoristo", "É imperfeito"], "c": 1, "ok": "Correto! Quando o radical começa com vogal, o aumento alonga essa vogal: α → η.", "bad": "O radical de ἀγαπάω começa com α. O aumento alonga a vogal inicial: α → η (ἠγάπησεν)."}, {"q": "μή + aoristo subjuntivo forma:", "opts": ["Oração de propósito", "Proibição de ação pontual", "Oração condicional", "Futuro negativo"], "c": 1, "ok": "Correto! μή + aoristo subjuntivo = proibição pontual: 'não faças isso'.", "bad": "μή + aoristo subjuntivo = proibição pontual. μή + presente imperativo = proibição de ação contínua."}, {"q": "Qual é a desinência especial da 1ª sg. do 1.º aoristo indicativo ativo?", "opts": ["-ν", "-(zero)", "-α", "-ω"], "c": 2, "ok": "Correto! A 1ª sg. do aoristo indicativo ativo termina em -α: ἔλυσα.", "bad": "A 1ª sg. do 1.º aoristo termina em -α (ἔλυσα), não em -ν como as outras desinências secundárias."}, {"q": "O 1.º aoristo de <span style='font-family:serif;font-size:16px;color:#2d6a4f'>πιστεύω</span> (crer) na 1ª sg. é:", "opts": ["ἐπίστευον", "ἐπίστευσα", "πεπίστευκα", "ἐπιστεύθην"], "c": 1, "ok": "Correto! ἐπίστευσα — aumento + radical + σα.", "bad": "ἐπίστευσα é o 1.º aoristo (eu cri). ἐπίστευον = imperfeito; πεπίστευκα = perfeito; ἐπιστεύθην = aoristo passivo."}, {"q": "O sinal do aoristo passivo é:", "opts": ["-σα-", "-θη-", "-κα-", "Reduplicação"], "c": 1, "ok": "Correto! -θη- é o sufixo distintivo do aoristo passivo em grego.", "bad": "-θη- é o sufixo do aoristo passivo. -σα- = aoristo ativo/médio; -κα- = perfeito ativo; reduplicação = perfeito."}]}, "13": {"c": "<h3>A Terceira Declinação</h3>\n<p>A 3ª declinação abrange substantivos com radical terminado em <strong>consoante</strong> ou <strong>vogal diferente de α/ο</strong>. O segredo está no <strong>genitivo singular</strong> — ele revela o radical verdadeiro.</p>\n<div class=\"tip\">💡 Regra de ouro: sempre aprenda os substantivos da 3ª declinação com o genitivo singular. Ex.: <span class=\"lw gk\">σάρξ, σαρκός</span> (carne) — o radical é σαρκ-.</div>\n<h3>Paradigma — σάρξ (carne, f.)</h3>\n<table><tr><th>Caso</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>Nom.</td><td><span class=\"lw gk\">σάρξ</span></td><td><span class=\"lw gk\">σάρκ-ες</span></td></tr>\n<tr><td>Gen.</td><td><span class=\"lw gk\">σαρκ-ός</span></td><td><span class=\"lw gk\">σαρκ-ῶν</span></td></tr>\n<tr><td>Dat.</td><td><span class=\"lw gk\">σαρκ-ί</span></td><td><span class=\"lw gk\">σαρξ-ί(ν)</span></td></tr>\n<tr><td>Acus.</td><td><span class=\"lw gk\">σάρκ-α</span></td><td><span class=\"lw gk\">σάρκ-ας</span></td></tr></table>\n<h3>Paradigma — πνεῦμα (espírito, n.) — neutros em -μα</h3>\n<table><tr><th>Caso</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>Nom./Acus.</td><td><span class=\"lw gk\">πνεῦμα</span></td><td><span class=\"lw gk\">πνεύματ-α</span></td></tr>\n<tr><td>Gen.</td><td><span class=\"lw gk\">πνεύματ-ος</span></td><td><span class=\"lw gk\">πνευμάτ-ων</span></td></tr>\n<tr><td>Dat.</td><td><span class=\"lw gk\">πνεύματ-ι</span></td><td><span class=\"lw gk\">πνεύμασι(ν)</span></td></tr></table>\n<h3>Paradigma — πατήρ (pai, m.) — radicais em -ρ</h3>\n<table><tr><th>Caso</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>Nom.</td><td><span class=\"lw gk\">πατήρ</span></td><td><span class=\"lw gk\">πατέρ-ες</span></td></tr>\n<tr><td>Gen.</td><td><span class=\"lw gk\">πατρ-ός</span></td><td><span class=\"lw gk\">πατέρ-ων</span></td></tr>\n<tr><td>Dat.</td><td><span class=\"lw gk\">πατρ-ί</span></td><td><span class=\"lw gk\">πατράσι(ν)</span></td></tr>\n<tr><td>Acus.</td><td><span class=\"lw gk\">πατέρ-α</span></td><td><span class=\"lw gk\">πατέρ-ας</span></td></tr></table>\n<h3>Outros Substantivos Importantes</h3>\n<table><tr><th>Nominativo</th><th>Genitivo</th><th>Tradução</th></tr>\n<tr><td><span class=\"lw gk\">αἰών</span></td><td><span class=\"lw gk\">αἰῶνος</span></td><td>era, século</td></tr>\n<tr><td><span class=\"lw gk\">ἀνήρ</span></td><td><span class=\"lw gk\">ἀνδρός</span></td><td>homem</td></tr>\n<tr><td><span class=\"lw gk\">γυνή</span></td><td><span class=\"lw gk\">γυναικός</span></td><td>mulher</td></tr>\n<tr><td><span class=\"lw gk\">χάρις</span></td><td><span class=\"lw gk\">χάριτος</span></td><td>graça</td></tr>\n<tr><td><span class=\"lw gk\">σῴζω</span></td><td></td><td>salvar</td></tr></table>\n<div class=\"warn\">⚠️ No dativo plural, muitas vezes ocorre assimilação: σαρξί (não σαρκί) — a consoante se adapta antes de ι.</div>\n<h3>Aplicação Exegética</h3>\n<p>João 4.24: <span class=\"lw gk\">Πνεῦμα ὁ θεός</span> — \"Deus é espírito.\" <span class=\"lw gk\">Πνεῦμα</span> está no nominativo da 3ª declinação, em posição predicativa (sem artigo), enfatizando a natureza de Deus. Wallace destaca que esta afirmação define a <em>essência</em>, não apenas uma característica. <span class=\"cit\"><span class=\"citd\" style=\"background:#4a148c\"></span> Wallace, Sintaxe Exegética</span></p>", "q": [{"q": "Como se identifica o radical de um substantivo da 3ª declinação?", "opts": ["Pelo nominativo singular", "Pelo acusativo plural", "Pelo genitivo singular", "Pelo dativo singular"], "c": 2, "ok": "Correto! O genitivo singular revela o radical verdadeiro da 3ª declinação.", "bad": "O genitivo singular revela o radical da 3ª declinação. Por isso aprende-se: σάρξ, σαρκός (radical = σαρκ-)."}, {"q": "O genitivo singular de <span style='font-family:serif;font-size:16px;color:#2d6a4f'>πνεῦμα</span> é:", "opts": ["πνεύματος", "πνεύμου", "πνεύματος", "πνευμάτων"], "c": 0, "ok": "Correto! πνεύματος — genitivo singular, revela o radical πνευματ-.", "bad": "πνεύματος é o genitivo singular de πνεῦμα. O radical é πνευματ-."}, {"q": "Os neutros da 3ª declinação em -μα têm nominativo e acusativo:", "opts": ["Diferentes", "Iguais", "Diferentes no plural", "O acusativo sempre tem -ν"], "c": 1, "ok": "Correto! Como em todas as declinações, nominativo e acusativo neutros são idênticos.", "bad": "Nominativo e acusativo neutros são sempre idênticos — regra válida para todas as declinações."}, {"q": "O genitivo singular de <span style='font-family:serif;font-size:16px;color:#2d6a4f'>πατήρ</span> (pai) é:", "opts": ["πατήρος", "πατρός", "πατέρου", "πατήρου"], "c": 1, "ok": "Correto! πατρός — com síncope (queda da vogal ε no radical).", "bad": "πατρός é correto. O radical perde o ε no genitivo/dativo singular: πατ(ε)ρ- → πατρ-."}, {"q": "Em João 4.24, Πνεῦμα ὁ θεός, πνεῦμα está em posição:", "opts": ["Atributiva", "Predicativa, enfatizando a essência de Deus", "Genitiva", "Adverbial"], "c": 1, "ok": "Correto! Posição predicativa sem artigo — enfatiza a natureza/essência de Deus.", "bad": "Predicativa sem artigo — destaca a qualidade essencial. 'Deus É espírito (por natureza)'."}, {"q": "Como se diz 'das mulheres' (genitivo plural) em grego?", "opts": ["γυναίκες", "γυναιξί", "γυναικῶν", "γυναίκας"], "c": 2, "ok": "Correto! γυναικῶν é o genitivo plural de γυνή.", "bad": "γυναικῶν é o genitivo plural. -ες = nominativo pl.; -ξί = dativo pl.; -ας = acusativo pl."}, {"q": "Qual a tradução de <span style='font-family:serif;font-size:16px;color:#2d6a4f'>χάρις, χάριτος</span>?", "opts": ["Fé", "Lei", "Graça", "Amor"], "c": 2, "ok": "Correto! χάρις = graça — uma das palavras mais importantes do NT (147 ocorrências).", "bad": "χάρις = graça. É uma das palavras centrais do vocabulário paulino."}, {"q": "No dativo plural da 3ª declinação, frequentemente ocorre:", "opts": ["Reduplicação", "Assimilação da consoante final do radical antes de ι", "Queda do radical", "Adição de -ου"], "c": 1, "ok": "Correto! Assimilação fonética: σαρκ- + ι → σαρξί.", "bad": "Assimilação: a consoante final do radical se adapta antes do -ι do dativo plural. Ex.: σαρκί → σαρξί."}]}, "14": {"c": "<h3>O Particípio Grego</h3>\n<p>O particípio é uma forma verbal que funciona como <strong>adjetivo ou advérbio</strong>. É um dos elementos mais ricos e frequentes do grego do NT — ocorre cerca de 6.000 vezes. Dobson diz: \"Dominar o particípio é dominar metade da gramática grega avançada.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#457b9d\"></span> Dobson, Aprenda o Grego do NT</span></p>\n<h3>Particípio Presente Ativo</h3>\n<p>Formado com o radical do presente + <strong>-ων, -ουσα, -ον</strong> (m., f., n.)</p>\n<table><tr><th>Caso</th><th>Masc.</th><th>Fem.</th><th>Neutro</th></tr>\n<tr><td>Nom. sg.</td><td><span class=\"lw gk\">λύ-ων</span></td><td><span class=\"lw gk\">λύ-ουσα</span></td><td><span class=\"lw gk\">λῦ-ον</span></td></tr>\n<tr><td>Gen. sg.</td><td><span class=\"lw gk\">λύ-οντος</span></td><td><span class=\"lw gk\">λυ-ούσης</span></td><td><span class=\"lw gk\">λύ-οντος</span></td></tr>\n<tr><td>Dat. sg.</td><td><span class=\"lw gk\">λύ-οντι</span></td><td><span class=\"lw gk\">λυ-ούσῃ</span></td><td><span class=\"lw gk\">λύ-οντι</span></td></tr>\n<tr><td>Acus. sg.</td><td><span class=\"lw gk\">λύ-οντα</span></td><td><span class=\"lw gk\">λύ-ουσαν</span></td><td><span class=\"lw gk\">λῦ-ον</span></td></tr>\n<tr><td>Nom. pl.</td><td><span class=\"lw gk\">λύ-οντες</span></td><td><span class=\"lw gk\">λύ-ουσαι</span></td><td><span class=\"lw gk\">λύ-οντα</span></td></tr></table>\n<h3>Particípio Presente Médio/Passivo</h3>\n<p>Sufixo: <strong>-όμενος, -ομένη, -όμενον</strong> — declinação regular 2-1-2.</p>\n<h3>Tempo Relativo do Particípio</h3>\n<p>O tempo do particípio é <strong>relativo ao verbo principal</strong>:</p>\n<p>• <strong>Presente</strong> = ação simultânea ao verbo principal</p>\n<p>• <strong>Aoristo</strong> = ação anterior ao verbo principal</p>\n<p>• <strong>Futuro</strong> = ação posterior ao verbo principal</p>\n<h3>Uso Adverbial (Circunstancial)</h3>\n<p>O particípio sem artigo funciona como advérbio, expressando circunstâncias como tempo, causa, condição, concessão ou modo:</p>\n<p><span class=\"lw gk\">ταῦτα λέγων ἀπῆλθεν</span> — \"<em>dizendo</em> estas coisas, ele foi embora\" (simultâneo)</p>\n<p><span class=\"lw gk\">ὁ πιστεύων εἰς ἐμὲ ζήσεται</span> — \"<em>o que crê</em> em mim viverá\" (substantivado)</p>\n<div class=\"tip\">💡 Chamberlain destaca que o particípio substantivado com artigo (ὁ πιστεύων = \"o que crê / aquele que crê\") é extremamente frequente no evangelho de João e define a identidade do crente pela ação contínua de crer. <span class=\"cit\"><span class=\"citd\" style=\"background:#6d4c41\"></span> Chamberlain, Gramática Exegética</span></div>\n<h3>Aplicação Exegética</h3>\n<p>João 3.36: <span class=\"lw gk\">ὁ πιστεύων εἰς τὸν υἱὸν ἔχει ζωὴν αἰώνιον</span> — \"o que crê no Filho tem vida eterna.\" <span class=\"lw gk\">πιστεύων</span> é particípio presente ativo substantivado — \"o que está crendo\" (ação contínua). O aspecto linear do presente particípio sugere que a posse da vida eterna está ligada a uma fé contínua e viva, não a uma decisão pontual no passado.</p>", "q": [{"q": "O particípio presente ativo masculino nominativo singular de λύω é:", "opts": ["λύοντος", "λύων", "λύοντα", "λύοντες"], "c": 1, "ok": "Correto! λύων é o particípio presente ativo masculino nominativo singular.", "bad": "λύων é o nominativo sg. masc. -οντος = genitivo; -οντα = acusativo; -οντες = nominativo plural."}, {"q": "O tempo do particípio em grego é:", "opts": ["Absoluto (indica quando a ação ocorreu)", "Relativo ao verbo principal da oração", "Sempre passado", "Sempre presente"], "c": 1, "ok": "Correto! O tempo do particípio é relativo — indica se a ação é simultânea, anterior ou posterior ao verbo principal.", "bad": "O tempo do particípio é relativo ao verbo principal, não absoluto."}, {"q": "O particípio presente indica ação _____ em relação ao verbo principal:", "opts": ["Anterior", "Simultânea", "Posterior", "Independente"], "c": 1, "ok": "Correto! O particípio presente indica ação simultânea ao verbo principal.", "bad": "Particípio presente = simultâneo; aoristo = anterior; futuro = posterior."}, {"q": "Em <span style='font-family:serif;font-size:16px;color:#2d6a4f'>ὁ πιστεύων</span> (o que crê), o particípio com artigo funciona como:", "opts": ["Adjetivo atributivo", "Substantivo (particípio substantivado)", "Advérbio", "Predicado"], "c": 1, "ok": "Correto! O particípio com artigo é substantivado — funciona como substantivo.", "bad": "Particípio com artigo = substantivado. Sem artigo = adverbial (circunstancial) ou adjetivo predicativo."}, {"q": "O particípio presente médio/passivo tem sufixo:", "opts": ["-ων, -ουσα, -ον", "-όμενος, -ομένη, -όμενον", "-θείς, -θεῖσα, -θέν", "-ώς, -υῖα, -ός"], "c": 1, "ok": "Correto! -όμενος, -ομένη, -όμενον é o sufixo do particípio presente médio/passivo.", "bad": "-όμενος, -ομένη, -όμενον é o sufixo do particípio presente médio/passivo. -ων/-ουσα/-ον = ativo; -θείς = aoristo passivo."}, {"q": "O uso do particípio presente em João 3.36 (ὁ πιστεύων) sugere:", "opts": ["Uma decisão de fé pontual no passado", "Fé contínua e viva (aspecto linear)", "Fé futura", "Fé passada já concluída"], "c": 1, "ok": "Correto! O aspecto linear do presente particípio indica fé contínua — não apenas uma decisão passada.", "bad": "O aspecto linear do presente particípio indica ação contínua — fé viva e em curso, não apenas pontual."}, {"q": "O particípio SEM artigo em posição adverbial expressa:", "opts": ["A identidade do sujeito", "Circunstâncias da ação principal (tempo, causa, condição...)", "A qualidade de um substantivo", "O objeto direto"], "c": 1, "ok": "Correto! O particípio adverbial (sem artigo) expressa circunstâncias como tempo, causa, concessão, modo.", "bad": "O particípio adverbial (sem artigo) expressa circunstâncias: 'dizendo estas coisas, ele foi'. Com artigo = substantivado."}, {"q": "Qual é o feminino nominativo plural do particípio presente ativo?", "opts": ["λύοντα", "λύουσαι", "λυόμεναι", "λύουσα"], "c": 1, "ok": "Correto! λύουσαι é o feminino nominativo plural do particípio presente ativo.", "bad": "λύουσαι é o feminino nominativo plural. -οντα = neutro pl.; -ουσα = fem. sg.; -όμεναι = médio/passivo fem. pl."}]}, "15": {"c": "<h3>O Particípio Aoristo</h3>\n<p>O particípio aoristo indica ação <strong>anterior</strong> ao verbo principal. Ativo usa sufixo <strong>-σας, -σασα, -σαν</strong>; passivo usa <strong>-θείς, -θεῖσα, -θέν</strong>.</p>\n<table><tr><th>Caso</th><th>Ativo masc.</th><th>Ativo fem.</th><th>Passivo masc.</th></tr>\n<tr><td>Nom. sg.</td><td><span class=\"lw gk\">λύ-σας</span></td><td><span class=\"lw gk\">λύ-σασα</span></td><td><span class=\"lw gk\">λυ-θείς</span></td></tr>\n<tr><td>Gen. sg.</td><td><span class=\"lw gk\">λύ-σαντος</span></td><td><span class=\"lw gk\">λυ-σάσης</span></td><td><span class=\"lw gk\">λυ-θέντος</span></td></tr>\n<tr><td>Dat. sg.</td><td><span class=\"lw gk\">λύ-σαντι</span></td><td><span class=\"lw gk\">λυ-σάσῃ</span></td><td><span class=\"lw gk\">λυ-θέντι</span></td></tr>\n<tr><td>Acus. sg.</td><td><span class=\"lw gk\">λύ-σαντα</span></td><td><span class=\"lw gk\">λύ-σασαν</span></td><td><span class=\"lw gk\">λυ-θέντα</span></td></tr></table>\n<div class=\"warn\">⚠️ O particípio aoristo NÃO tem aumento — o aumento é marca exclusiva do modo indicativo.</div>\n<h3>O Genitivo Absoluto</h3>\n<p>Quando o particípio tem sujeito <strong>diferente</strong> do sujeito da oração principal, usa-se o <strong>genitivo absoluto</strong> — particípio e seu sujeito ficam ambos no genitivo:</p>\n<p><span class=\"lw gk\">ταῦτα δὲ αὐτοῦ εἰπόντος</span> — \"tendo dito ele estas coisas\" (lit. \"tendo dito estas coisas, <em>sendo ele o sujeito</em>\")</p>\n<div class=\"tip\">💡 Wallace observa que o genitivo absoluto é especialmente frequente em Lucas e Atos, refletindo um estilo grego mais clássico. É um dos recursos estilísticos que diferencia Lucas dos outros evangelistas. <span class=\"cit\"><span class=\"citd\" style=\"background:#4a148c\"></span> Wallace, Sintaxe Exegética</span></div>\n<h3>Particípio Adjetivo</h3>\n<p>O particípio com artigo pode funcionar como adjetivo atributivo:</p>\n<p><span class=\"lw gk\">ὁ πιστεύσας ἄνθρωπος</span> — \"o homem que crê/que creu\"</p>\n<h3>Aplicação Exegética</h3>\n<p>Marcos 2.17: <span class=\"lw gk\">ἀκούσας δὲ ὁ Ἰησοῦς λέγει αὐτοῖς</span> — \"tendo ouvido, Jesus diz-lhes.\" O particípio aoristo <span class=\"lw gk\">ἀκούσας</span> indica ação anterior ao verbo principal λέγει (presente histórico). A sequência temporal é clara: primeiro Jesus ouviu (aoristo = ação anterior, completa), depois falou (presente).</p>", "q": [{"q": "O particípio aoristo ativo masculino nominativo singular termina em:", "opts": ["-ων", "-σας", "-κώς", "-θείς"], "c": 1, "ok": "Correto! -σας é o sufixo do particípio aoristo ativo masculino nominativo singular.", "bad": "-σας é o aoristo ativo nom. sg. masc. -ων = presente ativo; -κώς = perfeito ativo; -θείς = aoristo passivo."}, {"q": "O particípio aoristo indica ação _____ em relação ao verbo principal:", "opts": ["Simultânea", "Posterior", "Anterior", "Independente"], "c": 2, "ok": "Correto! O particípio aoristo indica ação anterior (já concluída) em relação ao verbo principal.", "bad": "Particípio aoristo = anterior ao verbo principal. Presente = simultâneo; futuro = posterior."}, {"q": "O genitivo absoluto é usado quando:", "opts": ["O particípio tem o mesmo sujeito do verbo principal", "O particípio tem sujeito DIFERENTE do verbo principal", "O particípio está no acusativo", "O particípio é passivo"], "c": 1, "ok": "Correto! O genitivo absoluto ocorre quando o particípio tem sujeito diferente do verbo principal.", "bad": "O genitivo absoluto ocorre com sujeito diferente do verbo principal — ambos (sujeito e particípio) ficam no genitivo."}, {"q": "O particípio aoristo TEM aumento?", "opts": ["Sim, sempre", "Não — o aumento é exclusivo do modo indicativo", "Sim, mas apenas no passivo", "Depende do verbo"], "c": 1, "ok": "Correto! O particípio aoristo não tem aumento — este é exclusivo do modo indicativo.", "bad": "O particípio aoristo não tem aumento. O aumento é uma marca exclusiva do modo indicativo."}, {"q": "O sufixo do particípio aoristo passivo masculino é:", "opts": ["-σας", "-ων", "-θείς", "-κώς"], "c": 2, "ok": "Correto! -θείς é o sufixo do particípio aoristo passivo masculino nominativo.", "bad": "-θείς é o aoristo passivo. -σας = aoristo ativo; -ων = presente ativo; -κώς = perfeito ativo."}, {"q": "Em Marcos 2.17, ἀκούσας (tendo ouvido) indica que Jesus ouviu:", "opts": ["Ao mesmo tempo em que falou", "Depois de falar", "Antes de falar", "Em momento não relacionado"], "c": 2, "ok": "Correto! Particípio aoristo = ação anterior. Jesus ouviu primeiro, depois falou.", "bad": "Particípio aoristo = anterior ao verbo principal. Jesus ouviu (ἀκούσας) antes de falar (λέγει)."}, {"q": "Qual evangelista usa mais o genitivo absoluto, refletindo estilo grego clássico?", "opts": ["Mateus", "Marcos", "Lucas", "João"], "c": 2, "ok": "Correto! Lucas usa frequentemente o genitivo absoluto, revelando seu domínio do grego literário.", "bad": "Lucas e Atos usam frequentemente o genitivo absoluto — Wallace associa isso ao estilo grego mais literário de Lucas."}, {"q": "<span style='font-family:serif;font-size:16px;color:#2d6a4f'>ὁ πιστεύσας ἄνθρωπος</span> significa:", "opts": ["O homem que está crendo", "O homem que crê/creu (aoristo — ação pontual)", "O homem fiel", "O homem que vai crer"], "c": 1, "ok": "Correto! Particípio aoristo = ação pontual/anterior — 'o homem que creu' ou 'que crê (de forma definitiva)'.", "bad": "Particípio aoristo ativo = ação anterior/pontual. -σας indica aoristo: o homem que creu (ação pontual)."}]}, "16": {"c": "<h3>Pronomes Interrogativos e Indefinidos</h3>\n<p>A distinção entre <span class=\"lw gk\">τίς</span> (interrogativo) e <span class=\"lw gk\">τις</span> (indefinido) é apenas de <strong>acentuação</strong> — o interrogativo tem acento agudo na primeira sílaba.</p>\n<table><tr><th>Caso</th><th>τίς (quem?) m./f.</th><th>τί (quê?) n.</th></tr>\n<tr><td>Nom.</td><td><span class=\"lw gk\">τίς</span></td><td><span class=\"lw gk\">τί</span></td></tr>\n<tr><td>Gen.</td><td><span class=\"lw gk\">τίνος</span></td><td><span class=\"lw gk\">τίνος</span></td></tr>\n<tr><td>Dat.</td><td><span class=\"lw gk\">τίνι</span></td><td><span class=\"lw gk\">τίνι</span></td></tr>\n<tr><td>Acus.</td><td><span class=\"lw gk\">τίνα</span></td><td><span class=\"lw gk\">τί</span></td></tr></table>\n<p>O indefinido <span class=\"lw gk\">τις, τι</span> (alguém, algo, certo/a) é idêntico mas sem acento agudo fixo.</p>\n<h3>Pronomes Reflexivos</h3>\n<table><tr><th>Pessoa</th><th>Masculino</th><th>Feminino</th></tr>\n<tr><td>1ª sg.</td><td><span class=\"lw gk\">ἐμαυτοῦ</span> (de mim mesmo)</td><td><span class=\"lw gk\">ἐμαυτῆς</span></td></tr>\n<tr><td>2ª sg.</td><td><span class=\"lw gk\">σεαυτοῦ</span> (de ti mesmo)</td><td><span class=\"lw gk\">σεαυτῆς</span></td></tr>\n<tr><td>3ª sg.</td><td><span class=\"lw gk\">ἑαυτοῦ</span> (de si mesmo)</td><td><span class=\"lw gk\">ἑαυτῆς</span></td></tr>\n<tr><td>1ª pl.</td><td><span class=\"lw gk\">ἑαυτῶν</span> (de nós mesmos)</td><td></td></tr></table>\n<h3>Pronome Recíproco</h3>\n<p><span class=\"lw gk\">ἀλλήλων</span> (uns aos outros) — ocorre apenas no plural, sempre a partir do genitivo:</p>\n<p>Gen.: <span class=\"lw gk\">ἀλλήλων</span> | Dat.: <span class=\"lw gk\">ἀλλήλοις</span> | Acus.: <span class=\"lw gk\">ἀλλήλους</span></p>\n<div class=\"tip\">💡 <span class=\"lw gk\">ἀλλήλους</span> é uma das palavras-chave do NT — aparece no \"mandamento novo\" de Jesus (Jo 13.34) e frequentemente em Paulo como marca da ética comunitária cristã.</div>\n<h3>Aplicação Exegética</h3>\n<p>Lucas 10.29: <span class=\"lw gk\">Τίς ἐστιν ὁ πλησίον μου;</span> — \"Quem é o meu próximo?\" O pronome interrogativo <span class=\"lw gk\">τίς</span> inicia a pergunta que provoca a Parábola do Bom Samaritano. Note que Jesus inverte a pergunta no final (v.36): não \"quem é meu próximo?\" mas \"qual dos três SE FEZ próximo?\" — a ética cristã não pergunta quem merece amor, mas como ser próximo de quem precisa.</p>", "q": [{"q": "A diferença entre <span style='font-family:serif;font-size:16px;color:#2d6a4f'>τίς</span> (interrogativo) e <span style='font-family:serif;font-size:16px;color:#2d6a4f'>τις</span> (indefinido) é:", "opts": ["A declinação", "Apenas o acento", "O gênero", "O número"], "c": 1, "ok": "Correto! A única diferença é o acento — τίς tem acento agudo fixo; τις é enclítico (átono).", "bad": "A diferença é apenas o acento. τίς = interrogativo (acento agudo); τις = indefinido (sem acento fixo)."}, {"q": "<span style='font-family:serif;font-size:16px;color:#2d6a4f'>ἀλλήλους</span> significa:", "opts": ["A si mesmo", "Uns aos outros", "Cada um", "Alguém"], "c": 1, "ok": "Correto! ἀλλήλους (acusativo) = uns aos outros — pronome recíproco.", "bad": "ἀλλήλους = uns aos outros (pronome recíproco, acusativo). ἑαυτόν = a si mesmo."}, {"q": "O pronome reflexivo de 3ª pessoa é:", "opts": ["ἐμαυτοῦ", "σεαυτοῦ", "ἑαυτοῦ", "αὐτοῦ"], "c": 2, "ok": "Correto! ἑαυτοῦ = de si mesmo (3ª pessoa reflexivo).", "bad": "ἑαυτοῦ = 3ª pessoa reflexivo. ἐμαυτοῦ = 1ª; σεαυτοῦ = 2ª; αὐτοῦ = pronome pessoal de 3ª."}, {"q": "O pronome recíproco ἀλλήλων existe apenas no:", "opts": ["Singular", "Plural", "Dual", "Singular e plural"], "c": 1, "ok": "Correto! ἀλλήλων existe apenas no plural — reciprocidade implica mais de um agente.", "bad": "ἀλλήλων só existe no plural. Reciprocidade requer pelo menos duas partes."}, {"q": "Em Lucas 10.29, Τίς ἐστιν ὁ πλησίον μου; — τίς está em que caso?", "opts": ["Genitivo", "Dativo", "Nominativo", "Acusativo"], "c": 2, "ok": "Correto! τίς está no nominativo — é o sujeito da pergunta predicativa.", "bad": "τίς está no nominativo — é o sujeito de ἐστιν. 'Quem É o meu próximo?'"}, {"q": "<span style='font-family:serif;font-size:16px;color:#2d6a4f'>τινά</span> (acusativo de τις) significa:", "opts": ["Quem?", "Alguém / certo", "Ninguém", "Outro"], "c": 1, "ok": "Correto! τινά = alguém, certo (acusativo do indefinido τις).", "bad": "τινά é o acusativo do indefinido τις = alguém, certo. O interrogativo seria τίνα (com acento)."}, {"q": "O pronome reflexivo de 1ª pessoa é:", "opts": ["ἑαυτοῦ", "σεαυτοῦ", "ἐμαυτοῦ", "αὐτοῦ"], "c": 2, "ok": "Correto! ἐμαυτοῦ = de mim mesmo (1ª pessoa).", "bad": "ἐμαυτοῦ = 1ª pessoa (de mim mesmo). σεαυτοῦ = 2ª; ἑαυτοῦ = 3ª; αὐτοῦ = pronome pessoal."}, {"q": "Em João 13.34, ἀγαπᾶτε ἀλλήλους usa o pronome recíproco indicando que o amor:", "opts": ["É unidirecional", "É mútuo e recíproco entre os membros da comunidade", "É apenas a Deus", "É ao próximo fora da comunidade"], "c": 1, "ok": "Correto! ἀλλήλους = uns aos outros — amor mútuo e recíproco dentro da comunidade cristã.", "bad": "ἀλλήλους indica reciprocidade — amor mútuo dentro da comunidade. 'Amai-vos uns aos outros.'"}]}, "17": {"c": "<h3>O Tempo Perfeito</h3>\n<p>O perfeito expressa <strong>ação passada com resultado presente permanente</strong> (aspecto resultante ●─). É o tempo mais teologicamente rico do NT. Sua formação usa <strong>reduplicação</strong> do radical.</p>\n<h4>Formação: reduplicação + radical + κ + desinências</h4>\n<table><tr><th>Pessoa</th><th>Perfeito ativo sg.</th><th>Perfeito médio/passivo sg.</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">λέ-λυ-κ-α</span></td><td><span class=\"lw gk\">λέ-λυ-μαι</span></td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">λέ-λυ-κ-ας</span></td><td><span class=\"lw gk\">λέ-λυ-σαι</span></td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">λέ-λυ-κ-ε(ν)</span></td><td><span class=\"lw gk\">λέ-λυ-ται</span></td></tr>\n<tr><td>1ª pl.</td><td><span class=\"lw gk\">λε-λύ-κ-αμεν</span></td><td><span class=\"lw gk\">λε-λύ-μεθα</span></td></tr>\n<tr><td>3ª pl.</td><td><span class=\"lw gk\">λε-λύ-κ-ασι(ν)</span></td><td><span class=\"lw gk\">λέ-λυ-νται</span></td></tr></table>\n<p><strong>Reduplicação:</strong> primeira consoante do radical + ε: λύω → λέλυκα; γράφω → γέγραφα; πιστεύω → πεπίστευκα.</p>\n<div class=\"tip\">💡 Wallace: \"O perfeito é o tempo mais preciso do grego — afirma que algo foi feito e que o resultado daquela ação ainda permanece no presente.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#4a148c\"></span> Wallace, Sintaxe Exegética</span></div>\n<h3>Exemplos Exegéticos Cruciais</h3>\n<p>• <span class=\"lw gk\">γέγραπται</span> (está escrito) — Mateus 4.4,6,7,10: Jesus cita o AT com o perfeito — a Escritura foi escrita e permanece em vigor.</p>\n<p>• <span class=\"lw gk\">Τετέλεσται</span> (está consumado!) — João 19.30: a obra da redenção foi completada e o resultado é permanente.</p>\n<p>• <span class=\"lw gk\">πεπίστευκα</span> — 2Tm 1.12: \"sei em quem tenho crido\" — fé que foi exercida e cujo resultado permanece.</p>\n<h3>O Mais-que-Perfeito</h3>\n<p>O mais-que-perfeito expressa resultado <em>no passado</em> (●─ no passado). Forma-se com aumento + reduplicação + κει + desinências: <span class=\"lw gk\">ἐ-λε-λύ-κει-ν</span> (eu tinha desatado).</p>\n<h3>Aplicação Exegética</h3>\n<p>João 19.30: <span class=\"lw gk\">Τετέλεσται</span> — uma única palavra grega que resume a redenção. O perfeito indica: a obra foi completada (passado) e seu resultado permanece para sempre (presente contínuo). Não é apenas \"acabou\" (aoristo), mas \"está consumado com efeito permanente\".</p>", "q": [{"q": "O aspecto do perfeito grego é:", "opts": ["Linear", "Pontual", "Resultante (ação passada com resultado presente)", "Iterativo"], "c": 2, "ok": "Correto! O perfeito tem aspecto resultante — ação passada cujo resultado permanece no presente.", "bad": "O perfeito tem aspecto resultante (●─): algo foi feito e o resultado ainda está presente."}, {"q": "O sinal característico do perfeito é:", "opts": ["Aumento ε-", "Sigma σ", "Reduplicação do radical", "Sufixo -θη-"], "c": 2, "ok": "Correto! A reduplicação (primeira consoante + ε prefixado) é a marca do perfeito.", "bad": "A reduplicação é o sinal do perfeito. λύω → λέλυκα; γράφω → γέγραφα."}, {"q": "<span style='font-family:serif;font-size:16px;color:#2d6a4f'>γέγραπται</span> significa:", "opts": ["Foi escrito (e não existe mais)", "Está escrito (e permanece válido)", "Será escrito", "Foi sendo escrito"], "c": 1, "ok": "Correto! γέγραπται (perfeito) = 'está escrito' — foi escrito e permanece em vigor.", "bad": "γέγραπται é perfeito — 'está escrito' (foi escrito e o resultado, a validade, permanece)."}, {"q": "A reduplicação de γράφω no perfeito é:", "opts": ["γαγράφ-", "γεγράφ-", "γράφ-", "ἐγράφ-"], "c": 1, "ok": "Correto! γεγράφ- — primeira consoante γ + ε + radical γραφ-.", "bad": "γεγράφ- é correto. Reduplicação = 1ª consoante + ε: γ + ε + γραφ- = γεγραφ-."}, {"q": "<span style='font-family:serif;font-size:16px;color:#2d6a4f'>Τετέλεσται</span> (Jo 19.30) usa o perfeito para indicar que a redenção:", "opts": ["Foi completada mas seu efeito passou", "Foi completada e seu resultado é permanente", "Ainda não foi completada", "Será completada no futuro"], "c": 1, "ok": "Correto! Perfeito = ação passada + resultado permanente. A redenção está consumada para sempre.", "bad": "O perfeito indica resultado permanente — a obra da redenção foi completada e o efeito é eterno."}, {"q": "O mais-que-perfeito expressa:", "opts": ["Ação futura perfeita", "Resultado permanente no presente", "Resultado que existia no passado", "Ação iterativa no passado"], "c": 2, "ok": "Correto! O mais-que-perfeito (●─ no passado) expressa resultado que existia em um momento passado.", "bad": "Mais-que-perfeito = resultado no passado (●─ no passado). Ex.: 'eu tinha desatado' (resultado existia antes de outro evento passado)."}, {"q": "A desinência do perfeito ativo inclui:", "opts": ["-σα-", "-κ-", "-θη-", "Sem desinência especial"], "c": 1, "ok": "Correto! -κ- (kapa) está presente nas desinências do perfeito ativo: λέλυκα, λέλυκας, λέλυκε.", "bad": "-κ- é a marca do perfeito ativo. -σα- = 1.º aoristo; -θη- = aoristo/futuro passivo."}, {"q": "Qual afirmação sobre o perfeito em João 19.30 é correta?", "opts": ["É um simples passado — 'acabou'", "Indica ação pontual sem consequências", "Expressa completude com efeito permanente — mais forte que um simples passado", "É equivalente ao imperfeito"], "c": 2, "ok": "Correto! O perfeito é mais forte que o aoristo — não apenas 'acabou', mas 'está consumado com efeito permanente'.", "bad": "O perfeito é mais forte que um simples passado (aoristo). Τετέλεσται = está consumado, com efeito permanente."}]}, "18": {"c": "<h3>O Modo Imperativo</h3>\n<p>O imperativo expressa <strong>vontade, comando, pedido ou exortação</strong>. A distinção de aspecto é crucial:</p>\n<p>• <strong>Presente imperativo</strong> = comando para continuar/parar uma ação em curso</p>\n<p>• <strong>Aoristo imperativo</strong> = comando para realizar uma ação pontual</p>\n<h3>Paradigma — Presente Imperativo Ativo</h3>\n<table><tr><th>Pessoa</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">λῦ-ε</span> (desata!)</td><td><span class=\"lw gk\">λύ-ετε</span> (desatai!)</td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">λυ-έτω</span> (que ele desate!)</td><td><span class=\"lw gk\">λυ-έτωσαν</span> (que eles desatem!)</td></tr></table>\n<h3>Paradigma — Aoristo Imperativo Ativo</h3>\n<table><tr><th>Pessoa</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">λῦ-σον</span> (desata!)</td><td><span class=\"lw gk\">λύ-σατε</span> (desatai!)</td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">λυ-σάτω</span> (que ele desate!)</td><td><span class=\"lw gk\">λυ-σάτωσαν</span></td></tr></table>\n<h3>Proibições</h3>\n<p>• <span class=\"lw gk\">μή</span> + presente imperativo = \"pare de fazer\" (ação em curso)</p>\n<p>• <span class=\"lw gk\">μή</span> + aoristo subjuntivo = \"não faças\" (proibição de ação pontual)</p>\n<div class=\"tip\">💡 Chamberlain: \"Em Mt 6.25, Jesus diz μὴ μεριμνᾶτε (presente imperativo) = 'pare de se preocupar' — os ouvintes já estavam ansiosos. Em Mt 6.34, μὴ οὖν μεριμνήσητε (aoristo subjuntivo) = 'não comece a se preocupar pelo futuro'.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#6d4c41\"></span> Chamberlain, Gramática Exegética</span></div>\n<h3>O Modo Optativo</h3>\n<p>O optativo expressa <strong>possibilidade remota ou desejo</strong>. É raro no NT (68 ocorrências). A fórmula paulina <span class=\"lw gk\">μὴ γένοιτο</span> (\"de modo nenhum! / não aconteça!\") ocorre 15 vezes em Romanos e Gálatas.</p>\n<h3>Aplicação Exegética</h3>\n<p>João 13.34: <span class=\"lw gk\">ἀγαπᾶτε ἀλλήλους</span> — \"amai-vos uns aos outros\" (presente imperativo, 2ª pl.) — comando para ação contínua e habitual, não apenas um gesto pontual. O novo mandamento é uma chamada a um estilo de vida de amor recíproco permanente.</p>", "q": [{"q": "μή + PRESENTE imperativo significa:", "opts": ["Não faças (proibição pontual)", "Pare de fazer (ação já em curso)", "Nunca faças", "Não deves fazer no futuro"], "c": 1, "ok": "Correto! μή + presente imperativo = 'pare de fazer' — a ação já está em curso.", "bad": "μή + presente imperativo = 'pare de fazer'. μή + aoristo subjuntivo = 'não faças (pontualmente)'."}, {"q": "O imperativo de 2ª sg. do AORISTO ativo de λύω é:", "opts": ["λῦε", "λύεις", "λῦσον", "λύσῃς"], "c": 2, "ok": "Correto! λῦσον é o aoristo imperativo 2ª singular ativo.", "bad": "λῦσον é o aoristo imperativo 2ª sg. λῦε = presente imperativo; λύεις = presente indicativo; λύσῃς = aoristo subjuntivo."}, {"q": "Em Mateus 6.25, μὴ μεριμνᾶτε (presente imperativo) diz aos ouvintes para:", "opts": ["Nunca se preocuparem no futuro", "Pararem de se preocupar (pois já estavam)", "Começarem a se preocupar", "Se preocuparem com moderação"], "c": 1, "ok": "Correto! Presente imperativo com μή = 'pare de se preocupar' — a audiência já estava ansiosa.", "bad": "μή + presente imperativo = 'pare de fazer'. Os ouvintes já estavam se preocupando, Jesus os manda parar."}, {"q": "<span style='font-family:serif;font-size:16px;color:#2d6a4f'>μὴ γένοιτο</span> está no modo:", "opts": ["Subjuntivo", "Imperativo", "Optativo", "Indicativo"], "c": 2, "ok": "Correto! μὴ γένοιτο é optativo — expressa um desejo negativo intenso: 'de modo algum!'", "bad": "μὴ γένοιτο é optativo — exprime desejo/possibilidade remota. É a expressão de repúdio de Paulo em Romanos."}, {"q": "O imperativo de 3ª pessoa expressa:", "opts": ["Comando direto", "Proibição", "Permissão ou comando indireto: 'que ele faça'", "Desejo remoto"], "c": 2, "ok": "Correto! Imperativo de 3ª pessoa = comando/permissão indireta: 'que ele faça', 'deixe que ele faça'.", "bad": "Imperativo de 3ª pessoa = 'que ele faça' — comando ou permissão indireta."}, {"q": "Em João 13.34, ἀγαπᾶτε (presente imperativo) indica que o amor deve ser:", "opts": ["Um gesto único e especial", "Contínuo e habitual", "Reservado para momentos especiais", "Apenas verbal"], "c": 1, "ok": "Correto! Presente imperativo = ação contínua. O novo mandamento chama a um estilo de vida de amor permanente.", "bad": "Presente imperativo indica ação contínua e habitual — não um gesto pontual, mas um estilo de vida."}, {"q": "Quantas vezes o optativo μὴ γένοιτο aparece em Romanos e Gálatas?", "opts": ["3", "15", "30", "1"], "c": 1, "ok": "Correto! μὴ γένοιτο aparece 15 vezes em Romanos e Gálatas — é a expressão favorita de Paulo para refutar objeções.", "bad": "μὴ γένοιτο aparece 15 vezes em Romanos e Gálatas — a expressão retórica favorita de Paulo."}, {"q": "A diferença de aspecto entre presente e aoristo imperativo é:", "opts": ["Não há diferença prática", "Presente = ação contínua; aoristo = ação pontual", "Presente = passado; aoristo = futuro", "Presente = suave; aoristo = formal"], "c": 1, "ok": "Correto! Presente imperativo = ação contínua/habitual; aoristo imperativo = ação pontual.", "bad": "Presente imperativo = ação contínua; aoristo imperativo = ação pontual. A distinção de aspecto é crucial na interpretação."}]}, "19": {"c": "<h3>O Infinitivo Grego</h3>\n<p>O infinitivo está entre o verbo e o substantivo — pode funcionar como sujeito, objeto, ou expressar propósito, causa e resultado. Não tem pessoa nem número, mas tem aspecto e voz.</p>\n<h3>Formas dos Infinitivos de λύω</h3>\n<table><tr><th>Tempo/Voz</th><th>Forma</th><th>Tradução</th></tr>\n<tr><td>Pres. ativo</td><td><span class=\"lw gk\">λύ-ειν</span></td><td>desatar (contínuo)</td></tr>\n<tr><td>Pres. médio</td><td><span class=\"lw gk\">λύ-εσθαι</span></td><td>desatar-se</td></tr>\n<tr><td>Aor. ativo</td><td><span class=\"lw gk\">λῦ-σαι</span></td><td>desatar (pontual)</td></tr>\n<tr><td>Aor. passivo</td><td><span class=\"lw gk\">λυ-θῆ-ναι</span></td><td>ser desatado</td></tr>\n<tr><td>Perf. ativo</td><td><span class=\"lw gk\">λε-λυ-κέ-ναι</span></td><td>ter desatado</td></tr></table>\n<div class=\"warn\">⚠️ O infinitivo aoristo NÃO tem aumento. λῦσαι (inf. aoristo) ≠ ἔλυσα (ind. aoristo). O aspecto do aoristo = pontual, mas não indica passado no infinitivo.</div>\n<h3>Usos Principais</h3>\n<p><strong>1. Complemento Verbal</strong> — após verbos como θέλω, δύναμαι, μέλλω:</p>\n<p><span class=\"lw gk\">θέλω λύειν</span> = \"quero desatar\"</p>\n<p><strong>2. Infinitivo com τοῦ (genitivo)</strong> — indica propósito:</p>\n<p><span class=\"lw gk\">ἦλθεν τοῦ σῴζειν</span> = \"veio para salvar\"</p>\n<p><strong>3. Infinitivo com εἰς τό</strong> — propósito:</p>\n<p><span class=\"lw gk\">εἰς τὸ σωθῆναι</span> = \"a fim de ser salvo\"</p>\n<p><strong>4. Infinitivo com ἐν τῷ</strong> — tempo (\"enquanto/quando\"):</p>\n<p><span class=\"lw gk\">ἐν τῷ σπείρειν αὐτόν</span> = \"enquanto ele semeava\"</p>\n<p><strong>5. Sujeito da oração</strong>:</p>\n<p><span class=\"lw gk\">τὸ ζῆν Χριστός</span> = \"o viver é Cristo\" (Fp 1.21)</p>\n<h3>Aplicação Exegética</h3>\n<p>Filipenses 1.21: <span class=\"lw gk\">ἐμοὶ γὰρ τὸ ζῆν Χριστὸς καὶ τὸ ἀποθανεῖν κέρδος</span> — \"para mim, o viver é Cristo e o morrer é ganho.\" Os infinitivos <span class=\"lw gk\">τὸ ζῆν</span> e <span class=\"lw gk\">τὸ ἀποθανεῖν</span> com artigo neutro funcionam como substantivos — sujeitos das orações nominais. Rega & Bergmann: \"Paulo comprime toda uma teologia da vida em dois infinitivos substantivados.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#1d3557\"></span> Rega & Bergmann, Noções do Grego Bíblico</span></p>", "q": [{"q": "O infinitivo presente ativo de λύω é:", "opts": ["λύσαι", "λύειν", "λελυκέναι", "λυθῆναι"], "c": 1, "ok": "Correto! λύειν é o infinitivo presente ativo — aspecto linear (ação contínua).", "bad": "λύειν é o infinitivo presente ativo. λύσαι = aoristo ativo; λυθῆναι = aoristo passivo; λελυκέναι = perfeito ativo."}, {"q": "O infinitivo aoristo TEM aumento?", "opts": ["Sim, sempre", "Não — o aumento é exclusivo do indicativo", "Sim, apenas no passivo", "Depende do verbo"], "c": 1, "ok": "Correto! O infinitivo aoristo não tem aumento. λῦσαι ≠ ἔλυσα.", "bad": "O infinitivo aoristo não tem aumento — este é exclusivo do modo indicativo."}, {"q": "εἰς τό + infinitivo expressa:", "opts": ["Tempo ('enquanto')", "Propósito ('a fim de')", "Resultado ('de modo que')", "Causa ('porque')"], "c": 1, "ok": "Correto! εἰς τό + infinitivo = propósito: 'a fim de', 'para'.", "bad": "εἰς τό + infinitivo = propósito. ἐν τῷ = tempo ('enquanto'); ὥστε = resultado."}, {"q": "Em Fp 1.21, τὸ ζῆν (o viver) é um infinitivo que funciona como:", "opts": ["Complemento verbal", "Sujeito da oração (infinitivo substantivado)", "Advérbio de tempo", "Predicado adjetivo"], "c": 1, "ok": "Correto! τὸ ζῆν com artigo neutro é um infinitivo substantivado — sujeito da oração.", "bad": "τὸ ζῆν é um infinitivo substantivado (com artigo neutro) funcionando como sujeito."}, {"q": "O infinitivo aoristo PASSIVO de λύω é:", "opts": ["λύεσθαι", "λῦσαι", "λυθῆναι", "λελύσθαι"], "c": 2, "ok": "Correto! λυθῆναι é o infinitivo aoristo passivo — sufixo -θη- + ναι.", "bad": "λυθῆναι é o infinitivo aoristo passivo. λύεσθαι = presente médio/passivo; λῦσαι = aoristo ativo."}, {"q": "ἐν τῷ + infinitivo expressa:", "opts": ["Propósito", "Resultado", "Tempo ('enquanto/quando')", "Causa"], "c": 2, "ok": "Correto! ἐν τῷ + infinitivo = tempo: 'enquanto ele fazia', 'quando ele fazia'.", "bad": "ἐν τῷ + infinitivo = tempo. εἰς τό = propósito; ὥστε = resultado; διά + acus. = causa."}, {"q": "θέλω λύειν significa:", "opts": ["Eu quero ter desatado", "Eu quero desatar (continuamente)", "Eu quero ser desatado", "Eu quis desatar"], "c": 1, "ok": "Correto! θέλω λύειν = 'quero desatar' — infinitivo presente como complemento de θέλω.", "bad": "θέλω λύειν = 'quero desatar'. O presente infinitivo indica aspecto contínuo/linear."}, {"q": "O infinitivo perfeito ativo de λύω é:", "opts": ["λύειν", "λελυκέναι", "λελύσθαι", "λυθήσεσθαι"], "c": 1, "ok": "Correto! λελυκέναι é o infinitivo perfeito ativo — reduplicação λε- + radical + κ + έναι.", "bad": "λελυκέναι é o infinitivo perfeito ativo. A reduplicação (λε-) é visível."}]}, "20": {"c": "<h3>Verbos Contraídos</h3>\n<p>Verbos cujo radical termina em vogal breve (α, ε, ο) sofrem <strong>contração</strong> quando essa vogal encontra as desinências. O resultado é uma vogal longa ou ditongo.</p>\n<h3>Verbos em -αω — ἀγαπάω (amar)</h3>\n<table><tr><th>Pessoa</th><th>Forma plena</th><th>Forma contraída</th></tr>\n<tr><td>1ª sg.</td><td>ἀγαπά-ω</td><td><span class=\"lw gk\">ἀγαπ-ῶ</span></td></tr>\n<tr><td>2ª sg.</td><td>ἀγαπά-εις</td><td><span class=\"lw gk\">ἀγαπ-ᾷς</span></td></tr>\n<tr><td>3ª sg.</td><td>ἀγαπά-ει</td><td><span class=\"lw gk\">ἀγαπ-ᾷ</span></td></tr>\n<tr><td>1ª pl.</td><td>ἀγαπά-ομεν</td><td><span class=\"lw gk\">ἀγαπ-ῶμεν</span></td></tr>\n<tr><td>3ª pl.</td><td>ἀγαπά-ουσι</td><td><span class=\"lw gk\">ἀγαπ-ῶσι</span></td></tr></table>\n<h3>Verbos em -εω — ποιέω (fazer)</h3>\n<table><tr><th>Pessoa</th><th>Contraído</th></tr>\n<tr><td>1ª sg.</td><td><span class=\"lw gk\">ποι-ῶ</span></td></tr>\n<tr><td>2ª sg.</td><td><span class=\"lw gk\">ποι-εῖς</span></td></tr>\n<tr><td>3ª sg.</td><td><span class=\"lw gk\">ποι-εῖ</span></td></tr>\n<tr><td>3ª pl.</td><td><span class=\"lw gk\">ποι-οῦσι</span></td></tr></table>\n<h3>Verbos em -οω — πληρόω (cumprir/preencher)</h3>\n<p>ο + vogal → ου (longo): <span class=\"lw gk\">πληρ-ῶ, πληρ-οῖς, πληρ-οῖ, πληρ-οῦμεν, πληρ-οῦσι</span></p>\n<h3>Conjugação em -μι: δίδωμι (dar)</h3>\n<p>Os verbos em -μι são mais antigos e irregulares. O mais importante é δίδωμι.</p>\n<table><tr><th>Pessoa</th><th>Pres. ind. ativo</th><th>Imperativo</th></tr>\n<tr><td>1ª sg.</td><td><span class=\"lw gk\">δίδωμι</span></td><td>—</td></tr>\n<tr><td>2ª sg.</td><td><span class=\"lw gk\">δίδως</span></td><td><span class=\"lw gk\">δίδου</span></td></tr>\n<tr><td>3ª sg.</td><td><span class=\"lw gk\">δίδωσι</span></td><td><span class=\"lw gk\">διδότω</span></td></tr>\n<tr><td>3ª pl.</td><td><span class=\"lw gk\">διδόασι</span></td><td><span class=\"lw gk\">διδόντων</span></td></tr></table>\n<p>Outros verbos -μι importantes: <span class=\"lw gk\">τίθημι</span> (colocar), <span class=\"lw gk\">ἵστημι</span> (colocar de pé), <span class=\"lw gk\">ἀφίημι</span> (perdoar/deixar).</p>\n<div class=\"tip\">💡 Dobson: \"Os verbos -μι são poucos, mas muito frequentes. δίδωμι ocorre 415 vezes no NT.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#457b9d\"></span> Dobson, Aprenda o Grego do NT</span></div>\n<h3>Aplicação Exegética</h3>\n<p>João 21.15: <span class=\"lw gk\">Ἀγαπᾷς με;</span> — \"Amas-me?\" O verbo <span class=\"lw gk\">ἀγαπᾷς</span> é a contração de ἀγαπά-εις. A pergunta de Jesus a Pedro usa o presente indicativo — não \"você me amou?\" (aoristo), mas \"você me ama?\" (presente contínuo). A restauração de Pedro passa por uma declaração de amor no presente.</p>", "q": [{"q": "A contração de ἀγαπά + ω resulta em:", "opts": ["ἀγαπάω", "ἀγαπῶ", "ἀγαπαῶ", "ἀγαπᾷ"], "c": 1, "ok": "Correto! α + ω → ω (longo circunflexo): ἀγαπῶ.", "bad": "α + ω → ω longo com circunflexo: ἀγαπῶ. Esta é a regra de contração α+ω."}, {"q": "A 3ª sg. presente de ποιέω (fazer) é:", "opts": ["ποιέει", "ποιεῖ", "ποιεῖς", "ποιοῦσι"], "c": 1, "ok": "Correto! ποιεῖ — contração ε+ει = ει longo.", "bad": "ποιεῖ é correto. ε + ει = ει. ποιεῖς = 2ª sg.; ποιοῦσι = 3ª pl."}, {"q": "δίδωμι pertence a que conjugação?", "opts": ["1ª conjugação (-ω)", "2ª conjugação (-ω)", "Conjugação em -μι", "Conjugação em -εω"], "c": 2, "ok": "Correto! δίδωμι pertence à conjugação em -μι — mais antiga e irregular.", "bad": "δίδωμι é conjugação em -μι — distinta das conjugações em -ω."}, {"q": "Em João 21.15, Ἀγαπᾷς με usa o PRESENTE indicativo, não o aoristo. O que isso significa?", "opts": ["Jesus pergunta sobre o amor passado de Pedro", "Jesus pergunta sobre o amor contínuo e presente de Pedro", "É apenas uma fórmula de cortesia", "O tempo não é relevante aqui"], "c": 1, "ok": "Correto! O presente indica amor contínuo — 'você ME AMA (agora, continuamente)?'", "bad": "O presente indica continuidade — Jesus pergunta sobre o estado atual e contínuo do amor de Pedro."}, {"q": "A regra de contração ε + ε resulta em:", "opts": ["εε", "ει", "η", "ου"], "c": 1, "ok": "Correto! ε + ε → ει: ποιέ + εις → ποιεῖς.", "bad": "ε + ε → ει (ditongo). Regra de contração fundamental para verbos em -εω."}, {"q": "Qual verbo -μι significa 'perdoar/deixar' e é importante teologicamente?", "opts": ["δίδωμι", "τίθημι", "ἵστημι", "ἀφίημι"], "c": 3, "ok": "Correto! ἀφίημι = perdoar/deixar/remitir — importante em textos sobre perdão no NT.", "bad": "ἀφίημι = perdoar/deixar. δίδωμι = dar; τίθημι = colocar; ἵστημι = colocar de pé."}, {"q": "A 1ª sg. presente de πληρόω (cumprir) contraída é:", "opts": ["πληρόω", "πληρῶ", "πληροῖ", "πληροῦμεν"], "c": 1, "ok": "Correto! πληρῶ — contração ο + ω = ω longo.", "bad": "πληρῶ é correto — ο + ω = ω. πληροῖ = 3ª sg.; πληροῦμεν = 1ª pl."}, {"q": "Quantas vezes δίδωμι (dar) ocorre no NT?", "opts": ["Cerca de 100", "Cerca de 200", "Cerca de 415", "Cerca de 50"], "c": 2, "ok": "Correto! δίδωμι ocorre cerca de 415 vezes no NT — um dos verbos mais frequentes.", "bad": "δίδωμι ocorre cerca de 415 vezes — é um dos verbos mais frequentes e teologicamente ricos do NT."}]}, "21": {"c": "<h3>Usos Especiais do Artigo</h3>\n<p>O artigo grego vai muito além do simples \"o/a\". Bergmann e Wallace identificam vários usos que são cruciais para exegese.</p>\n<h3>1. O Artigo como Pronome de 3ª Pessoa</h3>\n<p>Em frases com δέ, o artigo pode funcionar como pronome: <span class=\"lw gk\">ὁ δὲ εἶπεν</span> = \"e ele disse\" / \"mas ele disse\".</p>\n<h3>2. O Artigo como Nominalizador</h3>\n<p>O artigo pode substantivar qualquer palavra:</p>\n<p>• adjetivo: <span class=\"lw gk\">οἱ πτωχοί</span> = \"os pobres\"</p>\n<p>• infinitivo: <span class=\"lw gk\">τὸ ζῆν</span> = \"o viver\"</p>\n<p>• advérbio: <span class=\"lw gk\">τὸ νῦν</span> = \"o agora / o presente\"</p>\n<p>• particípio: <span class=\"lw gk\">ὁ πιστεύων</span> = \"o que crê\"</p>\n<h3>3. A Regra de Granville Sharp (TSKS)</h3>\n<p>Quando dois substantivos pessoais singulares são conectados por καί, e o primeiro tem artigo mas o segundo não, ambos se referem à mesma pessoa:</p>\n<p><span class=\"lw gk\">τοῦ μεγάλου θεοῦ καὶ σωτῆρος ἡμῶν Χριστοῦ Ἰησοῦ</span> (Tt 2.13) = \"do nosso grande Deus e Salvador Jesus Cristo\" — uma única pessoa!</p>\n<div class=\"tip\">💡 Wallace demonstra que a Regra de Sharp em Tt 2.13 e 2Pe 1.1 afirma explicitamente a divindade de Cristo — argumento importante no diálogo com as Testemunhas de Jeová. <span class=\"cit\"><span class=\"citd\" style=\"background:#4a148c\"></span> Wallace, Sintaxe Exegética</span></div>\n<h3>Numerais Gregos</h3>\n<table><tr><th>Cardinal</th><th>Grego</th><th>Cardinal</th><th>Grego</th></tr>\n<tr><td>1</td><td><span class=\"lw gk\">εἷς, μία, ἕν</span></td><td>10</td><td><span class=\"lw gk\">δέκα</span></td></tr>\n<tr><td>2</td><td><span class=\"lw gk\">δύο</span></td><td>12</td><td><span class=\"lw gk\">δώδεκα</span></td></tr>\n<tr><td>3</td><td><span class=\"lw gk\">τρεῖς, τρία</span></td><td>40</td><td><span class=\"lw gk\">τεσσεράκοντα</span></td></tr>\n<tr><td>4</td><td><span class=\"lw gk\">τέσσαρες</span></td><td>100</td><td><span class=\"lw gk\">ἑκατόν</span></td></tr>\n<tr><td>7</td><td><span class=\"lw gk\">ἑπτά</span></td><td>1000</td><td><span class=\"lw gk\">χίλιοι</span></td></tr></table>\n<h3>Aplicação Exegética</h3>\n<p>Efésios 4.5: <span class=\"lw gk\">εἷς κύριος, μία πίστις, ἓν βάπτισμα</span> — \"um Senhor, uma fé, um batismo.\" O numeral εἷς/μία/ἕν é declinado em três gêneros para concordar com cada substantivo. A repetição triádica do \"um\" afirma a unidade fundamental da Igreja.</p>", "q": [{"q": "A Regra de Granville Sharp (TSKS) se aplica quando:", "opts": ["Dois substantivos têm artigo", "Dois subst. pessoais sg. unidos por καί, o 1.º com artigo e o 2.º sem", "Dois verbos são coordenados", "Um adjetivo precede o substantivo"], "c": 1, "ok": "Correto! TSKS: dois substantivos pessoais sg., unidos por καί, o primeiro com artigo, o segundo sem → mesma pessoa.", "bad": "TSKS: dois substantivos pessoais singulares + καί, com artigo apenas no primeiro → referem-se à mesma pessoa."}, {"q": "Em Tt 2.13, a Regra de Sharp indica que 'Deus e Salvador' refere-se a:", "opts": ["Duas pessoas distintas (Pai e Filho)", "Uma única pessoa — Jesus Cristo", "Uma metáfora", "O Espírito Santo"], "c": 1, "ok": "Correto! A Regra de Sharp afirma que θεοῦ καὶ σωτῆρος refere-se a uma única pessoa: Jesus Cristo.", "bad": "A Regra de Sharp indica uma única pessoa — Jesus Cristo é chamado 'grande Deus e Salvador'."}, {"q": "O artigo como NOMINALIZADOR transforma um particípio em:", "opts": ["Advérbio", "Substantivo", "Adjetivo predicativo", "Conjunção"], "c": 1, "ok": "Correto! O artigo nominaliza — ὁ πιστεύων = 'o que crê' (substantivo).", "bad": "O artigo nominaliza qualquer forma: ὁ πιστεύων = 'o que crê' (particípio → substantivo)."}, {"q": "O numeral 'um' em grego tem três formas porque:", "opts": ["É irregular", "Declinações diferentes", "Concorda em gênero, número e caso com o substantivo", "É uma exceção"], "c": 2, "ok": "Correto! εἷς (m.), μία (f.), ἕν (n.) — concorda em gênero com o substantivo.", "bad": "εἷς/μία/ἕν concorda em gênero: εἷς (masc.), μία (fem.), ἕν (neutro)."}, {"q": "<span style='font-family:serif;font-size:16px;color:#2d6a4f'>ὁ δὲ εἶπεν</span> usa o artigo como:", "opts": ["Artigo definido comum", "Pronome de 3ª pessoa", "Nominalizador", "Adjetivo"], "c": 1, "ok": "Correto! ὁ δέ usa o artigo como pronome: 'e ele disse / mas ele disse'.", "bad": "ὁ δέ usa o artigo como pronome de 3ª pessoa — é uma construção narrativa frequente nos evangelhos."}, {"q": "Em Ef 4.5, εἷς κύριος, μία πίστις, ἓν βάπτισμα — ἕν é o neutro porque:", "opts": ["É uma exceção", "βάπτισμα é substantivo neutro", "É mais enfático no neutro", "Não tem gênero definido"], "c": 1, "ok": "Correto! βάπτισμα é neutro (3ª declinação em -μα), então o numeral também vai para o neutro.", "bad": "ἕν é neutro porque βάπτισμα é substantivo neutro — o numeral concorda em gênero."}, {"q": "O 'artigo nominalizador' pode tornar substantivo qual tipo de palavra?", "opts": ["Apenas adjetivos", "Apenas particípios", "Qualquer palavra: adjetivo, infinitivo, advérbio, particípio", "Apenas substantivos de outra declinação"], "c": 2, "ok": "Correto! O artigo pode nominalizar qualquer tipo de palavra em grego.", "bad": "O artigo grego pode nominalizar qualquer palavra: adjetivos, infinitivos, advérbios, particípios, frases inteiras."}, {"q": "Qual é o grego para o número 12?", "opts": ["δέκα", "δύο", "δώδεκα", "δεκαδύο"], "c": 2, "ok": "Correto! δώδεκα = doze — frequente no NT (os 12 apóstolos, as 12 tribos).", "bad": "δώδεκα = 12. δέκα = 10; δύο = 2. Os 12 apóstolos são frequentemente chamados οἱ δώδεκα."}]}, "22": {"c": "<h3>Orações Condicionais</h3>\n<p>O grego clássico tem quatro classes de condicionais, baseadas na combinação de tempo/modo na prótase (o \"se\") e apódose (o resultado):</p>\n<table><tr><th>Classe</th><th>Prótase</th><th>Apódose</th><th>Ideia</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">εἰ</span> + indicativo</td><td>Qualquer modo</td><td>Condição assumida como real</td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">εἰ</span> + optativo</td><td>Optativo + ἄν</td><td>Condição contrária à realidade</td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">ἐάν</span> + subjuntivo</td><td>Futuro/presente</td><td>Condição possível</td></tr>\n<tr><td>4ª</td><td><span class=\"lw gk\">εἰ</span> + optativo</td><td>Optativo + ἄν</td><td>Condição remota</td></tr></table>\n<div class=\"tip\">💡 Chamberlain: \"A 1ª classe não afirma que a condição é verdadeira — apenas que o argumento é apresentado assumindo-a como real. Ex.: 'Se és Filho de Deus' (Mt 4.3) — Satanás não nega a filiação, apenas condiciona o argumento.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#6d4c41\"></span> Chamberlain, Gramática Exegética</span></div>\n<h3>Principais Conjunções e Partículas</h3>\n<table><tr><th>Palavra</th><th>Função</th><th>Exemplo</th></tr>\n<tr><td><span class=\"lw gk\">γάρ</span></td><td>porque, pois (explicativa)</td><td>Jo 3.16 — οὕτως γάρ...</td></tr>\n<tr><td><span class=\"lw gk\">δέ</span></td><td>mas, e, porém (adversativa/progressiva)</td><td>muito frequente em narrativas</td></tr>\n<tr><td><span class=\"lw gk\">οὖν</span></td><td>portanto, então (inferencial)</td><td>Jo 1.22 — Εἶπαν οὖν...</td></tr>\n<tr><td><span class=\"lw gk\">ἀλλά</span></td><td>mas (forte adversativa)</td><td>Rm 5.8 — ἀλλὰ συνίστησιν...</td></tr>\n<tr><td><span class=\"lw gk\">καί</span></td><td>e, também, até mesmo</td><td>João usa muito καί narrativo</td></tr>\n<tr><td><span class=\"lw gk\">μέν...δέ</span></td><td>por um lado...por outro</td><td>Mt 3.11 — ἐγὼ μέν...αὐτὸς δέ</td></tr>\n<tr><td><span class=\"lw gk\">ὅτι</span></td><td>que / porque</td><td>Jo 3.16 — ὅτι οὕτως ἠγάπησεν</td></tr></table>\n<h3>Aplicação Exegética</h3>\n<p>1Jo 1.8: <span class=\"lw gk\">ἐὰν εἴπωμεν ὅτι ἁμαρτίαν οὐκ ἔχομεν, ἑαυτοὺς πλανῶμεν</span> — \"se dissermos que não temos pecado, enganamos a nós mesmos.\" Condicional de 3ª classe (ἐάν + subjuntivo) — possibilidade real. João não diz que esta afirmação é feita, mas que quem a fizer está se enganando. O reflexivo ἑαυτούς indica que o engano é autoinfligido.</p>", "q": [{"q": "εἰ + indicativo forma uma condicional de:", "opts": ["3ª classe (possível)", "1ª classe (assumida como real)", "2ª classe (contrária à realidade)", "4ª classe (remota)"], "c": 1, "ok": "Correto! εἰ + indicativo = 1ª classe — a condição é apresentada como real para fins do argumento.", "bad": "εἰ + indicativo = 1ª classe (condição assumida como real). ἐάν + subjuntivo = 3ª classe."}, {"q": "ἐάν + subjuntivo forma uma condicional de:", "opts": ["1ª classe", "2ª classe", "3ª classe (condição possível)", "4ª classe"], "c": 2, "ok": "Correto! ἐάν + subjuntivo = 3ª classe — condição considerada possível.", "bad": "ἐάν + subjuntivo = 3ª classe. εἰ + indicativo = 1ª classe."}, {"q": "A partícula γάρ (pois/porque) tem função:", "opts": ["Adversativa", "Explicativa/causal", "Conclusiva", "Temporal"], "c": 1, "ok": "Correto! γάρ é explicativa — introduz a razão ou explicação do que foi dito antes.", "bad": "γάρ é explicativa/causal: 'pois', 'porque'. οὖν = conclusiva; ἀλλά = adversativa forte."}, {"q": "οὖν (portanto) tem função:", "opts": ["Adversativa", "Explicativa", "Inferencial/conclusiva", "Temporal"], "c": 2, "ok": "Correto! οὖν é inferencial — introduz uma conclusão ou resultado lógico.", "bad": "οὖν é inferencial: 'portanto', 'então'. Indica conclusão do que foi dito anteriormente."}, {"q": "Em 1Jo 1.8, ἐὰν εἴπωμεν é uma condicional de:", "opts": ["1ª classe", "2ª classe", "3ª classe", "4ª classe"], "c": 2, "ok": "Correto! ἐάν + subjuntivo = 3ª classe — João considera a possibilidade real de alguém fazer esta afirmação.", "bad": "ἐάν + subjuntivo = 3ª classe — João trata como condição possível, não hipotética."}, {"q": "A construção μέν...δέ expressa:", "opts": ["Causa e efeito", "Contraste: 'por um lado...por outro'", "Tempo: 'primeiro...depois'", "Condição: 'se...então'"], "c": 1, "ok": "Correto! μέν...δέ = 'por um lado...por outro' — estrutura de contraste ou comparação.", "bad": "μέν...δέ indica contraste ou comparação: 'por um lado...por outro lado'."}, {"q": "Em Mateus 4.3, 'Se és Filho de Deus' (1ª classe) indica que Satanás:", "opts": ["Nega a filiação divina de Jesus", "Afirma que Jesus é Filho de Deus", "Apresenta o argumento assumindo a filiação como real", "Está em dúvida sobre a identidade de Jesus"], "c": 2, "ok": "Correto! 1ª classe não afirma verdade — apenas assume a condição para fins do argumento. Satanás não nega, apenas usa a filiação como premissa.", "bad": "1ª classe = condição assumida como real para o argumento. Satanás não nega a filiação — usa-a como premissa retórica."}, {"q": "ἀλλά é uma conjunção:", "opts": ["Explicativa fraca", "Adversativa forte ('mas' com contraste intenso)", "Conclusiva", "Temporal"], "c": 1, "ok": "Correto! ἀλλά é adversativa forte — contraste intenso, mais forte que δέ.", "bad": "ἀλλά é adversativa forte. δέ é adversativa/progressiva mais suave."}]}, "23": {"c": "<h3>O Texto Original do Novo Testamento</h3>\n<p>O NT foi escrito em grego koinê (κοινή = comum) entre aproximadamente 50-100 d.C. Não temos os autógrafos (originais) — o texto nos chegou através de milhares de manuscritos copiados ao longo dos séculos.</p>\n<h3>Os Manuscritos</h3>\n<table><tr><th>Tipo</th><th>Período</th><th>Exemplos</th></tr>\n<tr><td><strong>Papiros</strong></td><td>II-VII séc.</td><td>P⁴⁵, P⁴⁶, P⁶⁶, P⁷⁵</td></tr>\n<tr><td><strong>Unciais/Maiúsculos</strong></td><td>IV-X séc.</td><td>Codex Sinaiticus (א), Vaticanus (B)</td></tr>\n<tr><td><strong>Minúsculos</strong></td><td>IX-XV séc.</td><td>Maioria dos 2.900 mss</td></tr>\n<tr><td><strong>Lecionários</strong></td><td>IV-XVI séc.</td><td>Textos litúrgicos</td></tr></table>\n<p>O NT grego tem mais de <strong>5.800 manuscritos gregos</strong> — mais do que qualquer outra obra da Antiguidade.</p>\n<h3>Variantes Textuais</h3>\n<p>Ao longo da cópia manual, surgiram variantes (diferenças entre manuscritos). A <strong>crítica textual</strong> busca estabelecer o texto mais próximo dos originais usando princípios como: (1) a leitura mais difícil é geralmente mais original; (2) leituras mais curtas tendem a ser originais; (3) leituras que explicam as outras são preferíveis.</p>\n<div class=\"tip\">💡 Rega & Bergmann: \"Apesar das variantes, nenhuma doutrina cristã fundamental é afetada — a imensa maioria das variantes são ortográficas ou de ordem de palavras sem impacto teológico.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#1d3557\"></span> Rega & Bergmann, Noções do Grego Bíblico</span></div>\n<h3>Edições Críticas</h3>\n<p>• <strong>NA28</strong> (Nestle-Aland, 28ª ed.) — padrão acadêmico internacional</p>\n<p>• <strong>UBS5</strong> (United Bible Societies, 5ª ed.) — com apparatus simplificado para tradutores</p>\n<p>• <strong>Textus Receptus</strong> — base das traduções históricas (KJV, ARC)</p>\n<p>• <strong>Texto Majoritário</strong> — segue a maioria dos manuscritos medievais</p>\n<h3>Aplicação Exegética</h3>\n<p>2Tm 3.16: <span class=\"lw gk\">πᾶσα γραφὴ θεόπνευστος</span> — \"toda a Escritura é divinamente inspirada.\" O hapax legomenon <span class=\"lw gk\">θεόπνευστος</span> (θεός + πνέω = sopro divino) aparece apenas aqui no NT. A crítica textual confirma que este versículo está bem atestado em todos os tipos de manuscritos — não há variante significativa.</p>", "q": [{"q": "Quantos manuscritos gregos do NT existem aproximadamente?", "opts": ["Cerca de 500", "Cerca de 1.000", "Mais de 5.800", "Cerca de 200"], "c": 2, "ok": "Correto! O NT tem mais de 5.800 manuscritos gregos — mais do que qualquer obra da Antiguidade.", "bad": "O NT tem mais de 5.800 manuscritos gregos — evidência textual incomparável na literatura antiga."}, {"q": "O Codex Sinaiticus (א) é classificado como:", "opts": ["Papiro", "Minúsculo", "Uncial/Maiúsculo", "Lecionário"], "c": 2, "ok": "Correto! O Sinaiticus é um uncial/maiúsculo do século IV — um dos manuscritos mais importantes do NT.", "bad": "O Sinaiticus é um uncial (escrito em letras maiúsculas) do século IV."}, {"q": "A edição crítica padrão do NT grego no ambiente acadêmico é:", "opts": ["Textus Receptus", "NA28 (Nestle-Aland 28ª ed.)", "Texto Majoritário", "Codex Vaticanus"], "c": 1, "ok": "Correto! NA28 (Nestle-Aland 28ª edição) é o texto crítico padrão no meio acadêmico e eclesiástic
