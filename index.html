nas adjetivo"], "c": 2, "ok": "Correto! O particípio pode funcionar como verbo (ação presente/habitual), adjetivo ou substantivo.", "bad": "O particípio é flexível: pode ser verbo (ação habitual/presente), adjetivo (qualificativo) ou substantivo."}, {"q": "שׁוֹמֵר (guardando/guardador) é o particípio de:", "opts": ["נָשָׂא", "שָׁמַע", "שָׁמַר", "שָׁלַח"], "c": 2, "ok": "Correto! שׁוֹמֵר é o particípio de שָׁמַר (guardar, observar).", "bad": "שׁוֹמֵר é o particípio de שָׁמַר (guardar). שָׁמַע = ouvir; נָשָׂא = carregar; שָׁלַח = enviar."}, {"q": "O plural masculino do particípio ativo Qal é:", "opts": ["קֹטְלִים", "קֹטְלוֹת", "קֹטֶלֶת", "קֹטֵל"], "c": 0, "ok": "Correto! קֹטְלִים — plural masculino do particípio ativo Qal.", "bad": "קֹטְלִים é o masc. pl. קֹטֶלֶת = fem. sg.; קֹטְלוֹת = fem. pl.; קֹטֵל = m. sg."}, {"q": "No Salmo 121, o tema do guardador (שׁוֹמֵר) aparece repetidamente indicando:", "opts": ["Que Israel deve guardar a lei", "A vigilância constante e ativa de Deus", "Que os levitas guardam o templo", "Uma referência histórica apenas"], "c": 1, "ok": "Correto! O particípio שׁוֹמֵר expressa ação contínua — Deus guarda incessantemente.", "bad": "שׁוֹמֵר (particípio = ação contínua) expressa que Deus guarda de forma constante e incessante."}]}, "22": {"c": "<h3>Preposições com Sufixos</h3><table><tr><th>Sufixo</th><th>לְ</th><th>בְּ</th><th>עַל</th></tr><tr><td>1ª sg.</td><td><span class='lw hb'>לִי</span></td><td><span class='lw hb'>בִּי</span></td><td><span class='lw hb'>עָלַי</span></td></tr><tr><td>2ª m.sg.</td><td><span class='lw hb'>לְךָ</span></td><td><span class='lw hb'>בְּךָ</span></td><td><span class='lw hb'>עָלֶיךָ</span></td></tr><tr><td>3ª m.sg.</td><td><span class='lw hb'>לוֹ</span></td><td><span class='lw hb'>בּוֹ</span></td><td><span class='lw hb'>עָלָיו</span></td></tr><tr><td>1ª pl.</td><td><span class='lw hb'>לָנוּ</span></td><td><span class='lw hb'>בָּנוּ</span></td><td><span class='lw hb'>עָלֵינוּ</span></td></tr><tr><td>3ª m.pl.</td><td><span class='lw hb'>לָהֶם</span></td><td><span class='lw hb'>בָּהֶם</span></td><td><span class='lw hb'>עֲלֵיהֶם</span></td></tr></table><div class='tip'>💡 Gusso: 'Dominar preposições com sufixos abre os Salmos e os Profetas.' <span class='cit'><span class='citd' style='background:#2e4057'></span> Gusso</span></div><h3>Aplicação Exegética</h3><p>Sl 23.4: <span class='lw hb'>כִּי אַתָּה עִמָּדִי</span> — 'pois tu estás comigo'. Presença íntima e pessoal.</p>", "q": [{"q": "לִי significa:", "opts": ["Para ele", "Para mim", "Para ti", "Para nós"], "c": 1, "ok": "Correto! לִי = לְ (para) + sufixo 1ª sg. = para mim.", "bad": "לִי = 'para mim'. לְ (prep.) + sufixo 1ª sg. (יִ → ִי)."}, {"q": "בּוֹ significa:", "opts": ["Nela", "Neles", "Nele (bê + sufixo dele)", "Nós"], "c": 2, "ok": "Correto! בּוֹ = בְּ (em) + sufixo 3ª m.sg. (-וֹ) = nele, por ele.", "bad": "בּוֹ = 'nele/por ele'. בְּ (prep.) + sufixo 3ª m.sg. (-וֹ)."}, {"q": "Em Salmo 23.4, כִּי אַתָּה עִמָּדִי — עִמָּדִי significa:", "opts": ["Contra mim", "Comigo (עִם + sufixo 1ª sg.)", "Diante de mim", "Sobre mim"], "c": 1, "ok": "Correto! עִמָּדִי = עִם (com) + sufixo 1ª sg. = 'comigo'. Presença divina íntima e pessoal.", "bad": "עִמָּדִי = 'comigo'. עִם (com) + sufixo 1ª sg. A presença de Deus expressa de forma pessoal."}, {"q": "לָהֶם significa:", "opts": ["Para ela", "Para eles (m.pl.)", "Para nós", "Para mim"], "c": 1, "ok": "Correto! לָהֶם = לְ (para) + sufixo 3ª m.pl. = para eles.", "bad": "לָהֶם = 'para eles'. לְ + sufixo 3ª m.pl. (-הֶם)."}, {"q": "עָלַי significa:", "opts": ["Sobre ele", "Sobre mim", "Por mim", "Para mim"], "c": 1, "ok": "Correto! עָלַי = עַל (sobre) + sufixo 1ª sg. = sobre mim.", "bad": "עָלַי = 'sobre mim'. עַל (sobre) + sufixo 1ª sg."}, {"q": "A preposição עִם com sufixo de 1ª singular torna-se:", "opts": ["עִמִּי", "עִמָּדִי", "Ambas as formas são usadas", "עִמְנִי"], "c": 2, "ok": "Correto! עִם usa duas formas com sufixo: עִמִּי e עִמָּדִי — ambas significam 'comigo'.", "bad": "עִם usa duas formas: עִמִּי e עִמָּדִי — ambas são 'comigo' e aparecem no AT."}, {"q": "Qual das seguintes significa 'para nós'?", "opts": ["לִי", "לְךָ", "לָנוּ", "לָהֶם"], "c": 2, "ok": "Correto! לָנוּ = לְ + sufixo 1ª pl. = para nós.", "bad": "לָנוּ = 'para nós'. לִי = para mim; לְךָ = para ti; לָהֶם = para eles."}, {"q": "O sufixo 3ª feminina singular com a preposição לְ é:", "opts": ["לָהּ", "לָהֶם", "לָהֶן", "לוֹ"], "c": 0, "ok": "Correto! לָהּ = לְ + sufixo 3ª f.sg. = para ela.", "bad": "לָהּ = 'para ela'. לוֹ = para ele; לָהֶם = para eles; לָהֶן = para elas."}]}, "23": {"c": "<h3>Os Sete Troncos (Binyanim)</h3><table><tr><th>Construção</th><th>Tipo</th><th>Exemplo</th></tr><tr><td>Qal</td><td>Simples ativa</td><td><span class='lw hb'>קָטַל</span> = matou</td></tr><tr><td>Nif'al</td><td>Passiva/reflexiva</td><td><span class='lw hb'>נִקְטַל</span> = foi morto</td></tr><tr><td>Pi'el</td><td>Intensiva ativa</td><td><span class='lw hb'>קִטֵּל</span> = massacrou</td></tr><tr><td>Pu'al</td><td>Intensiva passiva</td><td><span class='lw hb'>קֻטַּל</span></td></tr><tr><td>Hitpa'el</td><td>Reflexiva intensiva</td><td><span class='lw hb'>הִתְקַטֵּל</span></td></tr><tr><td>Hif'il</td><td>Causativa ativa</td><td><span class='lw hb'>הִקְטִיל</span></td></tr><tr><td>Hof'al</td><td>Causativa passiva</td><td><span class='lw hb'>הָקְטַל</span></td></tr></table><div class='tip'>💡 Ross: 'Uma raiz com 7 construções = 7 sentidos.' <span class='cit'><span class='citd' style='background:#4a148c'></span> Ross</span></div><h3>Aplicação Exegética</h3><p>Gênesis 5.22: Hitpa'el de <span class='lw hb'>הָלַךְ</span> — comunhão habitual e contínua de Enoque com Deus.</p>", "q": [{"q": "O Pi'el é caracterizado por:", "opts": ["Dagesh fraco na 1ª radical", "Dagesh forte na 2ª radical (duplicação)", "Prefixo הִ", "Prefixo נִ"], "c": 1, "ok": "Correto! O Pi'el tem dagesh forte na 2ª radical do verbo — duplicação da consoante central.", "bad": "Pi'el = dagesh forte na 2ª radical: קִטֵּל (não קָטַל do Qal)."}, {"q": "O Nif'al é a voz:", "opts": ["Causativa ativa", "Intensiva passiva", "Simples passiva ou reflexiva", "Causativa passiva"], "c": 2, "ok": "Correto! Nif'al = voz simples passiva ou reflexiva do Qal.", "bad": "Nif'al = passiva/reflexiva simples. É marcado pelo prefixo נִ- (ou assimilação do nun com dagesh)."}, {"q": "O Hitpa'el expressa ação:", "opts": ["Causativa", "Reflexiva/recíproca do intensivo", "Passiva simples", "Causativa passiva"], "c": 1, "ok": "Correto! Hitpa'el = reflexivo/recíproco do intensivo Pi'el. Prefixo הִתְ.", "bad": "Hitpa'el = reflexivo/recíproco intensivo. Prefixo הִתְ- + raiz com dagesh forte na 2ª radical."}, {"q": "Em Gn 5.22, וַיִּתְהַלֵּךְ חֲנוֹךְ — o verbo é Hitpa'el indicando:", "opts": ["Enoque foi embora", "Enoque andou consigo mesmo", "Enoque andava continuamente/habitualmente (reflexivo)", "Enoque foi forçado a andar"], "c": 2, "ok": "Correto! Hitpa'el de הָלַךְ = ação reflexiva/habitual: 'andava continuamente com Deus'.", "bad": "Hitpa'el expressa ação contínua/habitual reflexiva — Enoque andava habitualmente com Deus, comunhão constante."}, {"q": "O Hif'il é a voz:", "opts": ["Simples passiva", "Intensiva ativa", "Causativa ativa", "Reflexiva"], "c": 2, "ok": "Correto! Hif'il = causativa ativa — 'fazer alguém fazer algo'. Prefixo הִ-.", "bad": "Hif'il = causativa ativa. Sujeito faz com que outra pessoa/coisa realize a ação. Prefixo הִ-."}, {"q": "O sinal de identificação do Hif'il no perfeito é:", "opts": ["Dagesh forte na 2ª radical", "Prefixo נִ", "Prefixo הִ + vogal יִ na 3ª radical", "Prefixo הִתְ"], "c": 2, "ok": "Correto! Hif'il perfeito: הִ- + radical + יִ na última sílaba. Ex.: הִמְשִׁיל.", "bad": "Hif'il perfeito tem prefixo הִ- e a 3ª radical recebe a vogal יִ. Ex.: הִמְשִׁיל (fez governar)."}, {"q": "Qual construção NÃO tem forma imperativa?", "opts": ["Qal", "Nif'al", "Pu'al", "Pi'el"], "c": 2, "ok": "Correto! O Pu'al não tem imperativo — é a voz passiva do Pi'el e passivas não têm imperativo em hebraico.", "bad": "O Pu'al (passiva do Pi'el) não tem imperativo — passivas não admitem forma de comando."}, {"q": "O Hof'al é a voz:", "opts": ["Simples passiva", "Intensiva passiva", "Causativa passiva", "Reflexiva intensiva"], "c": 2, "ok": "Correto! Hof'al = causativa passiva (passiva do Hif'il).", "bad": "Hof'al = causativa passiva (passiva do Hif'il). Ex.: הָקְטַל = foi feito matar."}]}, "24": {"c": "<h3>Parabéns — Você Concluiu a Introdução!</h3><p>Com estas 24 lições você tem as bases para ler o AT em hebraico.</p><h3>O Que Você Aprendeu</h3><p>• Alfabeto e sistema vocálico massorético<br>• Sílabas, shewa, dagesh<br>• Substantivos: gênero, número, construto, sufixos<br>• Artigo, preposições, pronomes<br>• Perfeito e imperfeito do Qal<br>• Particípio e infinitivo<br>• Os sete troncos verbais</p><h3>Próximos Passos</h3><p>1. Memorize as ~500 palavras que ocorrem mais de 50x no AT<br>2. Comece a ler pelo Salmo 23<br>3. BDB (léxico), BHS (texto crítico), Biblehub para morfologia</p><div class='tip'>💡 Vita &amp; Akil: 'O hebraico é uma língua simples — em poucas lições se é capaz de ler e traduzir a Bíblia.' <span class='cit'><span class='citd' style='background:#6a0572'></span> Vita &amp; Akil</span></div><h3>Palavra Final</h3><p><span class='lw hb'>פִּתְחוּ לִי שַׁעֲרֵי צֶדֶק</span> — 'Abri-me as portas da justiça' (Salmo 118.19). Que o estudo do hebraico abra para você o AT.</p>", "q": [{"q": "Para ler cerca de 80% do AT, deve-se memorizar palavras com quantas ocorrências?", "opts": ["Mais de 200", "Mais de 100", "Mais de 50 (cerca de 500 palavras)", "Mais de 500"], "c": 2, "ok": "Correto! As ~500 palavras com mais de 50 ocorrências cobrem cerca de 80% do texto do AT.", "bad": "As ~500 palavras que ocorrem mais de 50 vezes cobrem cerca de 80% do AT hebraico."}, {"q": "Qual Salmo é recomendado para começar a leitura em hebraico?", "opts": ["Salmo 119 (mais longo)", "Salmo 23 (vocabulário simples e familiar)", "Salmo 1", "Salmo 150"], "c": 1, "ok": "Correto! Salmo 23 tem vocabulário simples, familiar e teologicamente rico — ideal para começar.", "bad": "Salmo 23 tem vocabulário simples e familiar — perfeito para dar os primeiros passos na leitura do AT em hebraico."}, {"q": "BHS significa:", "opts": ["Biblia Hebraica Stuttgartensia — o texto crítico padrão do AT", "Bíblia Hebraica Simplificada", "Básico Hebraico Sistemático", "Bíblia com Hebraico Separado"], "c": 0, "ok": "Correto! BHS = Biblia Hebraica Stuttgartensia — o texto massorético crítico padrão para estudo acadêmico do AT.", "bad": "BHS = Biblia Hebraica Stuttgartensia — o texto crítico padrão do AT hebraico com apparatus."}, {"q": "O léxico BDB é:", "opts": ["Um dicionário português-hebraico para iniciantes", "Brown-Driver-Briggs — o léxico hebraico-inglês padrão do AT", "Um comentário bíblico", "Uma gramática de referência"], "c": 1, "ok": "Correto! BDB = Brown-Driver-Briggs — o léxico hebraico-aramaico-inglês padrão do AT.", "bad": "BDB = Brown-Driver-Briggs Hebrew and English Lexicon — o léxico padrão do AT para estudo acadêmico."}, {"q": "Em Sl 118.19, שַׁעֲרֵי צֶדֶק é um:", "opts": ["Verbo no imperfeito", "Estado construto plural ('as portas da justiça')", "Pronome demonstrativo", "Adjetivo predicativo"], "c": 1, "ok": "Correto! שַׁעֲרֵי = construto plural de שַׁעַר (porta); צֶדֶק = justiça. 'As portas da justiça'.", "bad": "שַׁעֲרֵי צֶדֶק = estado construto plural: 'as portas da justiça'. שַׁעֲרֵי é o construto pl. de שַׁעַר."}, {"q": "Qual ferramenta digital é recomendada para memorização de vocabulário hebraico?", "opts": ["Google Translate", "Anki com baralhos de hebraico bíblico", "Word", "Wikipedia"], "c": 1, "ok": "Correto! Anki usa repetição espaçada — ideal para memorizar vocabulário bíblico eficientemente.", "bad": "Anki com baralhos de vocabulário hebraico usa repetição espaçada — o método mais eficiente para memorização."}, {"q": "O estudo das línguas bíblicas tem como objetivo principal:", "opts": ["Substituir a fé pela técnica", "Ser mais inteligente que outros cristãos", "Acessar o texto sagrado com maior fidelidade ao original", "É apenas para especialistas acadêmicos"], "c": 2, "ok": "Correto! O estudo das línguas bíblicas busca maior fidelidade ao original — é serviço à Palavra de Deus.", "bad": "As línguas bíblicas são ferramentas de fidelidade ao texto original — servem ao estudo e à pregação da Palavra."}, {"q": "Qual das gramáticas é considerada a base introdutória do hebraico neste curso?", "opts": ["Gusso (2005)", "Futato (2010)", "Kelley (1998) — Hebraico Bíblico: Uma Gramática Introdutória", "Ross (2005)"], "c": 2, "ok": "Correto! Kelley (1998) é a gramática base deste curso de hebraico.", "bad": "Kelley (1998) — Hebraico Bíblico: Uma Gramática Introdutória — é a gramática base do curso de hebraico."}]}}};</script>

function SearchResults({results,onSelect}){
  const ac=results.length>0&&results[0].lang==='greek'?'var(--gn)':'var(--bl)';
  return(
    <div style={{flex:1,overflow:'auto',padding:'28px 40px'}}>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:'var(--tx)',marginBottom:4}}>
        Resultados da Pesquisa
      </div>
      <div style={{fontSize:13,color:'var(--tx3)',marginBottom:22}}>{results.length} lição(ões) encontrada(s)</div>
      {results.length===0&&<div style={{color:'var(--tx3)',fontSize:14}}>Nenhum resultado encontrado. Tente outros termos.</div>}
      {results.map((r,i)=>(
        <div key={i} onClick={()=>onSelect(r.lang,r.lesson)}
          style={{background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:12,padding:18,marginBottom:12,cursor:'pointer',transition:'all .2s'}}
          onMouseEnter={e=>{e.currentTarget.style.boxShadow='var(--sh)';e.currentTarget.style.borderColor=r.lang==='greek'?'var(--gn)':'var(--bl)';}}
          onMouseLeave={e=>{e.currentTarget.style.boxShadow='';e.currentTarget.style.borderColor='var(--bd)';}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:8,background:r.lang==='greek'?'var(--gl)':'var(--bll)',color:r.lang==='greek'?'var(--gn)':'var(--bl)'}}>
              {r.lang==='greek'?'Grego NT':'Hebraico AT'}
            </span>
            <span style={{fontSize:13,fontWeight:600,color:'var(--tx)'}}>Lição {r.lesson.id} — {r.lesson.t}</span>
            {r.lesson.s&&<span style={{fontSize:11,color:'var(--tx3)'}}>{r.lesson.s}</span>}
          </div>
          {r.hits.map((h,j)=>(
            <div key={j} style={{display:'flex',gap:8,marginBottom:4}}>
              <span style={{fontSize:10,fontWeight:700,color:'var(--tx3)',background:'var(--sf2)',borderRadius:4,padding:'1px 6px',flexShrink:0,alignSelf:'flex-start',marginTop:2}}>{h.src}</span>
              <span style={{fontSize:12.5,color:'var(--tx2)',lineHeight:1.5}}>{h.text}</span>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}
const {useState,useEffect,useRef,useCallback}=React;

function App(){
  const [lang,setLang]=useState(null);
  const [lesson,setLesson]=useState(null);
  const [tab,setTab]=useState("conteudo");
  const [aiC,setAiC]=useState({});
  const [quizD,setQuizD]=useState({});
  const [ldC,setLdC]=useState(false);
  const [ldQ,setLdQ]=useState(false);
  const [ans,setAns]=useState({});
  const [fin,setFin]=useState({});
  const [gkDone,setGkDone]=useState(()=>{try{return JSON.parse(localStorage.getItem("gk_done")||"[]")}catch{return[]}});
  const [hbDone,setHbDone]=useState(()=>{try{return JSON.parse(localStorage.getItem("hb_done")||"[]")}catch{return[]}});
  const [gkCust,setGkCust]=useState(()=>{try{return JSON.parse(localStorage.getItem("gk_cust")||"[]")}catch{return[]}});
  const [hbCust,setHbCust]=useState(()=>{try{return JSON.parse(localStorage.getItem("hb_cust")||"[]")}catch{return[]}});
  const [showUp,setShowUp]=useState(false);
  const [upFile,setUpFile]=useState(null);
  const [upMeta,setUpMeta]=useState({a:"",t:"",y:""});
  const [drag,setDrag]=useState(false);
  const [toast,setToast]=useState(null);
  const [search,setSearch]=useState('');
  const [searchResults,setSearchResults]=useState(null);

  const doSearch=(q)=>{
    if(!q.trim()){setSearchResults(null);return;}
    const term=q.toLowerCase();
    const results=[];
    const langs=[['greek','gk',GK_LESSONS],['hebrew','hb',HB_LESSONS]];
    langs.forEach(([lng,key,lsns])=>{
      lsns.forEach(l=>{
        const ck=String(l.id);
        const cd=ALL_CONTENT[key]?.[ck];
        const hits=[];
        // search in topics
        l.top.forEach(t=>{if(t.toLowerCase().includes(term))hits.push({src:'Tópico',text:t});});
        // search in terms
        l.trm.forEach(t=>{if(t.toLowerCase().includes(term))hits.push({src:'Vocabulário',text:t});});
        // search in content
        if(cd?.c){
          const plain=cd.c.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');
          const idx=plain.toLowerCase().indexOf(term);
          if(idx>=0)hits.push({src:'Conteúdo',text:plain.slice(Math.max(0,idx-60),idx+120).trim()+'…'});
        }
        if(hits.length)results.push({lang:lng,lesson:l,hits:hits.slice(0,3)});
      });
    });
    setSearchResults(results);
  };

  const fRef=useRef(null);

  useEffect(()=>{try{localStorage.setItem("gk_done",JSON.stringify(gkDone))}catch{}},[gkDone]);
  useEffect(()=>{try{localStorage.setItem("hb_done",JSON.stringify(hbDone))}catch{}},[hbDone]);
  useEffect(()=>{try{localStorage.setItem("gk_cust",JSON.stringify(gkCust))}catch{}},[gkCust]);
  useEffect(()=>{try{localStorage.setItem("hb_cust",JSON.stringify(hbCust))}catch{}},[hbCust]);

  const isG=lang==="greek";
  const lessons=isG?GK_LESSONS:HB_LESSONS;
  const done=isG?gkDone:hbDone;
  const setDone=isG?setGkDone:setHbDone;
  const builtG=isG?GK_GRAMMARS:HB_GRAMMARS;
  const custG=isG?gkCust:hbCust;
  const setCustG=isG?setGkCust:setHbCust;
  const allG=[...builtG,...custG];
  const ac=isG?"gk":"hb";
  const acv=isG?"var(--gn)":"var(--bl)";
  const isDone=lesson?done.includes(lesson.id):false;
  const prog=Math.round((done.length/24)*100);

  const showT=(m)=>{setToast(m);setTimeout(()=>setToast(null),3000);};
  const markDone=(id)=>setDone(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  const genC=useCallback(async(l)=>{
    const k=`${lang}_c_${l.id}`;
    if(aiC[k]) return;
    const langKey=isG?'gk':'hb';
    const lesson=ALL_CONTENT[langKey]?.[String(l.id)];
    if(lesson?.c){setAiC(p=>({...p,[k]:lesson.c}));return;}

          <button className="bcnc" onClick={()=>{setShowUp(false);setUpFile(null);setUpMeta({a:"",t:"",y:""});}}>Cancelar</button>
          <button className={`bok ${isG?"gk":"hb"}`} disabled={!upFile||!upMeta.a||!upMeta.t} onClick={addGrammar}>
            Adicionar à biblioteca
          </button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-mark" onClick={()=>{setLang(null);setLesson(null);}}>Ελ · עב</div>
        <div className="hdr-sep"/>
        <div>
          <div className="hdr-title">Línguas <em>Bíblicas</em></div>
          <div className="hdr-sub">Grego NT · Hebraico AT · Seminário</div>
        </div>
        <div className="hdr-right">
          {lang&&lesson&&<button className="btn-h" onClick={()=>setLesson(null)}>← Lições</button>}
          {lang&&!lesson&&<button className="btn-h" onClick={()=>setLang(null)}>← Início</button>}
          
        </div>
      </div>

      {/* LANG BAR */}
      <div className="lbar">
        <div className={`ltab${lang==="greek"?" ag":""}`} onClick={()=>{setLang("greek");setLesson(null);}}>
          <span className="l-icon" style={{color:"var(--gn)"}}>Α</span>
          Grego do NT
          <span className="l-cnt">{gkDone.length}/24</span>
        </div>
        <div className={`ltab${lang==="hebrew"?" ah":""}`} onClick={()=>{setLang("hebrew");setLesson(null);}}>
          <span className="l-icon" style={{color:"var(--bl)"}}>א</span>
          Hebraico Bíblico
          <span className="l-cnt">{hbDone.length}/24</span>
        </div>
      </div>


      {/* SEARCH BAR */}
      <div style={{background:'var(--sf)',borderBottom:'1px solid var(--bd)',padding:'8px 28px',display:'flex',gap:10,alignItems:'center'}}>
        <div style={{flex:1,position:'relative',maxWidth:600}}>
          <input
            value={search}
            onChange={e=>{setSearch(e.target.value);doSearch(e.target.value);}}
            placeholder="🔍 Pesquisar conceito em todas as gramáticas... (ex: subjuntivo, dagesh, construto)"
            style={{width:'100%',padding:'8px 14px',border:'1.5px solid var(--bd)',borderRadius:8,fontSize:13,fontFamily:"'Inter',sans-serif",background:'var(--sf)',color:'var(--tx)',outline:'none'}}
            onFocus={e=>e.target.style.borderColor='var(--gn)'}
            onBlur={e=>e.target.style.borderColor='var(--bd)'}
          />
        </div>
        {searchResults&&<button onClick={()=>{setSearch('');setSearchResults(null);}} style={{fontSize:12,color:'var(--tx3)',background:'none',border:'none',cursor:'pointer'}}>✕ Limpar</button>}
      </div>

      {searchResults ? <SearchResults results={searchResults} onSelect={(lng,l)=>{setLang(lng);setLesson(l);setTab('conteudo');setSearchResults(null);setSearch('');}} /> : <div className="layout">
        <Sidebar/>
        <div className="main">
          {!lang&&<Home/>}
          {lang&&!lesson&&<LangHome/>}
          {lang&&lesson&&<LessonView/>}
        </div>
      </div>

      
      {toast&&<div className="toast">{'\u2713 '+toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
