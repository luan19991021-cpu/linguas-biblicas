<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línguas Bíblicas — Seminário</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --accent-gk: #2d6a4f;
  --accent-hb: #1a3a6b;
  --light-gk: #e8f5e9;
  --light-hb: #e3f2fd;
  --text: #1a1a1a;
  --text2: #4a4a4a;
  --text3: #888;
  --surface: #fff;
  --surface2: #f9f7f4;
  --border: #e0ddd9;
  --shadow: 0 4px 16px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #faf8f5; color: var(--text); }
.app { display: flex; height: 100vh; }
.sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; }
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.lesson-item { padding: 12px; border-radius: 8px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.2s; margin-bottom: 6px; }
.lesson-item:hover { background: var(--surface2); }
.lesson-item.active { border-left-color: var(--accent-gk); background: var(--light-gk); }
.lesson-item.active.hb { border-left-color: var(--accent-hb); background: var(--light-hb); }
.lesson-title { font-size: 13px; font-weight: 600; color: var(--text); }
.lesson-subtitle { font-size: 11px; color: var(--text3); margin-top: 2px; }
.main { flex: 1; display: flex; flex-direction: column; }
.header { background: linear-gradient(135deg, var(--accent-gk) 0%, var(--accent-hb) 100%); color: white; padding: 24px 40px; }
.header-logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.header-title { font-size: 13px; opacity: 0.9; }
.content { flex: 1; overflow-y: auto; padding: 40px; }
.home-section { text-align: center; padding: 60px 40px; }
.home-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.home-subtitle { font-size: 14px; color: var(--text3); margin-bottom: 50px; }
.lang-cards { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
.lang-card { width: 280px; border: 2px solid var(--border); border-radius: 12px; padding: 30px 24px; text-align: center; cursor: pointer; transition: all 0.3s; }
.lang-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
.lang-card.gk { border-color: var(--accent-gk); }
.lang-card.gk:hover { border-color: var(--accent-gk); background: var(--light-gk); }
.lang-card.hb { border-color: var(--accent-hb); }
.lang-card.hb:hover { border-color: var(--accent-hb); background: var(--light-hb); }
.lang-symbol { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 700; margin-bottom: 12px; }
.lang-card.gk .lang-symbol { color: var(--accent-gk); }
.lang-card.hb .lang-symbol { color: var(--accent-hb); }
.lang-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.lang-desc { font-size: 12px; color: var(--text3); margin-bottom: 18px; }
.lang-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--border); }
.stat { text-align: center; }
.stat-num { font-size: 18px; font-weight: 700; color: var(--text); }
.stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; }
.lesson-view { display: flex; flex-direction: column; }
.lesson-header { margin-bottom: 30px; }
.lesson-main-title { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.lesson-main-subtitle { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-style: italic; color: var(--text3); margin-bottom: 20px; }
.tabs { display: flex; gap: 2px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
.tab { padding: 12px 20px; font-size: 13px; font-weight: 600; color: var(--text3); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent-gk); border-bottom-color: var(--accent-gk); }
.tab.active.hb { color: var(--accent-hb); border-bottom-color: var(--accent-hb); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.content-text { font-size: 15px; line-height: 1.7; color: var(--text2); }
.content-text h3 { margin: 24px 0 14px; font-size: 18px; font-weight: 700; color: var(--text); }
.content-text p { margin-bottom: 14px; }
.content-text ul, .content-text ol { margin-left: 20px; margin-bottom: 14px; }
.content-text li { margin-bottom: 6px; }
.content-text table { width: 100%; margin: 16px 0; border-collapse: collapse; border: 1px solid var(--border); }
.content-text th, .content-text td { padding: 12px; text-align: left; border: 1px solid var(--border); }
.content-text th { background: var(--surface2); font-weight: 700; }
.tip-box { background: var(--light-gk); border-left: 4px solid var(--accent-gk); padding: 16px; border-radius: 8px; margin: 20px 0; font-size: 14px; }
.tip-box.hb { background: var(--light-hb); border-left-color: var(--accent-hb); }
.grammars-section { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
.grammars-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); margin-bottom: 12px; }
.grammar-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; font-size: 12px; color: var(--text2); }
.grammar-bullet { width: 4px; height: 4px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.grammar-base { font-weight: 600; padding: 2px 8px; border-radius: 4px; font-size: 10px; }
.grammar-item.base .grammar-base { background: var(--light-gk); color: var(--accent-gk); }
.grammar-item.hb.base .grammar-base { background: var(--light-hb); color: var(--accent-hb); }
.nav { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
.nav-btn { padding: 10px 18px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
.nav-btn:hover { border-color: var(--accent-gk); color: var(--accent-gk); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const GK_LESSONS = [
  {id:1, t:"Alfabeto Grego", s:"Acentos e Espíritos"},
  {id:2, t:"Presente do Indicativo", s:"Aspecto Verbal"},
  {id:3, t:"Presente do Subjuntivo", s:"Partícula ἵνα"},
  {id:4, t:"Futuro do Indicativo", s:""},
  {id:5, t:"Casos e 2ª Declinação", s:"Artigos e Substantivos"},
  {id:6, t:"1ª Declinação", s:"Substantivos"},
  {id:7, t:"Adjetivos", s:"Posição Atributiva/Predicativa"},
  {id:8, t:"Preposições", s:""},
  {id:9, t:"Pronomes", s:"Pessoais, Demonstrativos, Relativo"},
  {id:10, t:"Imperfeito", s:"Verbos Depoentes"},
  {id:11, t:"Aoristo: 2º Aoristo", s:"Introdução"},
  {id:12, t:"1º Aoristo", s:"Ativo, Médio, Passivo"},
  {id:13, t:"3ª Declinação", s:"Substantivos"},
  {id:14, t:"Particípio Presente", s:""},
  {id:15, t:"Particípios Aoristo", s:"Genitivo Absoluto"},
  {id:16, t:"Pronomes Interrogativos", s:"Indefinidos, Reflexivos"},
  {id:17, t:"Perfeito e Mais-que-Perfeito", s:""},
  {id:18, t:"Imperativo e Optativo", s:""},
  {id:19, t:"Infinitivo", s:""},
  {id:20, t:"Verbos Contraídos", s:"Conjugação em -μι"},
  {id:21, t:"Usos do Artigo", s:"Numerais"},
  {id:22, t:"Orações Condicionais", s:"Advérbios, Conjunções"},
  {id:23, t:"Crítica Textual", s:""},
  {id:24, t:"Como Continuar?", s:"Próximos Passos"},
];

const HB_LESSONS = [
  {id:1, t:"O Alfabeto", s:"22 letras hebraicas"},
  {id:2, t:"As Vogais", s:"Sistema massorético"},
  {id:3, t:"Sílabas, Shewa e Dagesh", s:""},
  {id:4, t:"O Substantivo", s:"Gênero e Número"},
  {id:5, t:"Pronomes e Artigo", s:""},
  {id:6, t:"Qal Perfeito", s:""},
  {id:7, t:"Sintaxe Verbal Básica", s:""},
  {id:8, t:"Mudanças Vocálicas", s:"Substantivos"},
  {id:9, t:"Preposições e Waw", s:""},
  {id:10, t:"O Adjetivo", s:""},
  {id:11, t:"Qal Imperfeito", s:""},
  {id:12, t:"Construto Singular", s:""},
  {id:13, t:"Construto Plural", s:""},
  {id:14, t:"Verbos Fracos — Guturais", s:""},
  {id:15, t:"Verbos I-Nun e III-He", s:""},
  {id:16, t:"Sufixos Pronominais", s:"Singular"},
  {id:17, t:"Demonstrativos e Relativo", s:""},
  {id:18, t:"Verbos I-Iod e I-Alef", s:""},
  {id:19, t:"Sufixos Pronominais", s:"Plural"},
  {id:20, t:"Qal Infinitivo", s:""},
  {id:21, t:"Qal Particípio Ativo", s:""},
  {id:22, t:"Sufixos em Preposições", s:""},
  {id:23, t:"Os Troncos Verbais", s:"Binyanim"},
  {id:24, t:"Como Continuar?", s:"Próximos Passos"},
];

const GK_GRAMMARS = [
  {name:"Bergmann (2024)", isBase:true},
  {name:"Rega & Bergmann (2004)", isBase:false},
  {name:"Dobson (1994)", isBase:false},
  {name:"Chamberlain (1989)", isBase:false},
  {name:"Wallace (2009)", isBase:false},
  {name:"Sousa (s.d.)", isBase:false},
  {name:"Freire S.J. (7ª ed.)", isBase:false},
];

const HB_GRAMMARS = [
  {name:"Kelley (1998)", isBase:true},
  {name:"Futato (2010)", isBase:false},
  {name:"Ross (2005)", isBase:false},
  {name:"Gusso (2005)", isBase:false},
  {name:"Mendes (s.d.)", isBase:false},
  {name:"Vita & Akil (s.d.)", isBase:false},
];

function App() {
  const [view, setView] = useState('home');
  const [lang, setLang] = useState(null);
  const [lesson, setLesson] = useState(null);

  const lessons = lang === 'gk' ? GK_LESSONS : HB_LESSONS;
  const grammars = lang === 'gk' ? GK_GRAMMARS : HB_GRAMMARS;
  const accent = lang === 'gk' ? 'var(--accent-gk)' : 'var(--accent-hb)';

  const selectLang = (l) => {
    setLang(l);
    setView('lessons');
    setLesson(null);
  };

  const selectLesson = (id) => {
    setLesson(id);
    setView('lesson');
  };

  return (
    <div className="app">
      {view !== 'home' && (
        <div className="sidebar">
          {lessons.map(l => (
            <div 
              key={l.id}
              className={`lesson-item ${lang === 'hb' ? 'hb' : ''} ${lesson === l.id ? 'active' : ''}`}
              onClick={() => selectLesson(l.id)}
            >
              <div className="lesson-title">Lição {l.id}</div>
              <div className="lesson-subtitle">{l.t}</div>
            </div>
          ))}
        </div>
      )}

      <div className="main">
        {view !== 'home' && (
          <div className="header">
            <div className="header-logo">
              {lang === 'gk' ? 'Ἑλ · ον' : 'עב'}
            </div>
            <div className="header-title">
              Línguas Bíblicas — {lang === 'gk' ? 'Grego do NT' : 'Hebraico Bíblico'}
            </div>
          </div>
        )}

        <div className="content">
          {view === 'home' && (
            <div className="home-section">
              <div className="home-title">Línguas Bíblicas</div>
              <div className="home-subtitle">Seminário Teológico</div>
              <div className="lang-cards">
                <div className="lang-card gk" onClick={() => selectLang('gk')}>
                  <div className="lang-symbol">Ἑλληνικά</div>
                  <div className="lang-name">Grego do NT</div>
                  <div className="lang-desc">24 lições • Bergmann (base) + 6 gramáticas</div>
                  <div className="lang-stats">
                    <div className="stat">
                      <div className="stat-num">24</div>
                      <div className="stat-label">Lições</div>
                    </div>
                    <div className="stat">
                      <div className="stat-num">0</div>
                      <div className="stat-label">Concluídas</div>
                    </div>
                    <div className="stat">
                      <div className="stat-num">7</div>
                      <div className="stat-label">Gramáticas</div>
                    </div>
                  </div>
                </div>

                <div className="lang-card hb" onClick={() => selectLang('hb')}>
                  <div className="lang-symbol">עברית</div>
                  <div className="lang-name">Hebraico Bíblico</div>
                  <div className="lang-desc">24 lições • Kelley (base) + 5 gramáticas</div>
                  <div className="lang-stats">
                    <div className="stat">
                      <div className="stat-num">24</div>
                      <div className="stat-label">Lições</div>
                    </div>
                    <div className="stat">
                      <div className="stat-num">0</div>
                      <div className="stat-label">Concluídas</div>
                    </div>
                    <div className="stat">
                      <div className="stat-num">6</div>
                      <div className="stat-label">Gramáticas</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {view === 'lessons' && (
            <div>
              <p style={{textAlign:'center', color:'var(--text3)', marginBottom:'20px'}}>
                Selecione uma lição no painel lateral
              </p>
            </div>
          )}

          {view === 'lesson' && lesson && (
            <div className="lesson-view">
              <div className="lesson-header">
                <div className="lesson-main-title">Lição {lesson}</div>
                <div className="lesson-main-subtitle">{lessons.find(l => l.id === lesson)?.t}</div>
              </div>

              <div className="tabs">
                <button className="tab active">Conteúdo</button>
                <button className="tab">Atividades</button>
              </div>

              <div className="tab-content active">
                <div className="content-text">
                  <h3>{lessons.find(l => l.id === lesson)?.t}</h3>
                  <p>Conteúdo da lição {lesson} em desenvolvimento...</p>
                  <div className={`tip-box ${lang === 'hb' ? 'hb' : ''}`}>
                    💡 Este é o espaço para o conteúdo completo da lição.
                  </div>
                </div>
              </div>

              <div className="grammars-section">
                <div className="grammars-title">Fontes desta lição</div>
                {grammars.map((g, i) => (
                  <div key={i} className={`grammar-item ${lang === 'hb' ? 'hb' : ''} ${g.isBase ? 'base' : ''}`}>
                    <div className="grammar-bullet" style={{background: g.isBase ? (lang === 'gk' ? 'var(--accent-gk)' : 'var(--accent-hb)') : 'var(--border)'}}></div>
                    <div>
                      {g.name}
                      {g.isBase && <span className="grammar-base">{lang === 'gk' ? 'BERGMANN' : 'KELLEY'}</span>}
                    </div>
                  </div>
                ))}
              </div>

              <div className="nav">
                {lesson > 1 && (
                  <button className="nav-btn" onClick={() => selectLesson(lesson - 1)}>
                    ← Lição {lesson - 1}
                  </button>
                )}
                <div></div>
                {lesson < 24 && (
                  <button className="nav-btn" onClick={() => selectLesson(lesson + 1)}>
                    Lição {lesson + 1} →
                  </button>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
