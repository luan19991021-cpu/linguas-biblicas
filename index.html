<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Línguas Bíblicas — Seminário</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f5f0;--sf:#fff;--sf2:#f2ede6;--bd:#e2d9cc;--tx:#1a1208;--tx2:#5c4a2a;--tx3:#8c7355;--gn:#2d6a4f;--gl:#e8f5ee;--bl:#1a3a6b;--bll:#e8f0fc;--gd:#b8860b;--gdl:#fdf8e8;--r:12px;--sh:0 2px 16px rgba(0,0,0,.08);--shl:0 8px 40px rgba(0,0,0,.14)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
/* HEADER */
.hdr{background:linear-gradient(135deg,#1a3d2b 0%,#2d6a4f 55%,#3d8b6f 100%);color:#fff;display:flex;align-items:center;gap:16px;min-height:64px;padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 2px 24px rgba(0,0,0,.25)}
.hdr-mark{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:-.02em;text-shadow:0 2px 8px rgba(0,0,0,.2);line-height:1;flex-shrink:0}
.hdr-sep{width:1px;height:32px;background:rgba(255,255,255,.25);flex-shrink:0}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:#fff;letter-spacing:.02em;line-height:1.1}
.hdr-title em{font-style:italic;color:#a8d5b5}
.hdr-sub{font-size:10.5px;color:rgba(255,255,255,.6);letter-spacing:.04em;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-h{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;padding:5px 14px;border-radius:18px;font-size:12px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.btn-h:hover{background:rgba(255,255,255,.22)}
/* LANG BAR */
.lbar{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);padding:0 28px;position:sticky;top:64px;z-index:99;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.ltab{display:flex;align-items:center;gap:8px;padding:12px 20px;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Inter',sans-serif;user-select:none}
.ltab:hover{color:var(--tx)}
.ltab.ag{color:var(--gn);border-bottom-color:var(--gn);font-weight:700}
.ltab.ah{color:var(--bl);border-bottom-color:var(--bl);font-weight:700}
.l-icon{font-family:'Noto Serif',serif;font-size:18px;font-weight:700}
.l-cnt{font-size:10px;background:var(--sf2);border-radius:8px;padding:1px 7px;color:var(--tx3)}
/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 104px)}
/* SIDEBAR */
.sbar{width:268px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);height:calc(100vh - 104px);position:sticky;top:104px;overflow-y:auto;display:flex;flex-direction:column}
.prog-w{padding:11px 14px;background:var(--sf2);border-bottom:1px solid var(--bd)}
.prog-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-bottom:5px;font-weight:500}
.prog-bar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}
.fill-g{background:linear-gradient(90deg,var(--gn),#52b788)}
.fill-b{background:linear-gradient(90deg,var(--bl),#4a90d9)}
.sbar-list{flex:1;padding:10px 10px 0;overflow-y:auto}
.li{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px}
.li:hover{background:var(--sf2)}
.li.ag{background:var(--gl)}.li.ag .linum,.li.ag .litit{color:var(--gn);font-weight:600}
.li.ah{background:var(--bll)}.li.ah .linum,.li.ah .litit{color:var(--bl);font-weight:600}
.linum{font-size:11px;font-weight:500;color:var(--tx3);width:24px;flex-shrink:0}
.lidot{width:7px;height:7px;border-radius:50%;flex-shrink:0;opacity:.4}
.li.ag .lidot,.li.ah .lidot{opacity:1}
.liinfo{flex:1;min-width:0}
.litit{font-size:12.5px;font-weight:500;color:var(--tx);line-height:1.3}
.lisub{font-size:10.5px;color:var(--tx3);line-height:1.2;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lichk{font-size:11px;flex-shrink:0;opacity:0}
.li.done .lichk{opacity:1}
/* GRAMMAR PANEL */
.gp{border-top:1px solid var(--bd);padding:12px;background:var(--sf2);margin-top:auto}
.gp-lbl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.gp-i{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:6px;margin-bottom:2px}
.gp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gp-nm{font-size:11px;color:var(--tx2);flex:1}
.gp-bdg{font-size:9px;padding:1px 6px;border-radius:8px;color:#fff;font-weight:700}
.add-btn{width:100%;margin-top:9px;padding:7px;border:1.5px dashed var(--bd);border-radius:8px;background:transparent;color:var(--tx3);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;text-align:center}
.add-btn:hover{border-color:var(--gn);color:var(--gn);background:var(--gl)}
.add-btn.hb:hover{border-color:var(--bl);color:var(--bl);background:var(--bll)}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:36px 40px;max-width:860px}
/* HOME */
.home{text-align:center;padding:50px 20px 30px}
.home-lg{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:700;line-height:1;margin-bottom:10px;display:flex;justify-content:center;gap:14px;align-items:baseline}
.home-lg .gk{color:var(--gn)}.home-lg .hb{color:var(--bl)}.home-lg .sep{color:var(--bd);font-size:38px}
.home-tit{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--tx);margin-bottom:6px}
.home-sub{font-size:13px;color:var(--tx3);margin-bottom:32px}
.home-cards{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:40px}
.lcard{background:var(--sf);border:2px solid var(--bd);border-radius:16px;padding:28px 30px;width:255px;cursor:pointer;transition:all .22s;text-align:left;position:relative;overflow:hidden}
.lcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.lcard.gk::after{background:linear-gradient(90deg,var(--gn),#52b788)}
.lcard.hb::after{background:linear-gradient(90deg,var(--bl),#4a90d9)}
.lcard:hover{box-shadow:var(--shl);transform:translateY(-3px)}
.lcard.gk:hover{border-color:var(--gn)}.lcard.hb:hover{border-color:var(--bl)}
.lc-sym{font-family:'Noto Serif',serif;font-size:46px;line-height:1;margin-bottom:12px;display:block}
.lc-sym.gk{color:var(--gn)}.lc-sym.hb{color:var(--bl)}
.lc-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--tx);margin-bottom:4px}
.lc-desc{font-size:12px;color:var(--tx3);line-height:1.5;margin-bottom:14px}
.lc-sts{display:flex;gap:12px}
.lc-sn{font-size:20px;font-weight:700;font-family:'Cormorant Garamond',serif}
.lc-sn.gk{color:var(--gn)}.lc-sn.hb{color:var(--bl)}
.lc-sl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em}
/* LANG HOME GRID */
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.lcard-sm{padding:14px 14px 14px 18px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.lcard-sm:hover{box-shadow:var(--sh);transform:translateY(-2px)}
/* LESSON */
.lhdr{margin-bottom:28px}
.bc{font-size:12px;color:var(--tx3);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.bcl{cursor:pointer;font-weight:500}
.bcl.gk{color:var(--gn)}.bcl.hb{color:var(--bl)}
.lbadge{display:inline-flex;align-items:center;border-radius:18px;font-size:11px;font-weight:600;padding:3px 11px;margin-bottom:10px;letter-spacing:.05em}
.bg{background:var(--gl);color:var(--gn)}.bb{background:var(--bll);color:var(--bl)}
.ltitle{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;color:var(--tx);line-height:1.1;margin-bottom:4px}
.lsubt{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;font-style:italic;color:var(--tx3);margin-bottom:14px}
.lmeta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.cbadge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;color:#fff}
.done-btn{padding:8px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.done-btn.gk{background:var(--gn);color:#fff}.done-btn.hb{background:var(--bl);color:#fff}
.done-btn.done{background:transparent!important;border:1.5px solid currentColor}
.done-btn.done.gk{color:var(--gn)}.done-btn.done.hb{color:var(--bl)}
/* VERSE */
.vbox{border-left:4px solid var(--gd);background:var(--gdl);border-radius:var(--r);padding:18px 22px;margin-bottom:28px;border:1px solid rgba(184,134,11,.18)}
.vlbl{font-size:9.5px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:7px}
.vtext{font-family:'Noto Serif',serif;font-size:21px;color:var(--tx);margin-bottom:6px;line-height:1.6}
.vtext.rtl{direction:rtl;text-align:right;font-size:23px}
.vtrans{font-size:13px;color:var(--tx2);font-style:italic}
/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--bd)}
.tab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Inter',sans-serif}
.tab:hover{color:var(--tx)}
/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:22px;margin-bottom:14px}
.ctit{font-size:10.5px;font-weight:700;color:var(--tx3);margin-bottom:14px;display:flex;align-items:center;gap:8px;letter-spacing:.07em;text-transform:uppercase}
.ctit::after{content:'';flex:1;height:1px;background:var(--bd)}
.topi{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13.5px;color:var(--tx2)}
.topi:last-child{border-bottom:none}
.topd{width:6px;height:6px;border-radius:50%;margin-top:7px;flex-shrink:0}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:7px}
.tchip{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:7px 11px}
.tlang{font-family:'Noto Serif',serif;font-size:16px;display:block;margin-bottom:2px}
.tlang.hb{direction:rtl;text-align:right;font-size:18px}
.tpt{font-size:11px;color:var(--tx3)}
/* AI */
.aic{font-size:14.5px;line-height:1.82;color:var(--tx2)}
.aic h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--tx);margin:22px 0 10px;line-height:1.2}
.aic h4{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin:18px 0 7px}
.aic p{margin-bottom:12px}
.aic .lw{font-family:'Noto Serif',serif;font-size:16px;font-weight:600}
.aic .lw.gk{color:var(--gn)}.aic .lw.hb{color:var(--bl)}
.aic table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.aic th{background:var(--sf2);padding:7px 11px;text-align:left;font-weight:600;color:var(--tx2);border:1px solid var(--bd);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em}
.aic td{padding:7px 11px;border:1px solid var(--bd);color:var(--tx2);vertical-align:top}
.aic .tip{background:var(--gl);border-left:3px solid var(--gn);border-radius:0 8px 8px 0;padding:11px 15px;margin:14px 0;font-size:13.5px}
.aic .tip.bl{background:var(--bll);border-left-color:var(--bl)}
.aic .warn{background:#fff8e1;border-left:3px solid var(--gd);border-radius:0 8px 8px 0;padding:11px 15px;margin:14px 0;font-size:13.5px;color:#5d4037}
.cit{display:inline-flex;align-items:center;gap:4px;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:2px 7px;font-size:10.5px;color:var(--tx3);margin:4px 3px;font-style:italic}
.citd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.refs{margin-top:22px;padding-top:18px;border-top:1px solid var(--bd)}
.reft{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.refi{display:flex;gap:9px;margin-bottom:7px;font-size:11.5px;color:var(--tx3);align-items:flex-start}
.refd{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
/* QUIZ */
.qcont{display:flex;flex-direction:column;gap:18px}
.qcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:22px;transition:all .2s}
.qcard.ok{border-color:#2d6a4f;background:#f0fff4}
.qcard.bad{border-color:#c0392b;background:#fff5f5}
.qnum{font-size:10.5px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px}
.qq{font-size:15px;font-weight:500;color:var(--tx);margin-bottom:14px;line-height:1.45}
.qopts{display:flex;flex-direction:column;gap:7px}
.qo{padding:10px 14px;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--tx2);transition:all .15s;background:var(--sf);text-align:left;font-family:'Inter',sans-serif;width:100%}
.qo:hover:not(:disabled){border-color:var(--gn);background:var(--gl)}
.qo.blhov:hover:not(:disabled){border-color:var(--bl);background:var(--bll)}
.qo.sok{border-color:#2d6a4f!important;background:#e8f5ee!important;color:#1b5e20!important}
.qo.sbad{border-color:#c0392b!important;background:#fff0f0!important;color:#b71c1c!important}
.qo.show{border-color:#2d6a4f!important;background:#e8f5ee!important;color:#1b5e20!important}
.qo:disabled{cursor:default}
.qfb{margin-top:11px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5}
.qfb.ok{background:#e8f5ee;color:#1b5e20}.qfb.bad{background:#fff0f0;color:#b71c1c}
.qscore{text-align:center;padding:36px 28px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r)}
.qsn{font-size:60px;font-weight:700;font-family:'Cormorant Garamond',serif;line-height:1}
.qsn.gk{color:var(--gn)}.qsn.hb{color:var(--bl)}
.qsl{font-size:13px;color:var(--tx3);margin-top:3px}
.qsm{font-size:17px;font-weight:500;color:var(--tx);margin:14px 0 22px}
/* LOADING */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px;color:var(--tx3)}
.sp{width:34px;height:34px;border:3px solid var(--bd);border-radius:50%;animation:spin .8s linear infinite}
.sp.gk{border-top-color:var(--gn)}.sp.hb{border-top-color:var(--bl)}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-size:13px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
/* NAV */
.lnav{display:flex;justify-content:space-between;align-items:center;margin-top:36px;padding-top:22px;border-top:1px solid var(--bd)}
.nb{display:flex;align-items:center;gap:7px;padding:9px 18px;border:1.5px solid var(--bd);border-radius:8px;background:var(--sf);color:var(--tx2);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;font-family:'Inter',sans-serif}
.nb.gk:hover{border-color:var(--gn);color:var(--gn)}.nb.hb:hover{border-color:var(--bl);color:var(--bl)}
.nb.pg{background:var(--gn);border-color:var(--gn);color:#fff}.nb.pg:hover{background:#235c43}
.nb.pb{background:var(--bl);border-color:var(--bl);color:#fff}.nb.pb:hover{background:#152d56}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.mod{background:var(--sf);border-radius:16px;padding:30px;width:480px;max-width:92vw;box-shadow:var(--shl)}
.modtit{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--tx);margin-bottom:6px}
.modsub{font-size:12.5px;color:var(--tx3);margin-bottom:22px;line-height:1.6}
.ua{border:2px dashed var(--bd);border-radius:12px;padding:36px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
.ua:hover,.ua.ov{border-color:var(--gn);background:var(--gl)}
.ua.hbm:hover,.ua.hbm.ov{border-color:var(--bl);background:var(--bll)}
.uaico{font-size:34px;margin-bottom:10px}
.uatxt{font-size:13.5px;color:var(--tx2)}
.uahnt{font-size:11.5px;color:var(--tx3);margin-top:3px}
.mi{width:100%;padding:9px 13px;border:1.5px solid var(--bd);border-radius:8px;font-size:13.5px;color:var(--tx);background:var(--sf);margin-bottom:10px;font-family:'Inter',sans-serif}
.mi:focus{outline:none;border-color:var(--gn)}
.mi.hbm:focus{border-color:var(--bl)}
.mact{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}
.bcnc{padding:9px 18px;border:1.5px solid var(--bd);border-radius:8px;background:transparent;color:var(--tx2);cursor:pointer;font-family:'Inter',sans-serif;font-size:13px}
.bok{padding:9px 18px;border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600}
.bok.gk{background:var(--gn)}.bok.hb{background:var(--bl)}
.bok:disabled{opacity:.5;cursor:not-allowed}
.adi{display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--sf2);border-radius:8px;font-size:12.5px;color:var(--tx2);margin-bottom:6px}
/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:#1a3d2b;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shl);z-index:300;animation:su .3s ease}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

</style>
<script>

const GK_GRAMMARS = [
  {id:"bergmann",name:"Bergmann (2024)",short:"Bergmann",full:"Introdução ao Grego Bíblico",base:true,color:"#2d6a4f"},
  {id:"rega",name:"Rega & Bergmann (2004)",short:"Rega",full:"Noções do Grego Bíblico: Gramática Fundamental",base:false,color:"#1d3557"},
  {id:"dobson",name:"Dobson (1994)",short:"Dobson",full:"Aprenda o Grego do Novo Testamento",base:false,color:"#457b9d"},
  {id:"chamberlain",name:"Chamberlain (1989)",short:"Chamberlain",full:"Gramática Exegética do Grego Neo-Testamentário",base:false,color:"#6d4c41"},
  {id:"wallace",name:"Wallace (2009)",short:"Wallace",full:"Gramática Grega: Uma Sintaxe Exegética do NT",base:false,color:"#4a148c"},
  {id:"koine",name:"Sousa (s.d.)",short:"Sousa",full:"Gramática de Grego Koinê",base:false,color:"#bf360c"},
  {id:"freire",name:"Freire S.J. (7ª ed.)",short:"Freire",full:"Gramática Grega — António Freire S.J.",base:false,color:"#33691e"},
];

const HB_GRAMMARS = [

function SearchResults({results,onSelect}){
  const ac=results.length>0&&results[0].lang==='greek'?'var(--gn)':'var(--bl)';
  return(
    <div style={{flex:1,overflow:'auto',padding:'28px 40px'}}>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:'var(--tx)',marginBottom:4}}>
        Resultados da Pesquisa
      </div>
      <div style={{fontSize:13,color:'var(--tx3)',marginBottom:22}}>{results.length} lição(ões) encontrada(s)</div>
      {results.length===0&&<div style={{color:'var(--tx3)',fontSize:14}}>Nenhum resultado encontrado. Tente outros termos.</div>}
      {results.map((r,i)=>(
        <div key={i} onClick={()=>onSelect(r.lang,r.lesson)}
          style={{background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:12,padding:18,marginBottom:12,cursor:'pointer',transition:'all .2s'}}
          onMouseEnter={e=>{e.currentTarget.style.boxShadow='var(--sh)';e.currentTarget.style.borderColor=r.lang==='greek'?'var(--gn)':'var(--bl)';}}
          onMouseLeave={e=>{e.currentTarget.style.boxShadow='';e.currentTarget.style.borderColor='var(--bd)';}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:8,background:r.lang==='greek'?'var(--gl)':'var(--bll)',color:r.lang==='greek'?'var(--gn)':'var(--bl)'}}>
              {r.lang==='greek'?'Grego NT':'Hebraico AT'}
            </span>
            <span style={{fontSize:13,fontWeight:600,color:'var(--tx)'}}>Lição {r.lesson.id} — {r.lesson.t}</span>
            {r.lesson.s&&<span style={{fontSize:11,color:'var(--tx3)'}}>{r.lesson.s}</span>}
          </div>
          {r.hits.map((h,j)=>(
            <div key={j} style={{display:'flex',gap:8,marginBottom:4}}>
              <span style={{fontSize:10,fontWeight:700,color:'var(--tx3)',background:'var(--sf2)',borderRadius:4,padding:'1px 6px',flexShrink:0,alignSelf:'flex-start',marginTop:2}}>{h.src}</span>
              <span style={{fontSize:12.5,color:'var(--tx2)',lineHeight:1.5}}>{h.text}</span>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}
const {useState,useEffect,useRef,useCallback}=React;

</script>
<script type="text/babel">
function App(){
  const [lang,setLang]=useState(null);
  const [lesson,setLesson]=useState(null);
  const [tab,setTab]=useState("conteudo");
  const [aiC,setAiC]=useState({});
  const [quizD,setQuizD]=useState({});
  const [ldC,setLdC]=useState(false);
  const [ldQ,setLdQ]=useState(false);
  const [ans,setAns]=useState({});
  const [fin,setFin]=useState({});
  const [gkDone,setGkDone]=useState(()=>{try{return JSON.parse(localStorage.getItem("gk_done")||"[]")}catch{return[]}});
  const [hbDone,setHbDone]=useState(()=>{try{return JSON.parse(localStorage.getItem("hb_done")||"[]")}catch{return[]}});
  const [gkCust,setGkCust]=useState(()=>{try{return JSON.parse(localStorage.getItem("gk_cust")||"[]")}catch{return[]}});
  const [hbCust,setHbCust]=useState(()=>{try{return JSON.parse(localStorage.getItem("hb_cust")||"[]")}catch{return[]}});
  const [showUp,setShowUp]=useState(false);
  const [upFile,setUpFile]=useState(null);
  const [upMeta,setUpMeta]=useState({a:"",t:"",y:""});
  const [drag,setDrag]=useState(false);
  const [toast,setToast]=useState(null);
  const [search,setSearch]=useState('');
  const [searchResults,setSearchResults]=useState(null);

  const doSearch=(q)=>{
    if(!q.trim()){setSearchResults(null);return;}
    const term=q.toLowerCase();
    const results=[];
    const langs=[['greek','gk',GK_LESSONS],['hebrew','hb',HB_LESSONS]];
    langs.forEach(([lng,key,lsns])=>{
      lsns.forEach(l=>{
        const ck=String(l.id);
        const cd=ALL_CONTENT[key]?.[ck];
        const hits=[];
        // search in topics
        l.top.forEach(t=>{if(t.toLowerCase().includes(term))hits.push({src:'Tópico',text:t});});
        // search in terms
        l.trm.forEach(t=>{if(t.toLowerCase().includes(term))hits.push({src:'Vocabulário',text:t});});
        // search in content
        if(cd?.c){
          const plain=cd.c.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');
          const idx=plain.toLowerCase().indexOf(term);
          if(idx>=0)hits.push({src:'Conteúdo',text:plain.slice(Math.max(0,idx-60),idx+120).trim()+'…'});
        }
        if(hits.length)results.push({lang:lng,lesson:l,hits:hits.slice(0,3)});
      });
    });
    setSearchResults(results);
  };

  const fRef=useRef(null);

  useEffect(()=>{try{localStorage.setItem("gk_done",JSON.stringify(gkDone))}catch{}},[gkDone]);
  useEffect(()=>{try{localStorage.setItem("hb_done",JSON.stringify(hbDone))}catch{}},[hbDone]);
  useEffect(()=>{try{localStorage.setItem("gk_cust",JSON.stringify(gkCust))}catch{}},[gkCust]);
  useEffect(()=>{try{localStorage.setItem("hb_cust",JSON.stringify(hbCust))}catch{}},[hbCust]);

  const isG=lang==="greek";
  const lessons=isG?GK_LESSONS:HB_LESSONS;
  const done=isG?gkDone:hbDone;
  const setDone=isG?setGkDone:setHbDone;
  const builtG=isG?GK_GRAMMARS:HB_GRAMMARS;
  const custG=isG?gkCust:hbCust;
  const setCustG=isG?setGkCust:setHbCust;
  const allG=[...builtG,...custG];
  const ac=isG?"gk":"hb";
  const acv=isG?"var(--gn)":"var(--bl)";
  const isDone=lesson?done.includes(lesson.id):false;
  const prog=Math.round((done.length/24)*100);

  const showT=(m)=>{setToast(m);setTimeout(()=>setToast(null),3000);};
  const markDone=(id)=>setDone(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  const genC=useCallback(async(l)=>{
    const k=`${lang}_c_${l.id}`;
    if(aiC[k]) return;
    const langKey=isG?'gk':'hb';

              <div className="gp-nm">{g.short}</div>
              {g.base&&<div className="gp-bdg" style={{background:g.color}}>BASE</div>}
              {g.isCustom&&<div style={{fontSize:9,background:"#e3f2fd",color:"#1565c0",padding:"1px 6px",borderRadius:8,fontWeight:700}}>+</div>}
            </div>
          ))}
          
        </div>
      </div>
    );
  };

  // UPLOAD MODAL
  const UpModal=()=>(
    <div className="mov" onClick={e=>e.target===e.currentTarget&&setShowUp(false)}>
      <div className="mod">
        <div className="modtit">Adicionar Gram{String.fromCharCode(225)}tica de {isG?"Grego":"Hebraico"}</div>
        <div className="modsub">
          Adicione uma gram{String.fromCharCode(225)}tica em PDF. Ela ser{String.fromCharCode(225)} automaticamente usada para enriquecer todas as li{String.fromCharCode(231)}{String.fromCharCode(245)}es, sempre referenciada quando citada.
        </div>
        <div className={`ua${drag?" ov":""}`+(!isG?" hbm":"")}
          onClick={()=>fRef.current?.click()}
          onDragOver={e=>{e.preventDefault();setDrag(true);}}
          onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0]);}}>
          <input ref={fRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
          <div className="uaico">{upFile?"📄":"📂"}</div>
          <div className="uatxt">{upFile?upFile.name:"Clique ou arraste o PDF aqui"}</div>
          <div className="uahnt">Apenas arquivos PDF</div>
        </div>
        <input className={`mi${!isG?" hbm":""}`} placeholder="Nome do(s) autor(es) *" value={upMeta.a} onChange={e=>setUpMeta(p=>({...p,a:e.target.value}))}/>
        <input className={`mi${!isG?" hbm":""}`} placeholder="Título completo da obra *" value={upMeta.t} onChange={e=>setUpMeta(p=>({...p,t:e.target.value}))}/>
        <input className={`mi${!isG?" hbm":""}`} placeholder="Ano de publicação (opcional)" value={upMeta.y} onChange={e=>setUpMeta(p=>({...p,y:e.target.value}))}/>
        {custG.length>0&&(
          <div style={{marginTop:12}}>
            <div style={{fontSize:10,color:"var(--tx3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginBottom:6}}>J{String.fromCharCode(225)} adicionadas</div>
            {custG.map(g=>(
              <div key={g.id} className="adi">
                <div style={{width:8,height:8,borderRadius:"50%",background:g.color,flexShrink:0}}/>
                <div style={{flex:1}}>{g.full}</div>
                <button style={{background:"none",border:"none",color:"var(--tx3)",cursor:"pointer",fontSize:17}} onClick={()=>setCustG(p=>p.filter(x=>x.id!==g.id))}>{String.fromCharCode(215)}</button>
              </div>
            ))}
          </div>
        )}
        <div className="mact">
          <button className="bcnc" onClick={()=>{setShowUp(false);setUpFile(null);setUpMeta({a:"",t:"",y:""});}}>Cancelar</button>
          <button className={`bok ${isG?"gk":"hb"}`} disabled={!upFile||!upMeta.a||!upMeta.t} onClick={addGrammar}>
            Adicionar {String.fromCharCode(224)} biblioteca
          </button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-mark" onClick={()=>{setLang(null);setLesson(null);}}>{"\u0395\u03bb \u00b7 \u05e2\u05d1"}</div>
        <div className="hdr-sep"/>
        <div>
          <div className="hdr-title">L{String.fromCharCode(237)}nguas <em>B{String.fromCharCode(237)}blicas</em></div>
          <div className="hdr-sub">Grego NT {String.fromCharCode(183)} Hebraico AT {String.fromCharCode(183)} Semin{String.fromCharCode(225)}rio</div>
        </div>
        <div className="hdr-right">
          {lang&&lesson&&<button className="btn-h" onClick={()=>setLesson(null)}>{String.fromCharCode(8592)} Li{String.fromCharCode(231)}{String.fromCharCode(245)}es</button>}
          {lang&&!lesson&&<button className="btn-h" onClick={()=>setLang(null)}>{String.fromCharCode(8592)} In{String.fromCharCode(237)}cio</button>}
          
        </div>
      </div>

      {/* LANG BAR */}
      <div className="lbar">
        <div className={`ltab${lang==="greek"?" ag":""}`} onClick={()=>{setLang("greek");setLesson(null);}}>
          <span className="l-icon" style={{color:"var(--gn)"}}>{String.fromCharCode(913)}</span>
          Grego do NT
          <span className="l-cnt">{gkDone.length}/24</span>
        </div>
        <div className={`ltab${lang==="hebrew"?" ah":""}`} onClick={()=>{setLang("hebrew");setLesson(null);}}>
          <span className="l-icon" style={{color:"var(--bl)"}}>{String.fromCharCode(1488)}</span>
          Hebraico B{String.fromCharCode(237)}blico
          <span className="l-cnt">{hbDone.length}/24</span>
        </div>
      </div>


      {/* SEARCH BAR */}
      <div style={{background:'var(--sf)',borderBottom:'1px solid var(--bd)',padding:'8px 28px',display:'flex',gap:10,alignItems:'center'}}>
        <div style={{flex:1,position:'relative',maxWidth:600}}>
          <input
            value={search}
            onChange={e=>{setSearch(e.target.value);doSearch(e.target.value);}}
            placeholder="🔍 Pesquisar conceito em todas as gramáticas... (ex: subjuntivo, dagesh, construto)"
            style={{width:'100%',padding:'8px 14px',border:'1.5px solid var(--bd)',borderRadius:8,fontSize:13,fontFamily:"'Inter',sans-serif",background:'var(--sf)',color:'var(--tx)',outline:'none'}}
            onFocus={e=>e.target.style.borderColor='var(--gn)'}
            onBlur={e=>e.target.style.borderColor='var(--bd)'}
          />
        </div>
        {searchResults&&<button onClick={()=>{setSearch('');setSearchResults(null);}} style={{fontSize:12,color:'var(--tx3)',background:'none',border:'none',cursor:'pointer'}}>{String.fromCharCode(10005)} Limpar</button>}
      </div>

      {searchResults ? <SearchResults results={searchResults} onSelect={(lng,l)=>{setLang(lng);setLesson(l);setTab('conteudo');setSearchResults(null);setSearch('');}} /> : <div className="layout">
        <Sidebar/>
        <div className="main">
          {!lang&&<Home/>}
          {lang&&!lesson&&<LangHome/>}
          {lang&&lesson&&<LessonView/>}
        </div>
      </div>

      
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);


</script>
</body>
</html>
