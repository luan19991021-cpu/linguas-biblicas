o.", "bad": "NA28 é o padrão acadêmico. Textus Receptus foi a base das traduções históricas (KJV, ARC)."}, {"q": "O princípio 'a leitura mais difícil é geralmente mais original' se baseia em:", "opts": ["Copistas tendiam a simplificar textos difíceis", "Copistas tendiam a complicar textos simples", "Textos mais difíceis são mais recentes", "Não é um princípio real da crítica textual"], "c": 0, "ok": "Correto! Copistas tendiam a suavizar ou explicar textos difíceis — por isso a leitura mais difícil provavelmente é original.", "bad": "Copistas tendiam a simplificar textos difíceis. Logo, a leitura mais difícil foi menos alterada — mais provável de ser original."}, {"q": "θεόπνευστος em 2Tm 3.16 é um hapax legomenon. Isso significa:", "opts": ["É uma palavra muito frequente no NT", "Ocorre apenas uma vez no NT", "É uma palavra emprestada do latim", "É uma variante textual"], "c": 1, "ok": "Correto! Hapax legomenon = palavra que ocorre apenas uma vez no corpus estudado.", "bad": "Hapax legomenon = 'dito uma vez' — palavra que aparece apenas uma vez. θεόπνευστος é exclusivo de 2Tm 3.16 no NT."}, {"q": "O Textus Receptus foi a base de qual tradução histórica importante?", "opts": ["Nova Versão Internacional", "King James Version (KJV) e Almeida Revista e Corrigida", "NA28", "UBS5"], "c": 1, "ok": "Correto! O Textus Receptus foi a base da KJV (1611) e da Almeida Revista e Corrigida.", "bad": "O Textus Receptus foi a base da KJV inglesa e da Almeida Revista e Corrigida (ARC) portuguesa."}, {"q": "Os papiros são os manuscritos do NT mais antigos. O mais antigo fragmento do NT é:", "opts": ["P⁴⁵", "P⁴⁶", "P⁵² (fragmento de João, séc. II)", "P⁶⁶"], "c": 2, "ok": "Correto! P⁵² (Papiro Rylands) é o fragmento mais antigo do NT — contém Jo 18.31-33, datado de aproximadamente 125 d.C.", "bad": "P⁵² é o fragmento mais antigo — contém Jo 18.31-33, datado de cerca de 125 d.C."}, {"q": "Qual afirmação sobre variantes textuais é correta?", "opts": ["Variantes afetam doutrinas cristãs fundamentais", "A maioria das variantes é ortográfica ou de ordem de palavras sem impacto teológico", "Os manuscritos são todos idênticos", "Variantes tornam o NT não confiável"], "c": 1, "ok": "Correto! A imensa maioria das variantes é trivial — nenhuma doutrina fundamental é afetada.", "bad": "A maioria das variantes é ortográfica ou de palavra sem impacto doutrinário. O NT é o documento mais bem atestado da Antiguidade."}]}, "24": {"c": "<h3>Parabéns — Você Concluiu a Introdução ao Grego Bíblico!</h3>\n<p>Ao completar estas 24 lições, você adquiriu as bases fundamentais para leitura do Novo Testamento no original grego. Este é o início de uma jornada que se aprofunda a cada nova leitura do texto sagrado.</p>\n<h3>O Que Você Aprendeu</h3>\n<p>• O alfabeto grego e o sistema de acentos e espíritos</p>\n<p>• O sistema verbal: aspecto linear, pontual e resultante</p>\n<p>• As três declinações nominais e o sistema de casos</p>\n<p>• Os modos: indicativo, subjuntivo, imperativo, optativo, infinitivo, particípio</p>\n<p>• Os tempos: presente, imperfeito, futuro, aoristo, perfeito</p>\n<p>• Sintaxe básica: orações condicionais, pronomes, preposições</p>\n<p>• Introdução à crítica textual do NT</p>\n<h3>Como Consolidar o Vocabulário</h3>\n<p>Recomenda-se memorizar as palavras que ocorrem mais de 50 vezes no NT (cerca de 310 palavras). Com elas, você consegue ler cerca de 80% do texto do NT. Ferramentas úteis:</p>\n<p>• <strong>Flashcards digitais</strong>: Anki com baralhos de vocabulário grego</p>\n<p>• <strong>Leitura diária</strong>: comece pelo Evangelho de João (grego mais simples)</p>\n<p>• <strong>Análise morfológica</strong>: biblehub.com, logos, Olive Tree</p>\n<h3>Ferramentas Indispensáveis</h3>\n<p>• <strong>BDAG</strong> (Danker) — o léxico grego-inglês padrão do NT</p>\n<p>• <strong>Liddell-Scott</strong> — léxico do grego clássico</p>\n<p>• <strong>Interlinear grego-português</strong> (Ed. Vida Nova)</p>\n<p>• <strong>Gramática de Referência</strong>: Wallace, <em>Greek Grammar Beyond the Basics</em></p>\n<div class=\"tip\">💡 Dobson conclui: \"O grego do NT não é difícil — é diferente. Quando você se acostuma com a diferença, descobre que é uma língua de extraordinária precisão e beleza.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#457b9d\"></span> Dobson, Aprenda o Grego do NT</span></div>\n<h3>Próximos Passos</h3>\n<p>1. <strong>Gramática intermediária</strong>: Wallace, <em>Greek Grammar Beyond the Basics</em></p>\n<p>2. <strong>Leitura guiada</strong>: comece com 1 João (vocabulário simples, teologia profunda)</p>\n<p>3. <strong>Exegese</strong>: use o grego em seus estudos bíblicos e sermões</p>\n<p>4. <strong>Hebraico</strong>: complemente com o estudo do AT no original</p>\n<h3>Palavra Final</h3>\n<p><span class=\"lw gk\">σπούδασον σεαυτὸν δόκιμον παραστῆσαι τῷ θεῷ, ἐργάτην ἀνεπαίσχυντον, ὀρθοτομοῦντα τὸν λόγον τῆς ἀληθείας</span> — \"Procura apresentar-te a Deus aprovado, como obreiro que não tem de que se envergonhar, que maneja bem a palavra da verdade.\" (2Tm 2.15)</p>", "q": [{"q": "Com quais palavras do NT você consegue ler cerca de 80% do texto?", "opts": ["Palavras que ocorrem mais de 500 vezes", "Palavras que ocorrem mais de 50 vezes (cerca de 310 palavras)", "Apenas os verbos", "As 100 palavras mais frequentes"], "c": 1, "ok": "Correto! Com as cerca de 310 palavras que ocorrem mais de 50 vezes, você lê cerca de 80% do NT.", "bad": "As ~310 palavras que ocorrem mais de 50 vezes cobrem cerca de 80% do NT grego."}, {"q": "Qual evangelho tem o grego mais simples e é recomendado para começar a leitura?", "opts": ["Mateus", "Marcos", "Lucas", "João"], "c": 3, "ok": "Correto! O Evangelho de João usa vocabulário simples e repetitivo — ideal para começar.", "bad": "João tem o vocabulário mais simples e repetitivo do NT — ideal para quem está começando a ler em grego."}, {"q": "O léxico BDAG foi produzido por:", "opts": ["Bergmann", "Danker (revisão de Bauer)", "Wallace", "Dobson"], "c": 1, "ok": "Correto! BDAG = Bauer-Danker-Arndt-Gingrich — o léxico padrão do grego do NT.", "bad": "BDAG = Bauer-Danker-Arndt-Gingrich. Danker fez a última revisão — é o léxico grego-inglês padrão do NT."}, {"q": "2Timóteo 2.15 usa o verbo ὀρθοτομοῦντα. Sua tradução é:", "opts": ["Guardando a palavra", "Que maneja bem / corta reto a palavra da verdade", "Que prega a palavra", "Que estuda a palavra"], "c": 1, "ok": "Correto! ὀρθοτομέω = cortar reto, manejar bem — imagem de artesão que trabalha com precisão.", "bad": "ὀρθοτομέω = 'cortar reto' — imagem de artesão ou alfaiate que trabalha com precisão. Aplicado ao manejo das Escrituras."}, {"q": "Qual é a sigla do léxico padrão do grego do NT usado academicamente?", "opts": ["LSJ", "BDAG", "HALOT", "BDB"], "c": 1, "ok": "Correto! BDAG (Bauer-Danker-Arndt-Gingrich) é o léxico grego-inglês padrão do NT.", "bad": "BDAG é o padrão para o NT grego. HALOT e BDB são léxicos de hebraico; LSJ é do grego clássico."}, {"q": "Para aprendizado e revisão de vocabulário grego, qual ferramenta digital é recomendada?", "opts": ["Google Translate", "Anki com baralhos de vocabulário grego", "Wikipedia", "Word"], "c": 1, "ok": "Correto! Anki é um software de repetição espaçada excelente para memorização de vocabulário.", "bad": "Anki usa repetição espaçada — ideal para memorizar vocabulário grego de forma eficiente."}, {"q": "σπούδασον em 2Tm 2.15 é um imperativo aoristo que significa:", "opts": ["Estuda continuamente (hábito)", "Procura / aplica-te (ação pontual decisiva)", "Estudava", "Estudará"], "c": 1, "ok": "Correto! Imperativo aoristo = ação pontual e decisiva — 'aplica-te', 'faz questão de', 'procura'.", "bad": "Imperativo aoristo = ação decisiva e pontual. 'Procura apresentar-te' — uma decisão intencional."}, {"q": "Qual das seguintes afirmações resume o estudo do grego bíblico?", "opts": ["É indispensável para ser cristão", "É uma ferramenta de precisão para interpretar o texto sagrado no original", "É apenas para especialistas", "Substitui a fé pela técnica"], "c": 1, "ok": "Correto! O grego é uma ferramenta de precisão exegética — não substitui a fé, mas enriquece o encontro com o texto sagrado.", "bad": "O grego é uma ferramenta de precisão exegética — permite acessar o texto sagrado com maior fidelidade ao original."}]}}, "hb": {"1": {"c": "<h3>O Alfabeto Hebraico</h3><p>O hebraico bíblico possui <strong>22 letras</strong>, todas consoantes. A escrita vai da <strong>direita para a esquerda</strong>.</p><table><tr><th>Letra</th><th>Nome</th><th>Som</th></tr><tr><td><span class='lw hb'>א</span></td><td>Alef</td><td>sem som</td></tr><tr><td><span class='lw hb'>ב/ב</span></td><td>Bet/Vet</td><td>b / v</td></tr><tr><td><span class='lw hb'>ג</span></td><td>Guimel</td><td>g</td></tr><tr><td><span class='lw hb'>ד</span></td><td>Dalet</td><td>d</td></tr><tr><td><span class='lw hb'>ה</span></td><td>He</td><td>h</td></tr><tr><td><span class='lw hb'>ו</span></td><td>Vav</td><td>v</td></tr><tr><td><span class='lw hb'>ז</span></td><td>Zain</td><td>z</td></tr><tr><td><span class='lw hb'>ח</span></td><td>Het</td><td>ch gutural</td></tr><tr><td><span class='lw hb'>ט</span></td><td>Tet</td><td>t</td></tr><tr><td><span class='lw hb'>י</span></td><td>Yod</td><td>y</td></tr><tr><td><span class='lw hb'>כ/ך</span></td><td>Caf/Caf final</td><td>k / ch</td></tr><tr><td><span class='lw hb'>ל</span></td><td>Lamed</td><td>l</td></tr><tr><td><span class='lw hb'>מ/ם</span></td><td>Mem/Mem final</td><td>m</td></tr><tr><td><span class='lw hb'>נ/ן</span></td><td>Nun/Nun final</td><td>n</td></tr><tr><td><span class='lw hb'>ס</span></td><td>Samech</td><td>s</td></tr><tr><td><span class='lw hb'>ע</span></td><td>Ayin</td><td>gutural</td></tr><tr><td><span class='lw hb'>פ/ף</span></td><td>Pê/Pe final</td><td>p / f</td></tr><tr><td><span class='lw hb'>צ/ץ</span></td><td>Tzade/final</td><td>tz</td></tr><tr><td><span class='lw hb'>ק</span></td><td>Qof</td><td>q</td></tr><tr><td><span class='lw hb'>ר</span></td><td>Resh</td><td>r</td></tr><tr><td><span class='lw hb'>שׁ/שׂ</span></td><td>Shin/Sin</td><td>sh / s</td></tr><tr><td><span class='lw hb'>ת</span></td><td>Tav</td><td>t</td></tr></table><h3>Letras com Forma Final</h3><p>Cinco letras têm forma especial no final de palavra: כ→ך, מ→ם, נ→ן, פ→ף, צ→ץ</p><h3>Letras Guturais</h3><p>As letras <span class='lw hb'>א, ה, ח, ע</span> são guturais — têm comportamento gramatical especial.</p><div class='tip'>💡 Vita &amp; Akil: 'Saber o alfabeto é aprender 50% do hebraico.' <span class='cit'><span class='citd' style='background:#6a0572'></span> Vita &amp; Akil, Noções Básicas</span></div><h3>Aplicação Exegética</h3><p>Gênesis 1.1 começa com <span class='lw hb'>בְּרֵאשִׁית</span> — letras: Bet-Resh-Alef-Shin-Yod-Tav. O prefixo <span class='lw hb'>בְּ</span> = 'em/no'.</p>", "q": [{"q": "Quantas letras tem o alfabeto hebraico?", "opts": ["24", "22", "26", "20"], "c": 1, "ok": "Correto! O alfabeto hebraico tem 22 letras.", "bad": "O hebraico tem 22 letras (o grego tem 24; o latino tem 26)."}, {"q": "A escrita hebraica vai em que direção?", "opts": ["Esquerda para direita", "Direita para esquerda", "Cima para baixo", "Alternada"], "c": 1, "ok": "Correto! O hebraico se escreve e lê da direita para a esquerda.", "bad": "O hebraico se escreve da direita para a esquerda."}, {"q": "Qual letra hebraica não tem som próprio?", "opts": ["ב", "א", "ל", "ר"], "c": 1, "ok": "Correto! א (Alef) não tem som consonantal — carrega apenas o som da vogal.", "bad": "א (Alef) é a gutural sem som — serve de suporte para a vogal."}, {"q": "Quais letras têm forma especial no final de palavra?", "opts": ["א, ב, ג, ד, ה", "כ, מ, נ, פ, צ", "ל, ר, ש, ת, ו", "ח, ט, י, ס, ע"], "c": 1, "ok": "Correto! As cinco letras finais: כ→ך, מ→ם, נ→ן, פ→ף, צ→ץ", "bad": "As cinco letras finais são כ, מ, נ, פ, צ."}, {"q": "As letras guturais do hebraico são:", "opts": ["ב, ג, ד, כ, פ, ת", "א, ה, ח, ע", "מ, נ, ס, ל, ר", "ז, ו, י, ש, ת"], "c": 1, "ok": "Correto! As guturais são א, ה, ח, ע (e às vezes ר).", "bad": "As guturais são א, ה, ח, ע. Elas não recebem dagesh forte."}, {"q": "שׁ (com ponto à direita) pronuncia-se como:", "opts": ["S", "SH (de show)", "Z", "T"], "c": 1, "ok": "Correto! שׁ = sh. שׂ (ponto à esquerda) = s.", "bad": "שׁ (Shin, ponto à direita) = sh. שׂ (Sin, ponto à esquerda) = s."}, {"q": "A 1ª palavra de Gênesis (בְּרֵאשִׁית) começa com qual letra?", "opts": ["ר", "א", "ב", "ש"], "c": 2, "ok": "Correto! ב (Bet) — aqui como prefixo preposicional בְּ (em/no).", "bad": "ב (Bet) é a primeira letra — funciona como preposição prefixada 'em/no'."}, {"q": "Qual o valor numérico de ש (Shin)?", "opts": ["100", "200", "300", "400"], "c": 2, "ok": "Correto! ש = 300.", "bad": "ש = 300. ק = 100; ר = 200; ת = 400."}]}, "2": {"c": "<h3>As Vogais Hebraicas</h3><p>Os <strong>massoretas</strong> (500-1000 d.C.) criaram os sinais vocálicos para preservar a pronúncia correta do texto sagrado.</p><h3>Vogais Longas</h3><table><tr><th>Nome</th><th>Som</th><th>Símbolo</th></tr><tr><td>Qametz</td><td>a longo</td><td>ָ</td></tr><tr><td>Tsere</td><td>e longo</td><td>ֵ</td></tr><tr><td>Hiriq-Yod</td><td>i longo</td><td>ִי</td></tr><tr><td>Holem</td><td>o longo</td><td>ֹ</td></tr><tr><td>Shureq</td><td>u longo</td><td>וּ</td></tr></table><h3>Vogais Breves</h3><table><tr><th>Nome</th><th>Som</th></tr><tr><td>Patah</td><td>a breve</td></tr><tr><td>Segol</td><td>e breve</td></tr><tr><td>Hiriq</td><td>i breve</td></tr><tr><td>Qametz-Hatuf</td><td>o breve</td></tr><tr><td>Qibutz</td><td>u breve</td></tr></table><h3>Vogais Reduzidas (Hateph)</h3><p>Sob as guturais: <span class='lw hb'>ֲ</span> (a), <span class='lw hb'>ֱ</span> (e), <span class='lw hb'>ֳ</span> (o)</p><div class='tip'>💡 Futato: 'As vogais são colocadas sob/sobre as consoantes. Aprenda a posição de cada uma.' <span class='cit'><span class='citd' style='background:#1b5e20'></span> Futato, Introdução ao Hebraico Bíblico</span></div><h3>Aplicação Exegética</h3><p>O Tetragrama <span class='lw hb'>יְהוָה</span> (YHWH) combina consoantes de יהוה com vogais de אֲדֹנָי — os massoretas queriam lembrar os leitores de dizer 'Adonai'.</p>", "q": [{"q": "Quem criou o sistema de sinais vocálicos?", "opts": ["Os profetas", "Os massoretas (500-1000 d.C.)", "Moisés", "Os apóstolos"], "c": 1, "ok": "Correto! Os massoretas criaram o sistema vocálico.", "bad": "Os massoretas (500-1000 d.C.) criaram o nikud para preservar a pronúncia."}, {"q": "O Qametz (ָ) representa:", "opts": ["O breve", "A longo", "E longo", "U breve"], "c": 1, "ok": "Correto! Qametz = A longo.", "bad": "Qametz = A longo. Patah = A breve."}, {"q": "O Shureq (וּ) é:", "opts": ["A breve", "E longo", "U longo", "O breve"], "c": 2, "ok": "Correto! Shureq = U longo.", "bad": "Shureq = U longo (vav + ponto: וּ)."}, {"q": "Hateph-Patah aparece especialmente:", "opts": ["Sob qualquer consoante", "Sob as letras guturais", "Sobre letras finais", "No início de palavra"], "c": 1, "ok": "Correto! Hatephs aparecem sob as guturais.", "bad": "Hatephs (shewas compostos) aparecem sob as guturais — elas não aceitam shewa simples."}, {"q": "O Tsere (ֵ) representa:", "opts": ["A longo", "E longo", "I longo", "O longo"], "c": 1, "ok": "Correto! Tsere = E longo.", "bad": "Tsere = E longo (dois pontos horizontais: ֵ)."}, {"q": "A pronúncia 'Jeová' resulta de:", "opts": ["Tradução do aramaico", "Consoantes de YHWH + vogais de Adonai", "Tradição dos apóstolos", "Manuscrito específico"], "c": 1, "ok": "Correto! 'Jeová' = consoantes יהוה + vogais de אֲדֹנָי — leitura híbrida não intencional.", "bad": "'Jeová' = consoantes de YHWH lidas com as vogais de Adonai."}, {"q": "Quantas vogais longas tem o sistema massorético?", "opts": ["3", "5", "7", "10"], "c": 1, "ok": "Correto! 5 vogais longas: Qametz, Tsere, Hiriq-Yod, Holem, Shureq.", "bad": "5 vogais longas: Qametz (A), Tsere (E), Hiriq-Yod (I), Holem (O), Shureq (U)."}, {"q": "O Patah (ַ) é:", "opts": ["A longo", "A breve", "E breve", "E longo"], "c": 1, "ok": "Correto! Patah = A breve. Qametz = A longo.", "bad": "Patah = A breve (traço simples). Qametz = A longo (traço + ponto)."}]}, "3": {"c": "<h3>Sílabas, Shewa e Dagesh</h3><p>Toda sílaba hebraica começa com consoante. Sílaba <strong>aberta</strong>: termina em vogal. Sílaba <strong>fechada</strong>: termina em consoante.</p><h3>O Shewa</h3><p>• <strong>Sonoro</strong>: no início de palavra ou sílaba — pronunciado levemente<br>• <strong>Mudo</strong>: no final de sílaba — não se pronuncia</p><div class='tip'>💡 Regra: dois shewas seguidos — o 1.º é mudo, o 2.º é sonoro.</div><h3>O Dagesh</h3><p>• <strong>Dagesh Fraco (Lene)</strong>: nas letras BeGaDKeFaT (<span class='lw hb'>ב,ג,ד,כ,פ,ת</span>) — indica pronúncia oclusiva<br>• <strong>Dagesh Forte (Hazaq)</strong>: duplica a consoante que o recebe</p><table><tr><th>Com Dagesh</th><th>Sem Dagesh</th></tr><tr><td><span class='lw hb'>בּ</span> = b</td><td><span class='lw hb'>ב</span> = v</td></tr><tr><td><span class='lw hb'>פּ</span> = p</td><td><span class='lw hb'>פ</span> = f</td></tr><tr><td><span class='lw hb'>כּ</span> = k</td><td><span class='lw hb'>כ</span> = ch</td></tr></table><div class='warn'>⚠️ Guturais (א, ה, ח, ע) NUNCA recebem dagesh forte.</div><h3>Aplicação Exegética</h3><p>Em <span class='lw hb'>בְּרֵאשִׁית</span>, o ב tem shewa sonoro (início de palavra) — pronuncia-se 'be-'. Reconhecer shewa e dagesh é fundamental para leitura correta.</p>", "q": [{"q": "Sílaba fechada termina em:", "opts": ["Vogal", "Consoante", "Duas consoantes", "Gutural"], "c": 1, "ok": "Correto! Sílaba fechada termina em consoante. Aberta termina em vogal.", "bad": "Sílaba fechada = termina em consoante; aberta = termina em vogal."}, {"q": "O dagesh forte duplica:", "opts": ["A vogal seguinte", "A consoante que o recebe", "O radical verbal", "O artigo"], "c": 1, "ok": "Correto! Dagesh forte duplica a consoante.", "bad": "Dagesh forte duplica a consoante que o recebe."}, {"q": "Quais letras formam o grupo BeGaDKeFaT?", "opts": ["א, ה, ח, ע", "ב, ג, ד, כ, פ, ת", "מ, נ, ס, ל, ר", "ז, ו, י, ש, ק"], "c": 1, "ok": "Correto! ב,ג,ד,כ,פ,ת recebem dagesh fraco.", "bad": "BeGaDKeFaT = ב,ג,ד,כ,פ,ת."}, {"q": "As guturais recebem dagesh forte?", "opts": ["Sim", "Não — a vogal anterior é alongada", "Às vezes", "Apenas o dagesh fraco"], "c": 1, "ok": "Correto! Guturais nunca recebem dagesh forte.", "bad": "Guturais nunca recebem dagesh forte — a vogal anterior é alongada compensatoriamente."}, {"q": "Shewa sonoro ocorre:", "opts": ["No final de sílaba", "No início de palavra ou sílaba", "Apenas sob guturais", "Apenas em verbos"], "c": 1, "ok": "Correto! Shewa sonoro = início de palavra ou sílaba.", "bad": "Shewa sonoro = início. Shewa mudo = final de sílaba."}, {"q": "ב sem dagesh pronuncia-se como:", "opts": ["b", "v", "p", "f"], "c": 1, "ok": "Correto! ב sem dagesh = v. בּ com dagesh = b.", "bad": "ב sem dagesh = v. בּ com dagesh = b."}, {"q": "Dois shewas consecutivos: o primeiro é _____, o segundo é _____:", "opts": ["Sonoro / mudo", "Mudo / sonoro", "Ambos sonoros", "Ambos mudos"], "c": 1, "ok": "Correto! 1.º = mudo (fecha sílaba), 2.º = sonoro (abre nova sílaba).", "bad": "1.º shewa = mudo; 2.º = sonoro."}, {"q": "פּ com dagesh pronuncia-se como:", "opts": ["f", "p", "b", "v"], "c": 1, "ok": "Correto! פּ com dagesh = p; פ sem dagesh = f.", "bad": "פּ com dagesh = p; פ sem dagesh = f."}]}, "4": {"c": "<h3>O Substantivo Hebraico</h3><p>Gênero (masculino/feminino) e número (singular, plural, dual).</p><table><tr><th>Número</th><th>Masc.</th><th>Fem.</th><th>Terminação</th></tr><tr><td>Singular</td><td><span class='lw hb'>סוּס</span></td><td><span class='lw hb'>סוּסָה</span></td><td>m: zero; f: ָה</td></tr><tr><td>Plural</td><td><span class='lw hb'>סוּסִים</span></td><td><span class='lw hb'>סוּסוֹת</span></td><td>m: ִים; f: וֹת</td></tr><tr><td>Dual</td><td colspan='2'><span class='lw hb'>יָדַיִם</span> (mãos)</td><td>ַיִם</td></tr></table><h3>Plurais Irregulares</h3><table><tr><th>Singular</th><th>Plural</th><th>Tradução</th></tr><tr><td><span class='lw hb'>אִישׁ</span></td><td><span class='lw hb'>אֲנָשִׁים</span></td><td>homem/homens</td></tr><tr><td><span class='lw hb'>אִשָּׁה</span></td><td><span class='lw hb'>נָשִׁים</span></td><td>mulher/mulheres</td></tr><tr><td><span class='lw hb'>בַּיִת</span></td><td><span class='lw hb'>בָּתִּים</span></td><td>casa/casas</td></tr><tr><td><span class='lw hb'>יוֹם</span></td><td><span class='lw hb'>יָמִים</span></td><td>dia/dias</td></tr></table><div class='warn'>⚠️ שָׁמַיִם (céus) é sempre dual — nunca aparece no singular.</div><div class='tip'>💡 Kelley: 'Aprenda cada substantivo com seu gênero.' <span class='cit'><span class='citd' style='background:#1a3a6b'></span> Kelley</span></div><h3>Aplicação Exegética</h3><p>Gênesis 1.1: <span class='lw hb'>הַשָּׁמַיִם</span> (os céus) é sempre dual — cosmovisão hebraica do céu como esfera que envolve a terra. Gusso aponta que o dual pode refletir a ideia de 'esfera superior e inferior da atmosfera'. <span class='cit'><span class='citd' style='background:#2e4057'></span> Gusso</span></p>", "q": [{"q": "A terminação do plural masculino hebraico é:", "opts": ["וֹת", "ִים", "ַיִם", "ָה"], "c": 1, "ok": "Correto! ִים = plural masculino.", "bad": "ִים = plural masculino. וֹת = plural feminino; ַיִם = dual; ָה = feminino singular."}, {"q": "שָׁמַיִם (céus) é gramaticalmente:", "opts": ["Singular masculino", "Plural feminino", "Sempre dual", "Singular feminino"], "c": 2, "ok": "Correto! שָׁמַיִם é sempre dual — nunca aparece no singular.", "bad": "שָׁמַיִם é sempre dual — terminação ַיִם."}, {"q": "O plural de אִישׁ (homem) é:", "opts": ["אִישִׁים", "אֲנָשִׁים", "אִישׁוֹת", "אֲנָשׁוֹת"], "c": 1, "ok": "Correto! אֲנָשִׁים é o plural irregular de אִישׁ.", "bad": "אֲנָשִׁים é o plural de אִישׁ — radicalmente diferente."}, {"q": "A terminação do dual hebraico é:", "opts": ["ִים", "וֹת", "ַיִם", "ָה"], "c": 2, "ok": "Correto! ַיִם = dual (coisas em pares).", "bad": "ַיִם = dual. Ex.: יָדַיִם (mãos), עֵינַיִם (olhos)."}, {"q": "O plural de בַּיִת (casa) é:", "opts": ["בַּיִתִים", "בָּתִּים", "בַּיִתוֹת", "בָּתוֹת"], "c": 1, "ok": "Correto! בָּתִּים — plural irregular com mudança vocálica.", "bad": "בָּתִּים é o plural irregular de בַּיִת."}, {"q": "Qual terminação indica feminino singular?", "opts": ["ִים", "ַיִם", "ָה ou ת", "וֹת"], "c": 2, "ok": "Correto! Feminino singular termina em ָה ou ת.", "bad": "Feminino singular: ָה ou ת."}, {"q": "Um substantivo masculino pode ter plural em:", "opts": ["Apenas ִים", "Apenas וֹת", "ִים ou וֹת", "Apenas ַיִם"], "c": 2, "ok": "Correto! O gênero é do singular — alguns masc. têm plural em וֹת.", "bad": "O gênero é determinado pelo singular, não pela terminação do plural."}, {"q": "O dual é usado para:", "opts": ["Números maiores que 2", "Coisas que aparecem naturalmente aos pares", "Todos os plurais", "Verbos no passado"], "c": 1, "ok": "Correto! Dual = coisas em pares naturais: mãos, olhos, pés.", "bad": "Dual = coisas em pares: יָדַיִם (mãos), עֵינַיִם (olhos)."}]}, "5": {"c": "<h3>O Artigo Definido</h3><p>O hebraico não tem artigo indefinido. O artigo definido é prefixado:</p><table><tr><th>Forma</th><th>Uso</th><th>Exemplo</th></tr><tr><td><span class='lw hb'>הַ</span></td><td>Forma comum</td><td><span class='lw hb'>הַמֶּלֶךְ</span> = o rei</td></tr><tr><td><span class='lw hb'>הָ</span></td><td>Antes de ה, ח, ע</td><td><span class='lw hb'>הָאִישׁ</span> = o homem</td></tr><tr><td><span class='lw hb'>הֶ</span></td><td>Antes de א, ר e alguns átonos</td><td><span class='lw hb'>הֶחָכָם</span> = o sábio</td></tr></table><div class='warn'>⚠️ Preposição + artigo: o ה cai, a preposição toma a vogal do artigo. Ex.: בְּ + הַמֶּלֶךְ → בַּמֶּלֶךְ</div><h3>Pronomes Pessoais</h3><table><tr><th>Hebraico</th><th>Tradução</th></tr><tr><td><span class='lw hb'>אֲנִי/אָנֹכִי</span></td><td>eu</td></tr><tr><td><span class='lw hb'>אַתָּה</span></td><td>tu (m.)</td></tr><tr><td><span class='lw hb'>הוּא</span></td><td>ele</td></tr><tr><td><span class='lw hb'>הִיא</span></td><td>ela</td></tr><tr><td><span class='lw hb'>אֲנַחְנוּ</span></td><td>nós</td></tr><tr><td><span class='lw hb'>הֵם</span></td><td>eles</td></tr></table><h3>Pronomes Interrogativos</h3><p><span class='lw hb'>מִי</span> = quem? | <span class='lw hb'>מַה</span> = o quê? | <span class='lw hb'>אֵיפֹה</span> = onde?</p><div class='tip'>💡 Ross: 'אֶחָד pode indicar unidade composta — base para a doutrina da Trindade.' <span class='cit'><span class='citd' style='background:#4a148c'></span> Ross</span></div><h3>Aplicação Exegética</h3><p>O Shemá (Dt 6.4): <span class='lw hb'>יְהוָה אֱלֹהֵינוּ יְהוָה אֶחָד</span> — 'O Senhor nosso Deus, o Senhor é único.' אֶחָד pode indicar unidade composta.</p>", "q": [{"q": "O artigo definido hebraico é:", "opts": ["Palavra separada", "Prefixado à palavra", "Sufixado à palavra", "Não existe"], "c": 1, "ok": "Correto! O artigo é prefixado — une-se à 1ª letra da palavra.", "bad": "O artigo é prefixado — não é uma palavra separada."}, {"q": "O pronome 'ele' em hebraico é:", "opts": ["הִיא", "אַתָּה", "הוּא", "אֲנִי"], "c": 2, "ok": "Correto! הוּא = ele. הִיא = ela.", "bad": "הוּא = ele; הִיא = ela."}, {"q": "Quando בְּ + הַמֶּלֶךְ, o resultado é:", "opts": ["בְּהַמֶּלֶךְ", "בְּמֶּלֶךְ", "בַּמֶּלֶךְ", "בָּמֶּלֶךְ"], "c": 2, "ok": "Correto! O ה cai e בְּ toma a vogal patah: בַּמֶּלֶךְ.", "bad": "בַּמֶּלֶךְ — o ה do artigo cai, a preposição toma a vogal (patah)."}, {"q": "מִי significa:", "opts": ["O quê?", "Quem?", "Onde?", "Como?"], "c": 1, "ok": "Correto! מִי = quem? | מַה = o quê? | אֵיפֹה = onde?", "bad": "מִי = quem?; מַה = o quê?; אֵיפֹה = onde?"}, {"q": "O hebraico tem artigo indefinido?", "opts": ["Sim, אֶחָד", "Sim, הָ", "Não", "Sim, שֶׁ"], "c": 2, "ok": "Correto! O hebraico não tem artigo indefinido.", "bad": "O hebraico não tem artigo indefinido — a ausência do artigo indica indefinição."}, {"q": "הָ aparece antes de:", "opts": ["Qualquer consoante", "ה, ח, ע (guturais)", "Letras BeGaDKeFaT", "Letras finais"], "c": 1, "ok": "Correto! הָ aparece antes de ה, ח, ע.", "bad": "הָ aparece antes de ה, ח, ע — guturais que não aceitam dagesh."}, {"q": "Em Dt 6.4, אֶחָד pode indicar:", "opts": ["Apenas singularidade absoluta", "Unidade composta (como em Gn 2.24)", "Pluralidade", "Nenhum significado especial"], "c": 1, "ok": "Correto! אֶחָד pode indicar unidade composta — base para a Trindade.", "bad": "אֶחָד pode indicar unidade composta (Gn 2.24: 'uma só carne' usa o mesmo אֶחָד)."}, {"q": "O pronome 'nós' em hebraico é:", "opts": ["אַתֶּם", "הֵם", "אֲנַחְנוּ", "הֵן"], "c": 2, "ok": "Correto! אֲנַחְנוּ = nós.", "bad": "אֲנַחְנוּ = nós. אַתֶּם = vós (m.); הֵם = eles; הֵן = elas."}]}, "6": {"c": "<h3>O Verbo Qal — O Perfeito</h3><p>O sistema verbal hebraico baseia-se em <strong>aspecto</strong>. O <strong>Qal</strong> é a construção mais simples e frequente (~68% do AT).</p><h3>Perfeito do Qal — Paradigma de קָטַל</h3><table><tr><th>Pronome</th><th>Forma</th><th>Tradução</th></tr><tr><td><span class='lw hb'>הוּא</span></td><td><span class='lw hb'>קָטַל</span></td><td>ele matou</td></tr><tr><td><span class='lw hb'>הִיא</span></td><td><span class='lw hb'>קָטְלָה</span></td><td>ela matou</td></tr><tr><td><span class='lw hb'>אַתָּה</span></td><td><span class='lw hb'>קָטַלְתָּ</span></td><td>tu mataste</td></tr><tr><td><span class='lw hb'>אֲנִי</span></td><td><span class='lw hb'>קָטַלְתִּי</span></td><td>eu matei</td></tr><tr><td><span class='lw hb'>הֵם</span></td><td><span class='lw hb'>קָטְלוּ</span></td><td>eles mataram</td></tr><tr><td><span class='lw hb'>אֲנַחְנוּ</span></td><td><span class='lw hb'>קָטַלְנוּ</span></td><td>nós matamos</td></tr></table><div class='tip'>💡 Kelley: 'O radical do Qal Perfeito 3ª m.sg. é a forma de dicionário.' <span class='cit'><span class='citd' style='background:#1a3a6b'></span> Kelley</span></div><h3>Waw Consecutivo com o Perfeito</h3><p>וְ + Perfeito = traduz no <strong>futuro</strong>: <span class='lw hb'>וְשָׁמַרְתָּ</span> = 'e guardarás'</p><h3>Aplicação Exegética</h3><p>Gênesis 1.1: <span class='lw hb'>בָּרָא אֱלֹהִים</span> — 'Deus criou'. <span class='lw hb'>בָּרָא</span> é usado exclusivamente com Deus como sujeito no AT — criação ex nihilo divina.</p>", "q": [{"q": "A forma de dicionário do verbo hebraico é a:", "opts": ["1ª sg. perfeito", "3ª m.sg. perfeito Qal", "3ª m.pl. perfeito", "2ª m.sg. imperfeito"], "c": 1, "ok": "Correto! 3ª m.sg. perfeito Qal é a forma de dicionário.", "bad": "A forma de dicionário é a 3ª m.sg. do perfeito Qal — ex.: קָטַל."}, {"q": "בָּרָא (criar) em Gênesis 1.1 é usado exclusivamente com:", "opts": ["Anjos", "Deus como sujeito", "Seres humanos", "Qualquer sujeito"], "c": 1, "ok": "Correto! בָּרָא no AT é sempre com Deus como sujeito.", "bad": "בָּרָא é sempre com Deus como sujeito — indica criação divina exclusiva."}, {"q": "O sufixo da 1ª sg. do perfeito Qal é:", "opts": ["-נוּ", "-תִּי", "-תָּ", "-וּ"], "c": 1, "ok": "Correto! -תִּי = 1ª sg.: קָטַלְתִּי = eu matei.", "bad": "-תִּי = 1ª sg. -נוּ = 1ª pl.; -תָּ = 2ª m.sg.; -וּ = 3ª m.pl."}, {"q": "Waw consecutivo + Perfeito traduz no:", "opts": ["Passado", "Presente", "Futuro", "Imperativo"], "c": 2, "ok": "Correto! Waw consecutivo + perfeito = futuro.", "bad": "Waw consecutivo + perfeito = futuro."}, {"q": "O Qal aparece em que % das formas verbais do AT?", "opts": ["~20%", "~40%", "~68%", "~90%"], "c": 2, "ok": "Correto! O Qal aparece em cerca de 68%.", "bad": "O Qal aparece em ~68% das formas verbais — é de longe o mais frequente."}, {"q": "O sufixo da 3ª f.sg. perfeito Qal é:", "opts": ["-תְּ", "-הּ", "-לָה", "-וּ"], "c": 2, "ok": "Correto! -לָה → a 3ª f.sg. termina em ָה: קָטְלָה.", "bad": "A 3ª f.sg. termina em ָה: קָטְלָה."}, {"q": "O sistema verbal hebraico baseia-se em:", "opts": ["Tempo absoluto", "Aspecto", "Pessoa e número apenas", "Modo verbal"], "c": 1, "ok": "Correto! Hebraico = aspecto (completo ou incompleto).", "bad": "Hebraico é baseado em aspecto, não tempo absoluto."}, {"q": "O sufixo da 1ª plural do perfeito Qal é:", "opts": ["-תִּי", "-נוּ", "-תֶּם", "-וּ"], "c": 1, "ok": "Correto! -נוּ = 1ª pl.: קָטַלְנוּ.", "bad": "-נוּ é a 1ª pl. -תִּי = 1ª sg.; -תֶּם = 2ª m.pl.; -וּ = 3ª m.pl."}]}, "7": {"c": "<h3>Sintaxe Básica</h3><p>Ordem básica: <strong>VSO</strong> (Verbo-Sujeito-Objeto). Ex.: <span class='lw hb'>בָּרָא אֱלֹהִים אֵת הַשָּׁמַיִם</span> = criou / Deus / os céus.</p><h3>A Partícula אֵת</h3><p>Marca o objeto direto <strong>definido</strong> — não se traduz!</p><p><span class='lw hb'>אֵת הַשָּׁמַיִם</span> = os céus (objeto direto)</p><h3>A Oração Nominal</h3><p>O hebraico omite o verbo 'ser' no presente:</p><p><span class='lw hb'>יְהוָה אֱלֹהֵינוּ</span> = 'O Senhor É nosso Deus'</p><h3>O Verbo הָיָה</h3><table><tr><th>Forma</th><th>Tradução</th></tr><tr><td><span class='lw hb'>הָיָה</span></td><td>ele era/estava/tornou-se</td></tr><tr><td><span class='lw hb'>הָיְתָה</span></td><td>ela era</td></tr><tr><td><span class='lw hb'>הָיוּ</span></td><td>eles eram</td></tr></table><h3>Negação</h3><p><span class='lw hb'>לֹא</span> = não (permanente) | <span class='lw hb'>אַל</span> = não (comando) | <span class='lw hb'>אֵין</span> = não há</p><div class='tip'>💡 Futato: 'אֵת é invisível na tradução mas essencial para análise sintática.' <span class='cit'><span class='citd' style='background:#1b5e20'></span> Futato</span></div><h3>Aplicação Exegética</h3><p>Gênesis 1.1-2: Observe a ordem VSO, as partículas אֵת antes dos objetos e a oração com הָיְתָה no v.2.</p>", "q": [{"q": "A ordem básica da frase verbal hebraica é:", "opts": ["SVO", "VSO", "OVS", "SOV"], "c": 1, "ok": "Correto! A ordem básica hebraica é VSO.", "bad": "VSO — o verbo vem primeiro em hebraico."}, {"q": "A partícula אֵת indica:", "opts": ["Sujeito", "Objeto direto definido", "Verbo passivo", "Preposição 'com'"], "c": 1, "ok": "Correto! אֵת = objeto direto definido — não se traduz.", "bad": "אֵת marca o objeto direto definido. Não se traduz."}, {"q": "A oração nominal hebraica omite:", "opts": ["O sujeito", "O objeto", "O verbo 'ser' no presente", "A preposição"], "c": 2, "ok": "Correto! A oração nominal omite הָיָה no presente.", "bad": "A oração nominal omite o verbo 'ser' no presente."}, {"q": "לֹא é usado para:", "opts": ["Comandos apenas", "Negação geral com indicativo/imperfeito", "Negação existencial", "Negação de pronomes"], "c": 1, "ok": "Correto! לֹא é negação geral. אַל é para comandos.", "bad": "לֹא = negação geral; אַל = para comandos."}, {"q": "הָיָה significa:", "opts": ["Criar", "Ser/estar/tornar-se", "Ir", "Falar"], "c": 1, "ok": "Correto! הָיָה = ser, estar, tornar-se.", "bad": "הָיָה = ser/estar/tornar-se."}, {"q": "Em Gênesis 1.1, בָּרָא אֱלֹהִים segue a ordem:", "opts": ["SVO", "VSO", "OVS", "SOV"], "c": 1, "ok": "Correto! בָּרָא (verbo) + אֱלֹהִים (sujeito) = VSO.", "bad": "VSO: בָּרָא (criou) + אֱלֹהִים (Deus)."}, {"q": "אֵין significa:", "opts": ["Há, existe", "Não há, não existe", "Quem?", "Porque"], "c": 1, "ok": "Correto! אֵין = não há. יֵשׁ = há.", "bad": "אֵין = não há. יֵשׁ = há."}, {"q": "אֵת NÃO aparece antes de substantivos:", "opts": ["Com artigo", "Indefinidos", "Nomes próprios", "Após preposição"], "c": 1, "ok": "Correto! אֵת só marca objetos definidos — não aparece antes de indefinidos.", "bad": "אֵת marca apenas objetos definidos. Não aparece antes de indefinidos."}]}, "8": {"c": "<h3>Mudanças Vocálicas</h3><p>Ao acrescentar sufixos, as vogais do radical se alteram previsivelmente. <strong>Vogais longas em sílabas abertas átonas se reduzem.</strong></p><table><tr><th>Vogal</th><th>Redução</th></tr><tr><td>Qametz (ā)</td><td>→ Shewa</td></tr><tr><td>Tsere (ē)</td><td>→ Segol</td></tr><tr><td>Holem (ō)</td><td>→ Qametz-Hatuf</td></tr></table><p>• <span class='lw hb'>דָּבָר</span> → <span class='lw hb'>דְּבָרִים</span> (Qametz → Shewa)<br>• <span class='lw hb'>מֶלֶךְ</span> → <span class='lw hb'>מְלָכִים</span> (Segol → Shewa + Qametz)</p><div class='tip'>💡 Futato: 'Mudanças vocálicas são regulares e previsíveis.' <span class='cit'><span class='citd' style='background:#1b5e20'></span> Futato</span></div><h3>Aplicação Exegética</h3><p>Salmo 119 usa <span class='lw hb'>דְּבָרִים</span> e <span class='lw hb'>דָּבָר</span> alternadamente — reconhecer a mudança vocálica é essencial.</p>", "q": [{"q": "Qual vogal muda quando דָּבָר vai para o plural דְּבָרִים?", "opts": ["Tsere → Shewa", "Qametz → Shewa", "Patah → Qametz", "Holem → Segol"], "c": 1, "ok": "Correto! O Qametz da 1ª sílaba reduz para Shewa no plural.", "bad": "O Qametz de דָּבָר reduz para Shewa em דְּבָרִים — regra de redução vocálica em sílaba aberta átona."}, {"q": "O plural de מֶלֶךְ (rei) é מְלָכִים. O que aconteceu com as vogais?", "opts": ["Nada mudou", "Segol-Segol → Shewa-Qametz", "Qametz-Qametz → Segol-Segol", "Patah → Tsere"], "c": 1, "ok": "Correto! מֶלֶךְ tem dois Segols; no plural eles se transformam: Shewa (1ª sílaba) + Qametz (2ª sílaba).", "bad": "Em מְלָכִים: o 1.º Segol vira Shewa; o 2.º Segol vira Qametz — padrão de redução vocálica."}, {"q": "Uma vogal longa em sílaba aberta ÁTONA tende a:", "opts": ["Permanecer igual", "Reduzir-se (virar Shewa ou vogal breve)", "Alongar-se ainda mais", "Desaparecer completamente"], "c": 1, "ok": "Correto! Vogais longas em sílabas abertas átonas tendem a reduzir.", "bad": "Vogais longas em sílabas abertas átonas se reduzem — este é o princípio básico das mudanças vocálicas."}, {"q": "בָּתִּים é o plural irregular de:", "opts": ["בַּיִת (casa)", "בֵּן (filho)", "בַּת (filha)", "בְּרִית (aliança)"], "c": 0, "ok": "Correto! בָּתִּים é o plural de בַּיִת (casa) — com alteração vocálica significativa.", "bad": "בָּתִּים é o plural de בַּיִת (casa). O radical byt- aparece de forma alterada no plural."}, {"q": "O princípio das mudanças vocálicas hebraicas é:", "opts": ["Aleatório", "Regular e previsível baseado em acento/sílaba", "Determinado pelo gênero", "Determinado pelo número"], "c": 1, "ok": "Correto! As mudanças são regulares — uma vez aprendidos os padrões, aplicam-se consistentemente.", "bad": "As mudanças são regulares e previsíveis — não aleatórias. O acento tônico governa as alterações."}, {"q": "O plural de יוֹם (dia) é:", "opts": ["יוֹמִים", "יָמִים", "יוֹמוֹת", "יָמוֹת"], "c": 1, "ok": "Correto! יָמִים — o holem (ō) de יוֹם vira qametz (ā) no plural.", "bad": "יָמִים é correto. O holem longo de יוֹם se reduz para qametz no plural."}, {"q": "As mudanças vocálicas nos substantivos ocorrem principalmente quando:", "opts": ["O substantivo está em posição inicial", "Sufixos são acrescentados (formação de plural, construto, sufixos pronominais)", "O substantivo está no construto apenas", "Nunca ocorrem mudanças"], "c": 1, "ok": "Correto! As mudanças ocorrem quando sufixos são acrescentados — alterando a estrutura silábica e o acento.", "bad": "Mudanças ocorrem ao acrescentar sufixos (plural, construto, pronominais) — a estrutura silábica se reorganiza."}, {"q": "Qual Salmo usa extensivamente דְּבָרִים e דָּבָר como tema central?", "opts": ["Salmo 23", "Salmo 51", "Salmo 119", "Salmo 1"], "c": 2, "ok": "Correto! O Salmo 119 é dedicado inteiramente à Palavra de Deus, usando דָּבָר e seus plurais repetidamente.", "bad": "Salmo 119 é o mais longo do AT e dedicado inteiramente à Palavra — usa דָּבָר e דְּבָרִים ao longo de seus 176 versículos."}]}, "9": {"c": "<h3>Preposições Inseparáveis</h3><p><span class='lw hb'>בְּ</span> (em/com), <span class='lw hb'>כְּ</span> (como), <span class='lw hb'>לְ</span> (para) — sempre prefixadas. Antes de artigo: o ה cai.</p><h3>Preposições Separáveis</h3><p><span class='lw hb'>מִן</span> (de), <span class='lw hb'>אֶל</span> (para), <span class='lw hb'>עַל</span> (sobre), <span class='lw hb'>עִם</span> (com)</p><h3>Waw Conjuntivo</h3><p>Forma básica <span class='lw hb'>וְ</span>; antes de ב,מ,פ: <span class='lw hb'>וּ</span>. Ocorre mais de 50.000 vezes no AT.<br>Waw narrativo (וַיִּ + imperfeito) = passado sequencial.</p><div class='tip'>💡 Gusso: 'O waw é a palavra mais frequente do AT.' <span class='cit'><span class='citd' style='background:#2e4057'></span> Gusso</span></div>", "q": [{"q": "Qual preposição hebraica significa 'como/conforme'?", "opts": ["בְּ", "לְ", "כְּ", "מִן"], "c": 2, "ok": "Correto! כְּ = como, conforme. בְּ = em/com; לְ = para; מִן = de.", "bad": "כְּ = como/conforme. Ex.: כְּדָבָר = conforme a palavra."}, {"q": "Quando בְּ é prefixado a הַמֶּלֶךְ (o rei), o resultado é:", "opts": ["בְּהַמֶּלֶךְ", "בְּמֶּלֶךְ", "בַּמֶּלֶךְ", "בָּמֶּלֶךְ"], "c": 2, "ok": "Correto! O ה do artigo cai e בְּ toma a vogal patah: בַּמֶּלֶךְ.", "bad": "בַּמֶּלֶךְ — o ה do artigo cai e a preposição toma a vogal do artigo (patah → בַּ)."}, {"q": "O Waw conjuntivo antes de ב, מ ou פ tem forma:", "opts": ["וְ", "וַ", "וּ", "וָ"], "c": 2, "ok": "Correto! Antes de ב, מ, פ o waw conjuntivo usa a forma וּ (shureq).", "bad": "Antes de ב, מ, פ o waw usa a forma וּ. Ex.: וּמֶלֶךְ = e um rei."}, {"q": "מִן como preposição separada (independente) significa:", "opts": ["Para", "Em/com", "De, a partir de", "Sobre"], "c": 2, "ok": "Correto! מִן = de, a partir de (origem ou separação).", "bad": "מִן = de, a partir de. Ex.: מִן הַשָּׁמַיִם = dos céus."}, {"q": "Em Gênesis 1.1, וְאֵת הָאָרֶץ — o וְ conecta:", "opts": ["Dois verbos", "Dois objetos diretos (השמים e הארץ)", "Dois sujeitos", "Sujeito e predicado"], "c": 1, "ok": "Correto! וְ conecta os dois objetos diretos: os céus E a terra — merismo para 'toda a criação'.", "bad": "וְ aqui conecta os dois objetos: הַשָּׁמַיִם e הָאָרֶץ — formando um merismo ('tudo')."}, {"q": "A preposição אֶל significa:", "opts": ["Sobre", "De", "Para, em direção a", "Com"], "c": 2, "ok": "Correto! אֶל = para, em direção a (movimento em direção a algo).", "bad": "אֶל = para, em direção a. Diferente de לְ (finalidade) e עַל (sobre)."}, {"q": "O waw conjuntivo em sua forma básica é:", "opts": ["וַ", "וּ", "וְ", "וָ"], "c": 2, "ok": "Correto! A forma básica é וְ (waw + shewa).", "bad": "A forma básica é וְ (waw com shewa). As outras formas são variações contextuais."}, {"q": "Quantas vezes aproximadamente o waw conjuntivo aparece no AT?", "opts": ["Cerca de 500", "Cerca de 5.000", "Mais de 50.000", "Cerca de 1.000"], "c": 2, "ok": "Correto! O waw aparece mais de 50.000 vezes — é a palavra mais frequente do AT.", "bad": "O waw aparece mais de 50.000 vezes no AT — é de longe a palavra mais frequente do texto hebraico."}]}, "10": {"c": "<h3>O Adjetivo</h3><p>Concorda em gênero e número.</p><table><tr><th>Função</th><th>Posição</th><th>Exemplo</th></tr><tr><td>Atributiva</td><td>APÓS + artigo se subs. tiver</td><td><span class='lw hb'>הָעָם הַטּוֹב</span> = o bom povo</td></tr><tr><td>Predicativa</td><td>ANTES, SEM artigo</td><td><span class='lw hb'>טוֹב הָעָם</span> = o povo É bom</td></tr></table><p>Adjetivos comuns: <span class='lw hb'>טוֹב</span> (bom), <span class='lw hb'>רַע</span> (mau), <span class='lw hb'>גָּדוֹל</span> (grande), <span class='lw hb'>קָדוֹשׁ</span> (santo)</p><div class='tip'>💡 Ross: 'Distinção atributiva/predicativa é fundamental.' <span class='cit'><span class='citd' style='background:#4a148c'></span> Ross</span></div><h3>Aplicação Exegética</h3><p>Gênesis 1.31: <span class='lw hb'>טוֹב מְאֹד</span> — posição predicativa: a criação É muito boa.</p>", "q": [{"q": "Em hebraico, o adjetivo atributivo vem _____ o substantivo:", "opts": ["Antes de", "Depois de", "Em qualquer posição", "Nunca junto ao"], "c": 1, "ok": "Correto! O adjetivo atributivo vem DEPOIS do substantivo em hebraico.", "bad": "Em hebraico, o adjetivo atributivo segue o substantivo (ao contrário do português onde ele pode anteceder)."}, {"q": "הָעָם הַטּוֹב significa:", "opts": ["O povo é bom (predicativo)", "O bom povo (atributivo)", "Um bom povo", "O povo era bom"], "c": 1, "ok": "Correto! Adjetivo com artigo após substantivo com artigo = atributivo: 'o bom povo'.", "bad": "הָעָם הַטּוֹב = atributivo ('o bom povo'). Para predicativo: טוֹב הָעָם = 'o povo é bom'."}, {"q": "טוֹב הָעָם significa:", "opts": ["O bom povo", "O povo mais bom", "O povo É bom (predicativo)", "Um bom povo"], "c": 2, "ok": "Correto! Adjetivo sem artigo antes de substantivo com artigo = predicativo: 'o povo É bom'.", "bad": "Posição predicativa (adjetivo sem artigo + substantivo com artigo) = 'o povo É bom'."}, {"q": "Em Gênesis 1.31, כִּי טוֹב מְאֹד — טוֹב está em posição:", "opts": ["Atributiva", "Predicativa", "Substantivada", "Adverbial"], "c": 1, "ok": "Correto! Predicativa — 'era muito bom' (declaração de Deus sobre a criação).", "bad": "Posição predicativa — Deus declara que a criação É boa: 'eis que ERA muito bom'."}, {"q": "O adjetivo hebraico concorda com o substantivo em:", "opts": ["Apenas gênero", "Apenas número", "Gênero e número", "Gênero, número e caso"], "c": 2, "ok": "Correto! O adjetivo hebraico concorda em gênero e número (não em caso — o hebraico não tem sistema de casos explícito como o grego).", "bad": "O adjetivo concorda em gênero e número. O hebraico não tem sistema de casos como o grego."}, {"q": "קָדוֹשׁ significa:", "opts": ["Bom", "Grande", "Santo", "Sábio"], "c": 2, "ok": "Correto! קָדוֹשׁ = santo. É um dos adjetivos mais importantes teologicamente no AT.", "bad": "קָדוֹשׁ = santo. Ex.: קָדוֹשׁ יְהוָה (santo é o Senhor) — Isaías 6.3."}, {"q": "O feminino de גָּדוֹל (grande) é:", "opts": ["גָּדוֹלָה", "גָּדוֹלִים", "גָּדֹל", "גֹּדֶל"], "c": 0, "ok": "Correto! גָּדוֹלָה — acrescenta-se ָה para o feminino.", "bad": "גָּדוֹלָה é o feminino singular. גָּדוֹלִים = masculino plural; גְּדוֹלוֹת = feminino plural."}, {"q": "O adjetivo predicativo em hebraico implica o verbo:", "opts": ["הָלַךְ (ir)", "הָיָה (ser/estar)", "דִּבֵּר (falar)", "רָאָה (ver)"], "c": 1, "ok": "Correto! O predicativo implica הָיָה — 'é/era/será'. Ex.: טוֹב הָעָם = 'o povo É bom'.", "bad": "O predicativo implica הָיָה (ser/estar) — mesmo quando o verbo não está explícito."}]}, "11": {"c": "<h3>Qal Imperfeito</h3><p>Ação incompleta/futura. Usa prefixos pessoais.</p><table><tr><th>Pessoa</th><th>Forma</th><th>Tradução</th></tr><tr><td>3ª m.sg.</td><td><span class='lw hb'>יִקְטֹל</span></td><td>ele matará</td></tr><tr><td>1ª sg.</td><td><span class='lw hb'>אֶקְטֹל</span></td><td>eu matarei</td></tr><tr><td>1ª pl.</td><td><span class='lw hb'>נִקְטֹל</span></td><td>nós mataremos</td></tr><tr><td>3ª m.pl.</td><td><span class='lw hb'>יִקְטְלוּ</span></td><td>eles matarão</td></tr></table><div class='warn'>⚠️ Waw narrativo (וַיִּ + imperfeito) = passado sequencial — forma mais comum de narrar no AT.</div><h3>Aplicação Exegética</h3><p>Salmo 23.1: <span class='lw hb'>לֹא אֶחְסָר</span> — 'nada me faltará' — certeza futura.</p>", "q": [{"q": "O imperfeito Qal da 3ª m.sg. de קָטַל tem qual prefixo?", "opts": ["תִּ", "אֶ", "יִ", "נִ"], "c": 2, "ok": "Correto! יִ é o prefixo da 3ª m.sg. do imperfeito: יִקְטֹל.", "bad": "יִ é o prefixo da 3ª m.sg. תִּ = 2ª m.sg./3ª f.sg.; אֶ = 1ª sg.; נִ = 1ª pl."}, {"q": "O waw consecutivo com o IMPERFEITO é traduzido no:", "opts": ["Futuro", "Presente", "Passado narrativo", "Imperativo"], "c": 2, "ok": "Correto! Waw consecutivo + imperfeito = passado narrativo (ação sequencial no passado).", "bad": "Waw consecutivo + imperfeito = passado. É o principal meio de narrar ações sequenciais no AT."}, {"q": "O prefixo da 1ª pessoa plural do imperfeito Qal é:", "opts": ["יִ", "תִּ", "אֶ", "נִ"], "c": 3, "ok": "Correto! נִ é o prefixo da 1ª pl.: נִקְטֹל = nós mataremos.", "bad": "נִ = 1ª plural. יִ = 3ª m.sg.; תִּ = 2ª m.sg. / 3ª f.sg.; אֶ = 1ª sg."}, {"q": "לֹא אֶחְסָר em Salmo 23.1 é um imperfeito com sentido de:", "opts": ["Ação passada", "Ação futura garantida/habitual", "Comando", "Possibilidade"], "c": 1, "ok": "Correto! Imperfeito aqui = certeza futura: 'nada me faltará' (garantia da presença do pastor).", "bad": "O imperfeito aqui expressa certeza futura: 'nada me faltará' — garantia baseada na presença de Yahweh."}, {"q": "O Waw consecutivo com imperfeito é chamado de:", "opts": ["Waw conjuntivo", "Waw narrativo ou conversivo", "Waw explicativo", "Waw final"], "c": 1, "ok": "Correto! É chamado de waw narrativo ou conversivo — 'converte' o aspecto do imperfeito para passado.", "bad": "Waw narrativo ou conversivo — inverte o aspecto, tornando o imperfeito uma narrativa do passado."}, {"q": "O sufixo -וּ no imperfeito indica:", "opts": ["1ª singular", "2ª masculino singular", "3ª masculino plural", "1ª plural"], "c": 2, "ok": "Correto! -וּ é o sufixo da 3ª m.pl.: יִקְטְלוּ = eles matarão.", "bad": "-וּ = 3ª m.pl. no imperfeito: יִקְטְלוּ = eles matarão."}, {"q": "A vogal temática do Qal imperfeito 3ª m.sg. de verbos ação é:", "opts": ["Patah (a)", "Tsere (e)", "Holem (o)", "Qibutz (u)"], "c": 2, "ok": "Correto! A maioria dos verbos de ação usa holem (ō) como vogal temática: יִקְטֹל.", "bad": "A vogal temática principal do Qal imperfeito de verbos de ação é holem: יִקְטֹל."}, {"q": "O Shemá de Dt 6.4 começa com שְׁמַע — qual forma verbal é essa?", "opts": ["Imperfeito", "Perfeito", "Imperativo", "Particípio"], "c": 2, "ok": "Correto! שְׁמַע é imperativo Qal de שָׁמַע — um comando direto: 'OUVE, Israel!'", "bad": "שְׁמַע é imperativo Qal — um comando: 'Ouve!' A forma de dicionário é שָׁמַע (ouvir)."}]}, "12": {"c": "<h3>Estado Construto Singular</h3><p>Exprime posse sem 'de'. Possuído no construto (sem artigo) + possuidor no absoluto.</p><p>Feminino sg.: <span class='lw hb'>ָה</span> → <span class='lw hb'>ַת</span></p><p><span class='lw hb'>דְּבַר יְהוָה</span> = a palavra do Senhor<br><span class='lw hb'>תּוֹרַת יְהוָה</span> = a lei do Senhor<br><span class='lw hb'>בֵּית הַמֶּלֶךְ</span> = a casa do rei</p><div class='tip'>💡 Kelley: 'O construto é um dos recursos mais frequentes da prosa hebraica.' <span class='cit'><span class='citd' style='background:#1a3a6b'></span> Kelley</span></div>", "q": [{"q": "No estado construto, o substantivo que indica o POSSUÍDO tem artigo?", "opts": ["Sim, sempre", "Sim, quando definido", "Nunca — o construto nunca tem artigo", "Às vezes"], "c": 2, "ok": "Correto! O substantivo no estado construto nunca tem artigo.", "bad": "O construto nunca tem artigo — a definição vem do substantivo possuidor (genitivo)."}, {"q": "דְּבַר יְהוָה significa:", "opts": ["Uma palavra do Senhor", "A palavra do Senhor", "As palavras do Senhor", "O Senhor fala"], "c": 1, "ok": "Correto! דְּבַר יְהוָה = 'a palavra do Senhor' — construto singular definido pelo nome próprio.", "bad": "דְּבַר יְהוָה = 'a palavra do Senhor'. O nome próprio יְהוָה define o construto."}, {"q": "Como o feminino singular תּוֹרָה muda no construto?", "opts": ["Permanece igual", "ָה → ַת: תּוֹרַת", "ָה → ִית", "ָה → וֹת"], "c": 1, "ok": "Correto! Feminino singular: ָה → ַת no construto. תּוֹרָה → תּוֹרַת.", "bad": "Feminino singular no construto: ָה → ַת. תּוֹרָה → תּוֹרַת (como em תּוֹרַת יְהוָה = a lei do Senhor)."}, {"q": "Em Salmo 23.1, רֹעִי é:", "opts": ["Imperfeito de רָעָה", "Particípio + sufixo 1ª sg. = 'meu pastor'", "Nome próprio", "Adjetivo"], "c": 1, "ok": "Correto! רֹעִי = רֹעֶה (particípio 'pastor') + יִ (sufixo 1ª sg.) = 'meu pastor'.", "bad": "רֹעִי = particípio de רָעָה (pastorear) + sufixo 1ª sg.: 'meu pastor'. Declaração pessoal de confiança."}, {"q": "Numa cadeia de construtos, qual substantivo tem artigo?", "opts": ["O primeiro (possuído)", "O último (possuidor)", "Todos têm artigo", "Nenhum tem artigo"], "c": 1, "ok": "Correto! Na cadeia, somente o último substantivo (o possuidor) pode ter artigo.", "bad": "Numa cadeia de construtos, apenas o ÚLTIMO pode ter artigo — ele define toda a cadeia."}, {"q": "בֵּית הַמֶּלֶךְ significa:", "opts": ["O rei da casa", "A casa do rei", "Uma casa real", "O rei em casa"], "c": 1, "ok": "Correto! בֵּית הַמֶּלֶךְ = 'a casa do rei' — construto de בַּיִת (casa) + artigo + מֶלֶךְ.", "bad": "בֵּית הַמֶּלֶךְ = 'a casa do rei'. בֵּית é o construto de בַּיִת (casa) sem artigo."}, {"q": "O construto masculino singular tem forma idêntica ao:", "opts": ["Plural absoluto", "Feminino singular", "Estado absoluto singular", "Dual"], "c": 2, "ok": "Correto! O construto masculino singular tem a mesma forma do absoluto singular — sem mudança morfológica.", "bad": "O construto masculino singular = mesmo que o absoluto. A diferença está apenas na vocalização de algumas palavras."}, {"q": "תּוֹרַת יְהוָה em Salmo 1.2 significa:", "opts": ["A lei de Israel", "A lei do Senhor", "As leis do Senhor", "O mandamento do Senhor"], "c": 1, "ok": "Correto! תּוֹרַת יְהוָה = 'a lei/instrução do Senhor' — tema central do Salmo 1.", "bad": "תּוֹרַת יְהוָה = 'a lei do Senhor'. תּוֹרַת é o construto feminino de תּוֹרָה."}]}, "13": {"c": "<h3>Estado Construto Plural</h3><p>Masculino plural: <span class='lw hb'>ִים</span> → <span class='lw hb'>ֵי</span></p><p><span class='lw hb'>בְּנֵי יִשְׂרָאֵל</span> = os filhos de Israel<br><span class='lw hb'>מַלְכֵי יְהוּדָה</span> = os reis de Judá<br><span class='lw hb'>אֱלֹהֵי יִשְׂרָאֵל</span> = o Deus de Israel</p><p>Feminino plural: <span class='lw hb'>וֹת</span> permanece igual no construto.</p><div class='tip'>💡 Gusso: 'Identificar cadeias de construto é fundamental para topônimos e títulos.' <span class='cit'><span class='citd' style='background:#2e4057'></span> Gusso</span></div>", "q": [{"q": "O masculino plural no estado construto muda a terminação ִים para:", "opts": ["וֹת", "ֵי", "ַיִם", "ִין"], "c": 1, "ok": "Correto! ִים → ֵי no construto plural masculino. Ex.: בָּנִים → בְּנֵי.", "bad": "ִים → ֵי no construto plural masc. Ex.: בְּנֵי יִשְׂרָאֵל (os filhos de Israel)."}, {"q": "בְּנֵי יִשְׂרָאֵל significa:", "opts": ["O filho de Israel", "Os filhos de Israel", "O Israel dos filhos", "Israel e seus filhos"], "c": 1, "ok": "Correto! בְּנֵי יִשְׂרָאֵל = 'os filhos de Israel' — construto plural de בֵּן.", "bad": "בְּנֵי יִשְׂרָאֵל = 'os filhos de Israel'. בְּנֵי é o construto plural de בָּנִים (filhos)."}, {"q": "O feminino plural no construto (וֹת) tem forma:", "opts": ["Igual ao absoluto", "Diferente com terminação ַת", "Diferente com terminação ֵי", "Sempre com artigo"], "c": 0, "ok": "Correto! O feminino plural no construto mantém a mesma terminação וֹת do absoluto.", "bad": "Feminino plural no construto = igual ao absoluto (וֹת não muda). Ex.: תּוֹרוֹת = תּוֹרוֹת no construto também."}, {"q": "מַלְכֵי יְהוּדָה significa:", "opts": ["O rei de Judá", "Os reis de Israel", "Os reis de Judá", "O reino de Judá"], "c": 2, "ok": "Correto! מַלְכֵי יְהוּדָה = 'os reis de Judá' — construto plural de מֶלֶךְ.", "bad": "מַלְכֵי יְהוּדָה = 'os reis de Judá'. מַלְכֵי é o construto plural de מְלָכִים."}, {"q": "Em uma cadeia de construtos com três substantivos, quais estão no construto?", "opts": ["Apenas o primeiro", "Apenas o segundo", "Todos exceto o último", "Todos"], "c": 2, "ok": "Correto! Em uma cadeia, todos exceto o último estão no construto.", "bad": "Numa cadeia, todos os substantivos exceto o ÚLTIMO (o possuidor final) estão no construto."}, {"q": "אֱלֹהֵי יִשְׂרָאֵל significa:", "opts": ["Israel é Deus", "O Deus de Israel", "Os deuses de Israel", "Deus e Israel"], "c": 1, "ok": "Correto! אֱלֹהֵי יִשְׂרָאֵל = 'o Deus de Israel' — construto plural de אֱלֹהִים.", "bad": "אֱלֹהֵי יִשְׂרָאֵל = 'o Deus de Israel'. Embora אֱלֹהִים seja morfologicamente plural, com yod singular significa 'Deus'."}, {"q": "שִׁירֵי צִיּוֹן (Salmo 137.3) significa:", "opts": ["O cântico de Sião", "Os cânticos de Sião", "O salmista em Sião", "A montanha dos cânticos"], "c": 1, "ok": "Correto! שִׁירֵי = construto plural de שִׁירִים (cânticos). 'Os cânticos de Sião'.", "bad": "שִׁירֵי צִיּוֹן = 'os cânticos de Sião'. Os babilônios exigiam que os cativos cantassem os cânticos de Sião."}, {"q": "Por que bְּנֵי em בְּנֵי יִשְׂרָאֵל não tem artigo?", "opts": ["É um erro gramatical", "Substantivo no construto nunca tem artigo", "O nome próprio impede o artigo", "É uma exceção especial"], "c": 1, "ok": "Correto! O substantivo no construto nunca tem artigo — a definição vem do substantivo possuidor.", "bad": "O construto nunca tem artigo. A definição vem do possuidor (יִשְׂרָאֵל, nome próprio = definido por natureza)."}]}, "14": {"c": "<h3>Verbos Guturais</h3><p>Guturais (א,ה,ח,ע) na raiz causam: (1) preferência por vogal 'a'; (2) hateph em vez de shewa; (3) impossibilidade de receber dagesh forte.</p><p>• <strong>Pê Gutural</strong>: <span class='lw hb'>עָמַד</span> → <span class='lw hb'>יַעֲמֹד</span><br>• <strong>Ayin Gutural</strong>: <span class='lw hb'>בָּחַר</span> → <span class='lw hb'>יִבְחַר</span><br>• <strong>Lamed Gutural</strong>: <span class='lw hb'>שָׁמַע</span> → <span class='lw hb'>יִשְׁמַע</span></p><div class='tip'>💡 Futato: 'שָׁמַע ocorre 1.159 vezes!' <span class='cit'><span class='citd' style='background:#1b5e20'></span> Futato</span></div><h3>Aplicação Exegética</h3><p><span class='lw hb'>שְׁמַע יִשְׂרָאֵל</span> (Dt 6.4) — 'Ouve, Israel!' — imperativo de verbo Lamed Gutural.</p>", "q": [{"q": "Qual é a característica principal dos verbos Pê Gutural?", "opts": ["Dagesh forte na 1ª radical", "A 1ª radical é gutural, preferindo shewa composto e vogal 'a'", "A 1ª radical cai no imperfeito", "O radical tem apenas 2 letras"], "c": 1, "ok": "Correto! Pê Gutural tem gutural na 1ª radical, que prefere shewa composto (hateph) e vogal classe 'a'.", "bad": "Pê Gutural = gutural na 1ª radical. Características: prefere hateph (não shewa simples) e vogal de classe 'a'."}, {"q": "שְׁמַע (Ouve!) é imperativo de שָׁמַע. Qual tipo de verbo fraco é?", "opts": ["Pê Gutural", "Ayin Gutural", "Lamed Gutural (ע final)", "Pê-Nun"], "c": 2, "ok": "Correto! שָׁמַע tem ע como 3ª radical — é Lamed Gutural.", "bad": "שָׁמַע tem ע como 3ª radical = Lamed Gutural. O ע final atrai patah (patah furtivo)."}, {"q": "O 'patah furtivo' aparece:", "opts": ["Antes de qualquer consoante", "Antes de gutural ou resh no final de palavra", "No início de palavra", "Sob o dagesh forte"], "c": 1, "ok": "Correto! Patah furtivo aparece antes de gutural (ou resh) no final de uma sílaba tônica.", "bad": "Patah furtivo aparece antes de gutural (especialmente ח, ע) no final de palavra fechada tônica."}, {"q": "עָמַד (ficar de pé) é um verbo Pê Gutural. No imperfeito, ele terá:", "opts": ["Shewa simples sob ע", "Hateph-Patah sob ע", "Dagesh forte em ע", "Nenhuma mudança"], "c": 1, "ok": "Correto! Guturais não aceitam shewa simples — usam hateph-patah: יַעֲמֹד.", "bad": "ע não aceita shewa simples — usa hateph-patah (ֲ): יַעֲמֹד. Guturais preferem shewa composto."}, {"q": "Qual dos seguintes verbos é Ayin Gutural (2ª radical gutural)?", "opts": ["עָמַד", "שָׁמַע", "שָׁחַט", "בָּחַר"], "c": 3, "ok": "Correto! בָּחַר tem ח como 2ª radical = Ayin Gutural.", "bad": "בָּחַר (escolher) tem ח na posição central = Ayin Gutural. שָׁמַע tem ע no final = Lamed Gutural."}, {"q": "O Shemá (Dt 6.4) começa com שְׁמַע. O שְׁ inicial tem shewa porque:", "opts": ["É erro do copista", "É imperativo — a vogal original cai ficando shewa", "É Pê Gutural", "É verbo defectivo"], "c": 1, "ok": "Correto! No imperativo, a vogal da 1ª sílaba frequentemente reduz para shewa.", "bad": "No imperativo, a vogal da 1ª sílaba cai: שָׁמַע → שְׁמַע (imperativo). É a forma de comando."}, {"q": "Os verbos guturais são importantes estatisticamente porque:", "opts": ["São poucos e raros", "Verbos como שָׁמַע ocorrem mais de 1.000 vezes no AT", "São apenas para poesia", "Só aparecem em Gênesis"], "c": 1, "ok": "Correto! Verbos guturais são extremamente frequentes — שָׁמַע sozinho ocorre 1.159 vezes.", "bad": "Verbos guturais são muito frequentes — שָׁמַע (ouvir) ocorre 1.159 vezes; עָשָׂה (fazer) 2.627 vezes."}, {"q": "A característica do Lamed Gutural é:", "opts": ["Gutural na 1ª radical", "Gutural na 2ª radical", "Gutural ou resh na 3ª radical", "Duas guturais na raiz"], "c": 2, "ok": "Correto! Lamed Gutural = gutural (ou às vezes resh) na 3ª e última radical do verbo.", "bad": "Lamed Gutural = gutural na 3ª radical. 'Lamed' refere-se à 3ª letra do paradigma פָּעַל."}]}, "15": {"c": "<h3>Pê-Nun</h3><p>Nun assimila à 2ª radical: <span class='lw hb'>נָפַל</span> → <span class='lw hb'>יִפֹּל</span> | <span class='lw hb'>נָתַן</span> → <span class='lw hb'>יִתֵּן</span></p><h3>Lamed-He</h3><p>ה final = mater lectionis (antigo yod/vav):<br><span class='lw hb'>בָּנָה</span> → <span class='lw hb'>יִבְנֶה</span> | <span class='lw hb'>עָשָׂה</span> → <span class='lw hb'>יַעֲשֶׂה</span></p><div class='tip'>💡 Kelley: 'אָמַר ocorre 5.298 vezes — o mais frequente!' <span class='cit'><span class='citd' style='background:#1a3a6b'></span> Kelley</span></div><h3>Aplicação Exegética</h3><p>Salmo 127.1: <span class='lw hb'>אִם יְהוָה לֹא יִבְנֶה בַיִת</span> — imperfeito de <span class='lw hb'>בָּנָה</span> (Lamed-He).</p>", "q": [{"q": "Nos verbos Pê-Nun, o que acontece ao nun no imperfeito?", "opts": ["O nun dobra (dagesh)", "O nun cai completamente", "O nun assimila à letra seguinte (que recebe dagesh)", "O nun vira vocal"], "c": 2, "ok": "Correto! O nun assimila (é absorvido) pela 2ª radical, que recebe dagesh forte.", "bad": "O nun assimila à letra seguinte, que recebe dagesh forte. Ex.: נָפַל → יִפֹּל (nun + פ = פּ com dagesh)."}, {"q": "O imperfeito de נָתַן (dar) é:", "opts": ["יִנְתַּן", "יִתֵּן", "יִנְתֵּן", "יִתַּן"], "c": 1, "ok": "Correto! יִתֵּן — o nun assimila ao tav (נ + ת = תּ com dagesh forte).", "bad": "יִתֵּן é correto. O nun de נָתַן assimila ao ת que recebe dagesh: יִ + תֵּן."}, {"q": "Verbos Lamed-He têm ה no final que representa:", "opts": ["Uma gutural real", "Um antigo yod ou vav (mater lectionis)", "O artigo definido", "Uma terminação feminina"], "c": 1, "ok": "Correto! O ה final dos verbos Lamed-He é mater lectionis — representa um antigo yod ou vav.", "bad": "O ה final é mater lectionis — não é gutural, mas representa um antigo yod ou vav. Por isso não se comporta como gutural."}, {"q": "O imperfeito de בָּנָה (construir) é:", "opts": ["יִבְנָה", "יִבְנֶה", "יִבְנֵה", "יִבְנוּ"], "c": 1, "ok": "Correto! יִבְנֶה — verbos Lamed-He terminam em ֶה no imperfeito 3ª m.sg.", "bad": "יִבְנֶה é correto — terminação ֶה caracteriza o Lamed-He no imperfeito 3ª m.sg."}, {"q": "Em Salmo 127.1, יִבְנֶה é o imperfeito de:", "opts": ["נָבָא (profetizar)", "בָּנָה (construir)", "בָּרַח (fugir)", "נָתַן (dar)"], "c": 1, "ok": "Correto! יִבְנֶה é o imperfeito Qal de בָּנָה (construir) — verbo Lamed-He.", "bad": "יִבְנֶה é o imperfeito de בָּנָה (construir, Lamed-He). 'Se o Senhor não edificar a casa...'"}, {"q": "O verbo mais frequente do AT (5.298 ocorrências) é:", "opts": ["הָיָה (ser)", "שָׁמַע (ouvir)", "אָמַר (dizer)", "עָשָׂה (fazer)"], "c": 2, "ok": "Correto! אָמַר (dizer) ocorre 5.298 vezes — é o verbo mais frequente do AT.", "bad": "אָמַר (dizer) ocorre 5.298 vezes — o mais frequente. הָיָה = 3.548; עָשָׂה = 2.627."}, {"q": "O imperativo de בָּנָה (construir, Lamed-He) é:", "opts": ["בְּנֹה", "בְּנֵה", "בְּנָה", "בְּנוּ"], "c": 1, "ok": "Correto! בְּנֵה — imperativo de verbo Lamed-He termina em ֵה.", "bad": "בְּנֵה é o imperativo (m.sg.) de בָּנָה. Verbos Lamed-He têm terminação ֵה no imperativo m.sg."}, {"q": "Qual dos seguintes é um verbo Pê-Nun?", "opts": ["שָׁמַע", "בָּנָה", "נָפַל", "עָמַד"], "c": 2, "ok": "Correto! נָפַל (cair) tem נ como 1ª radical = Pê-Nun.", "bad": "נָפַל é Pê-Nun (nun como 1ª radical). שָׁמַע = Lamed Gutural; בָּנָה = Lamed-He; עָמַד = Pê Gutural."}]}, "16": {"c": "<h3>Sufixos Pronominais em Subst. Singular</h3><table><tr><th>Sufixo</th><th>Sentido</th><th>Exemplo</th></tr><tr><td>י-</td><td>meu</td><td><span class='lw hb'>דְּבָרִי</span></td></tr><tr><td>ךָ-</td><td>teu (m.)</td><td><span class='lw hb'>דְּבָרְךָ</span></td></tr><tr><td>וֹ-</td><td>dele</td><td><span class='lw hb'>דְּבָרוֹ</span></td></tr><tr><td>הָ-</td><td>dela</td><td><span class='lw hb'>דְּבָרָהּ</span></td></tr><tr><td>נוּ-</td><td>nosso</td><td><span class='lw hb'>דְּבָרֵנוּ</span></td></tr><tr><td>הֶם-</td><td>deles</td><td><span class='lw hb'>דְּבָרָם</span></td></tr></table><div class='tip'>💡 Vita &amp; Akil: 'Sufixos = construto + desinência do pronome.' <span class='cit'><span class='citd' style='background:#6a0572'></span> Vita &amp; Akil</span></div><h3>Aplicação Exegética</h3><p>Sl 119.105: <span class='lw hb'>נֵר לְרַגְלִי דְבָרֶךָ</span> — 'Lâmpada para os meus pés é tua palavra.'</p>", "q": [{"q": "O sufixo pronominal 'meu/minha' em hebraico é:", "opts": ["-נוּ", "-יִ", "-וֹ", "-ךָ"], "c": 1, "ok": "Correto! יִ- (ou י-) é o sufixo da 1ª sg. = meu/minha.", "bad": "יִ- é o sufixo da 1ª sg. (meu/minha). -נוּ = nosso; -וֹ = dele; -ךָ = teu (m.)."}, {"q": "דְּבָרְךָ significa:", "opts": ["Minha palavra", "Tua palavra (m.)", "Sua palavra", "Nossa palavra"], "c": 1, "ok": "Correto! דְּבָרְךָ = tua palavra (2ª m.sg.). O sufixo ךָ- indica 'teu' masculino.", "bad": "דְּבָרְךָ = 'tua palavra'. O sufixo ךָ- é a 2ª m.sg. (tu masculino)."}, {"q": "Em Salmo 119.105, נֵר לְרַגְלִי — לְרַגְלִי significa:", "opts": ["Uma lâmpada", "Para os meus pés", "O meu caminho", "Para a minha luz"], "c": 1, "ok": "Correto! לְרַגְלִי = לְ (para) + רֶגֶל (pé, no construto רַגְל-) + יִ (meu) = para os meus pés.", "bad": "לְרַגְלִי = 'para os meus pés'. לְ (prep.) + construto de רֶגֶל + sufixo יִ (meu)."}, {"q": "O sufixo 'dele' (3ª m.sg.) em hebraico é:", "opts": ["-הָ", "-וֹ", "-ךָ", "-נוּ"], "c": 1, "ok": "Correto! -וֹ é o sufixo da 3ª m.sg. = dele. Ex.: דְּבָרוֹ = sua palavra (dele).", "bad": "-וֹ é 'dele' (3ª m.sg.). -הָ = dela; -ךָ = teu; -נוּ = nosso."}, {"q": "דְּבָרָם significa:", "opts": ["Nossas palavras", "Vossas palavras", "Palavras deles", "Palavras delas"], "c": 2, "ok": "Correto! דְּבָרָם = palavras deles (3ª m.pl.).", "bad": "דְּבָרָם = 'palavras deles' (3ª m.pl.). O sufixo -ָם indica plural masculino 3ª pessoa."}, {"q": "Os sufixos pronominais em substantivos hebraicos substituem:", "opts": ["O verbo", "Pronomes possessivos separados ('meu', 'teu', 'seu')", "O artigo definido", "As preposições"], "c": 1, "ok": "Correto! Os sufixos substituem pronomes possessivos separados — o hebraico prefere sufixar à palavra.", "bad": "Os sufixos pronominais são a forma hebraica de expressar posse — em vez de dizer 'a palavra de mim', sufixam: דְּבָרִי."}, {"q": "O sufixo 'nossa/nosso' em hebraico é:", "opts": ["-כֶם", "-הֶם", "-נוּ", "-יִ"], "c": 2, "ok": "Correto! -נוּ é o sufixo da 1ª pl. = nosso/nossa. Ex.: אֱלֹהֵינוּ = nosso Deus.", "bad": "-נוּ é o sufixo da 1ª pl. Ex.: אֱלֹהֵינוּ (nosso Deus), אֲדֹנֵינוּ (nosso Senhor)."}, {"q": "Para acrescentar sufixos a um substantivo masculino singular, usa-se a forma do:", "opts": ["Absoluto plural", "Construto singular", "Absoluto singular", "Dual"], "c": 1, "ok": "Correto! Os sufixos se acrescentam à forma do construto singular masculino.", "bad": "Os sufixos se acrescentam ao construto singular — por isso o estudo do construto precede o dos sufixos."}]}, "17": {"c": "<h3>Demonstrativos</h3><p><span class='lw hb'>זֶה</span> (este, m.) | <span class='lw hb'>זֹאת</span> (esta, f.) | <span class='lw hb'>אֵלֶּה</span> (estes/as) | <span class='lw hb'>הַהוּא</span> (aquele) | <span class='lw hb'>הַהִיא</span> (aquela)</p><h3>Pronome Relativo</h3><p><span class='lw hb'>אֲשֶׁר</span> = que, o qual (separado, invariável)<br><span class='lw hb'>שֶׁ</span> = que (prefixado, poesia e hebraico tardio)</p><div class='tip'>💡 Ross: 'אֲשֶׁר é invariável.' <span class='cit'><span class='citd' style='background:#4a148c'></span> Ross</span></div><h3>Aplicação Exegética</h3><p>Dt 6.10: <span class='lw hb'>הָאָרֶץ אֲשֶׁר נִשְׁבַּע</span> — 'a terra que (o Senhor) prometeu'.</p>", "q": [{"q": "O pronome relativo separado em hebraico é:", "opts": ["זֶה", "שֶׁ", "אֲשֶׁר", "הַהוּא"], "c": 2, "ok": "Correto! אֲשֶׁר é o pronome relativo separado — 'que, o qual, a qual'.", "bad": "אֲשֶׁר é o relativo separado. שֶׁ é o relativo prefixado (mais comum na poesia e hebraico tardio)."}, {"q": "אֲשֶׁר concorda em gênero e número com seu antecedente?", "opts": ["Sim, sempre", "Não — é invariável", "Só em gênero", "Só em número"], "c": 1, "ok": "Correto! אֲשֶׁר é invariável — não muda para gênero, número ou caso.", "bad": "אֲשֶׁר é invariável. Sua função sintática depende do contexto, não da forma."}, {"q": "הַהוּא significa:", "opts": ["Este (proximal)", "Aquele (distal, m.sg.)", "Aquela (distal, f.sg.)", "Estes (pl.)"], "c": 1, "ok": "Correto! הַהוּא = aquele (masculino singular distal — longe).", "bad": "הַהוּא = aquele (m.sg. distal). הַהִיא = aquela (f.sg.); זֶה = este (proximal)."}, {"q": "O demonstrativo plural para ambos os gêneros é:", "opts": ["הַהֵם", "אֵלֶּה", "זֶה", "זֹאת"], "c": 1, "ok": "Correto! אֵלֶּה = estes/estas (plural para m. e f.).", "bad": "אֵלֶּה é o demonstrativo plural para ambos os gêneros — estes ou estas."}, {"q": "Em Dt 6.10, הָאָרֶץ אֲשֶׁר נִשְׁבַּע — אֲשֶׁר introduz:", "opts": ["Uma pergunta", "Uma oração relativa ('a terra que prometeu')", "Uma condição", "Uma comparação"], "c": 1, "ok": "Correto! אֲשֶׁר introduz oração relativa: 'a terra que (o Senhor) prometeu'.", "bad": "אֲשֶׁר introduz oração relativa — 'a terra que prometeu (jurou)'."}, {"q": "O demonstrativo זֹאת é:", "opts": ["Masculino singular", "Feminino singular", "Masculino plural", "Feminino plural"], "c": 1, "ok": "Correto! זֹאת = esta (feminino singular distal).", "bad": "זֹאת = feminino singular (esta). זֶה = masculino singular (este)."}, {"q": "שֶׁ (o relativo prefixado) é mais comum em:", "opts": ["Gênesis e Êxodo", "Poesia e hebraico tardio (Eclesiastes, Cânticos)", "Deuteronômio", "Os livros históricos"], "c": 1, "ok": "Correto! שֶׁ é mais comum na poesia e no hebraico tardio — Eclesiastes usa שֶׁ quase exclusivamente.", "bad": "שֶׁ é mais frequente na poesia (Cântico dos Cânticos) e no hebraico tardio (Eclesiastes)."}, {"q": "הַהִיא significa:", "opts": ["Este (m.)", "Esta (f.)", "Aquele (m.)", "Aquela (f.)"], "c": 3, "ok": "Correto! הַהִיא = aquela (feminino singular distal — longe).", "bad": "הַהִיא = aquela (f.sg. distal). הַהוּא = aquele (m.sg. distal)."}]}, "18": {"c": "<h3>Pê-Yod/Pê-Vav</h3><p>O yod cai no imperfeito Qal:<br><span class='lw hb'>יָשַׁב</span> → <span class='lw hb'>יֵשֵׁב</span> | <span class='lw hb'>יָצָא</span> → <span class='lw hb'>יֵצֵא</span></p><h3>Pê-Alef</h3><p>Alef quiescente:<br><span class='lw hb'>אָמַר</span> → <span class='lw hb'>יֹאמַר</span> | <span class='lw hb'>אָכַל</span> → <span class='lw hb'>יֹאכַל</span></p><div class='tip'>💡 Kelley: 'אָמַר ocorre 5.298 vezes — domine seu imperfeito!' <span class='cit'><span class='citd' style='background:#1a3a6b'></span> Kelley</span></div><h3>Aplicação Exegética</h3><p>Gênesis 1.3: <span class='lw hb'>וַיֹּאמֶר אֱלֹהִים</span> — waw narrativo + imperfeito de אָמַר — fórmula 10x em Gênesis 1.</p>", "q": [{"q": "O verbo יָשַׁב (habitar) no imperfeito perde o yod inicial porque:", "opts": ["É verbo irregular", "É verbo Pê-Yod — o yod cai no imperfeito", "É verbo gutural", "É Lamed-He"], "c": 1, "ok": "Correto! יָשַׁב é Pê-Yod — o yod da 1ª radical cai no imperfeito Qal.", "bad": "יָשַׁב é Pê-Yod. O yod cai no imperfeito: יֵשֵׁב (não יִישַׁב)."}, {"q": "O imperfeito de אָמַר (dizer) na 3ª m.sg. é:", "opts": ["יֹאמַר", "יֵאמַר", "יַאמַר", "יִאמַר"], "c": 0, "ok": "Correto! יֹאמַר — o alef quiescente resulta em holem: יֹ antes de אמר.", "bad": "יֹאמַר é correto — o alef de אָמַר torna-se quiescente e resulta na vogal holem: יֹ."}, {"q": "Em Gênesis 1.3, וַיֹּאמֶר אֱלֹהִים — וַיֹּאמֶר é:", "opts": ["Perfeito de אָמַר", "Imperfeito de אָמַר com waw consecutivo", "Imperativo de אָמַר", "Particípio de אָמַר"], "c": 1, "ok": "Correto! וַיֹּאמֶר = waw consecutivo + imperfeito de אָמַר — traduzido no passado narrativo.", "bad": "וַיֹּאמֶר = waw narrativo + imperfeito de אָמַר = 'e disse' (passado narrativo)."}, {"q": "יָצָא (sair) no imperfeito é:", "opts": ["יַצֵּא", "יֵצֵא", "יִצְאֶה", "יָצֵא"], "c": 1, "ok": "Correto! יֵצֵא — Pê-Yod: o yod cai e a vogal alonga para tsere.", "bad": "יֵצֵא é correto — Pê-Yod, o yod cai e fica a vogal tsere longa."}, {"q": "Os verbos Pê-Vav se comportam como:", "opts": ["Verbos Pê-Nun", "Verbos Pê-Yod (sempre começam com yod no imperfeito)", "Verbos guturais", "Verbos Lamed-He"], "c": 1, "ok": "Correto! Verbos originalmente Pê-Vav sempre aparecem com yod no imperfeito, comportando-se como Pê-Yod.", "bad": "Verbos Pê-Vav aparecem com yod no imperfeito, comportando-se como Pê-Yod."}, {"q": "אָכַל (comer) no imperfeito 3ª m.sg. é:", "opts": ["יֵאכַל", "יֹאכַל", "יֶאְכַּל", "יַאכַל"], "c": 1, "ok": "Correto! יֹאכַל — o alef quiescente resulta em holem, padrão dos verbos Pê-Alef.", "bad": "יֹאכַל — padrão dos verbos Pê-Alef com alef quiescente: vogal holem antes do alef."}, {"q": "Qual verbo é Pê-Yod?", "opts": ["אָכַל", "שָׁמַר", "יָלַד", "עָמַד"], "c": 2, "ok": "Correto! יָלַד (gerar) é Pê-Yod — a 1ª radical é yod.", "bad": "יָלַד é Pê-Yod (yod como 1ª radical). אָכַל = Pê-Alef; שָׁמַר = forte; עָמַד = Pê Gutural."}, {"q": "No waw narrativo וַיֹּאמֶר, a vogal patah sob o waw indica:", "opts": ["Waw conjuntivo simples", "Waw consecutivo com imperfeito (narrativo)", "Waw com prefixo do perfeito", "Waw de citação"], "c": 1, "ok": "Correto! Waw + patah + dagesh forte na 1ª radical do imperfeito = waw narrativo consecutivo.", "bad": "Waw consecutivo com imperfeito usa patah + dagesh na letra seguinte: וַיֹּאמֶר = waw narrativo."}]}, "19": {"c": "<h3>Sufixos em Subst. Plural</h3><table><tr><th>Sufixo</th><th>Exemplo</th><th>Tradução</th></tr><tr><td>יַ-</td><td><span class='lw hb'>דְּבָרַי</span></td><td>minhas palavras</td></tr><tr><td>יךָ-</td><td><span class='lw hb'>דְּבָרֶיךָ</span></td><td>tuas palavras</td></tr><tr><td>יו-</td><td><span class='lw hb'>דְּבָרָיו</span></td><td>suas palavras</td></tr><tr><td>ינוּ-</td><td><span class='lw hb'>דְּבָרֵינוּ</span></td><td>nossas palavras</td></tr><tr><td>יהֶם-</td><td><span class='lw hb'>דִּבְרֵיהֶם</span></td><td>palavras deles</td></tr></table><div class='tip'>💡 Ross: 'Sufixos do plural partem do construto plural.' <span class='cit'><span class='citd' style='background:#4a148c'></span> Ross</span></div>", "q": [{"q": "O sufixo 'minhas' (1ª sg.) com substantivos plurais masculinos é:", "opts": ["-יִ", "-יַ", "-נוּ", "-יו"], "c": 1, "ok": "Correto! Com plurais masculinos, a 1ª sg. usa -יַ: דְּבָרַי = minhas palavras.", "bad": "-יַ é o sufixo 1ª sg. com plurais: דְּבָרַי (minhas palavras). Com singular é -יִ: דְּבָרִי."}, {"q": "דְּבָרֶיךָ significa:", "opts": ["Minhas palavras", "Tuas palavras (m.)", "Suas palavras", "Nossas palavras"], "c": 1, "ok": "Correto! דְּבָרֶיךָ = tuas palavras (2ª m.sg. plural) — sufixo -יךָ.", "bad": "דְּבָרֶיךָ = 'tuas palavras'. O sufixo -יךָ indica 2ª m.sg. com plural."}, {"q": "דְּבָרָיו significa:", "opts": ["Minhas palavras", "Suas palavras (dele)", "Tuas palavras", "Vossas palavras"], "c": 1, "ok": "Correto! דְּבָרָיו = suas palavras (dele) — sufixo -יו indica 3ª m.sg. com plural.", "bad": "דְּבָרָיו = 'suas palavras (dele)'. O sufixo -יו é 3ª m.sg. com plural."}, {"q": "Em Salmo 119.103, אִמְרָתֶךָ é:", "opts": ["Minhas palavras", "Tua palavra (fem. sg. com sufixo 2ª m.sg.)", "As palavras deles", "A palavra dela"], "c": 1, "ok": "Correto! אִמְרָתֶךָ = tua palavra. אִמְרָה (palavra, fem.) + construto -ַת + sufixo -ֶךָ (teu).", "bad": "אִמְרָתֶךָ = 'tua palavra' (fem. sg. + sufixo 2ª m.sg.). אִמְרָה é feminino de אֵמֶר (palavra/dito)."}, {"q": "O sufixo 'deles' (3ª m.pl.) com plural é:", "opts": ["-יהֶם", "-יו", "-יכֶם", "-יהֶן"], "c": 0, "ok": "Correto! -יהֶם é o sufixo 3ª m.pl. com plural: דִּבְרֵיהֶם = palavras deles.", "bad": "-יהֶם = deles (3ª m.pl.) com plural. -יו = dele; -יכֶם = de vocês; -יהֶן = delas."}, {"q": "Os sufixos no plural se acrescentam à base do:", "opts": ["Absoluto plural", "Construto plural", "Absoluto singular", "Dual"], "c": 1, "ok": "Correto! Os sufixos no plural se acrescentam à forma do construto plural.", "bad": "Os sufixos no plural se acrescentam ao construto plural. Para masc.: -ֵי base + sufixo."}, {"q": "תּוֹרֹתָיו em Salmo 119 significa:", "opts": ["Minha lei", "Sua lei (dele)", "Suas leis (dele)", "Nossas leis"], "c": 2, "ok": "Correto! תּוֹרֹתָיו = suas leis (dele) — plural feminino + sufixo 3ª m.sg.", "bad": "תּוֹרֹתָיו = suas leis (dele). תּוֹרוֹת (leis, fem. pl.) + sufixo -יו (dele)."}, {"q": "Qual sufixo indica 'nossas' com substantivos plurais?", "opts": ["-יַ", "-יו", "-ֵינוּ", "-יכֶם"], "c": 2, "ok": "Correto! -ֵינוּ indica 1ª pl. com plural: דְּבָרֵינוּ = nossas palavras.", "bad": "-ֵינוּ é o sufixo 1ª pl. com plural. Ex.: אֱלֹהֵינוּ = nosso Deus."}]}, "20": {"c": "<h3>Infinitivo Construto</h3><p>Admite prefixos de preposição e sufixos:<br>• <span class='lw hb'>לִקְטֹל</span> = para matar (לְ = propósito)<br>• <span class='lw hb'>בִּקְטֹל</span> = ao matar (בְּ = tempo)</p><h3>Infinitivo Absoluto</h3><p>Intensifica quando da mesma raiz:<br><span class='lw hb'>מוֹת תָּמוּת</span> = 'certamente morrerás' (Gn 2.17)</p><div class='tip'>💡 Futato: 'O inf. absoluto indica certeza absoluta.' <span class='cit'><span class='citd' style='background:#1b5e20'></span> Futato</span></div>", "q": [{"q": "O infinitivo construto com לְ expressa:", "opts": ["Tempo ('enquanto')", "Propósito ('para, a fim de')", "Causa ('porque')", "Resultado ('de modo que')"], "c": 1, "ok": "Correto! לְ + infinitivo construto = propósito: לִשְׁמֹר = para guardar.", "bad": "לְ + infinitivo construto = propósito ('para, a fim de'). Muito frequente no AT."}, {"q": "Em Gênesis 2.17, מוֹת תָּמוּת usa:", "opts": ["Perfeito + Imperfeito", "Infinitivo absoluto + Imperfeito da mesma raiz", "Dois Perfeitos", "Dois Imperfeitos"], "c": 1, "ok": "Correto! Infinitivo absoluto + imperfeito da mesma raiz = ênfase/certeza absoluta: 'certamente morrerás'.", "bad": "Infinitivo absoluto + imperfeito = certeza absoluta. Esta é uma das construções mais expressivas do hebraico."}, {"q": "O infinitivo absoluto serve para:", "opts": ["Indicar tempo", "Intensificar ou enfatizar o verbo principal", "Expressar condição", "Indicar passado distante"], "c": 1, "ok": "Correto! O infinitivo absoluto intensifica/enfatiza quando usado com o verbo da mesma raiz.", "bad": "O infinitivo absoluto antes do verbo finito = intensificação/ênfase ou certeza."}, {"q": "בְּ + infinitivo construto expressa:", "opts": ["Propósito", "Tempo ('ao fazer', 'quando fez')", "Causa", "Condição"], "c": 1, "ok": "Correto! בְּ + infinitivo = tempo: בְּלֶכְתּוֹ = ao ir dele / quando ele foi.", "bad": "בְּ + infinitivo construto = relação temporal: 'ao fazer', 'quando fez'."}, {"q": "A forma base do infinitivo construto Qal de קָטַל é:", "opts": ["קָטֹל", "קְטֹל", "קֹטֵל", "קָטַל"], "c": 1, "ok": "Correto! קְטֹל é a forma base do infinitivo construto Qal.", "bad": "קְטֹל é a forma base do infinitivo construto Qal. Notar: shewa sob a 1ª radical."}, {"q": "'Certamente morrerás' em hebraico usa qual construção?", "opts": ["Dois imperativos", "Dois perfeitos", "Infinitivo absoluto + imperfeito", "Imperfeito negado"], "c": 2, "ok": "Correto! מוֹת תָּמוּת — infinitivo absoluto + imperfeito = certeza absoluta.", "bad": "מוֹת תָּמוּת = infinitivo absoluto + imperfeito = 'certamente morrerás'. A construção indica certeza máxima."}, {"q": "O infinitivo construto pode receber:", "opts": ["Apenas prefixos de preposição", "Apenas sufixos pronominais", "Prefixos de preposição E sufixos pronominais", "Nem prefixos nem sufixos"], "c": 2, "ok": "Correto! O infinitivo construto aceita tanto prefixos de preposição quanto sufixos pronominais.", "bad": "O infinitivo construto aceita prefixos de preposição (בְּ, כְּ, לְ) e sufixos pronominais."}, {"q": "לִשְׁמֹר significa:", "opts": ["Ele guardou", "Para guardar", "Guardando", "O guardador"], "c": 1, "ok": "Correto! לִשְׁמֹר = לְ + infinitivo construto de שָׁמַר = para guardar.", "bad": "לִשְׁמֹר = 'para guardar' — לְ + infinitivo construto de שָׁמַר (guardar)."}]}, "21": {"c": "<h3>Particípio Qal Ativo</h3><p>Padrão <span class='lw hb'>קֹטֵל</span> (m.sg.) — declina como adjetivo.</p><table><tr><th>Forma</th><th>Tradução</th></tr><tr><td><span class='lw hb'>קֹטֵל</span></td><td>matando / o que mata (m.sg.)</td></tr><tr><td><span class='lw hb'>קֹטֶלֶת</span></td><td>matando (f.sg.)</td></tr><tr><td><span class='lw hb'>קֹטְלִים</span></td><td>matando (m.pl.)</td></tr></table><p>Com artigo = substantivado: <span class='lw hb'>הַשֹּׁמֵר</span> = 'o guardador'.</p><div class='tip'>💡 Kelley: 'Particípio com artigo = substantivo relativo.' <span class='cit'><span class='citd' style='background:#1a3a6b'></span> Kelley</span></div><h3>Aplicação Exegética</h3><p>Sl 121.4: <span class='lw hb'>שׁוֹמֵר יִשְׂרָאֵל</span> — 'o guardador de Israel' — particípio ativo em construto.</p>", "q": [{"q": "O particípio ativo Qal masculino singular tem padrão:", "opts": ["קֹטֵל", "קֹטֶלֶת", "קוֹטֵל", "קֹטְלִים"], "c": 0, "ok": "Correto! קֹטֵל (com holem + tsere) é o padrão do particípio ativo Qal m.sg.", "bad": "קֹטֵל é o padrão: holem (ō) na 1ª sílaba + tsere (ē) na 2ª. Ex.: שֹׁמֵר (guardando/guardador)."}, {"q": "O particípio Qal com artigo (הַשֹּׁמֵר) funciona como:", "opts": ["Adjetivo predicativo", "Substantivo: 'o guardador/aquele que guarda'", "Imperativo", "Verbo no passado"], "c": 1, "ok": "Correto! Particípio com artigo = substantivado: 'o guardador', 'aquele que guarda'.", "bad": "Particípio com artigo = substantivo: הַשֹּׁמֵר = 'o guardador'. Frequente nos Salmos e Profetas."}, {"q": "Em Salmo 121.4, שׁוֹמֵר יִשְׂרָאֵל significa:", "opts": ["Israel guarda", "O guardador de Israel", "Israel será guardado", "Guarda Israel!"], "c": 1, "ok": "Correto! שׁוֹמֵר יִשְׂרָאֵל = 'o guardador de Israel' — particípio em estado construto.", "bad": "שׁוֹמֵר יִשְׂרָאֵל = 'o guardador de Israel'. שׁוֹמֵר é particípio de שָׁמַר em estado construto."}, {"q": "O feminino singular do particípio ativo Qal de קָטַל é:", "opts": ["קֹטֵלָה", "קֹטֶלֶת", "קֹטַלְתְּ", "קֹטְלוֹת"], "c": 1, "ok": "Correto! קֹטֶלֶת — terminação ֶת para o feminino singular do particípio.", "bad": "קֹטֶלֶת é o feminino sg. do particípio ativo Qal. Terminação especial ֶת."}, {"q": "O particípio pode funcionar como:", "opts": ["Apenas verbo", "Apenas substantivo", "Verbo, adjetivo ou substantivo", "Ape
