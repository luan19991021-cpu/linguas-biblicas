<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Línguas Bíblicas — Seminário</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f5f0;--sf:#fff;--sf2:#f2ede6;--bd:#e2d9cc;--tx:#1a1208;--tx2:#5c4a2a;--tx3:#8c7355;--gn:#2d6a4f;--gl:#e8f5ee;--bl:#1a3a6b;--bll:#e8f0fc;--gd:#b8860b;--gdl:#fdf8e8;--r:12px;--sh:0 2px 16px rgba(0,0,0,.08);--shl:0 8px 40px rgba(0,0,0,.14)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
/* HEADER */
.hdr{background:linear-gradient(135deg,#1a3d2b 0%,#2d6a4f 55%,#3d8b6f 100%);color:#fff;display:flex;align-items:center;gap:16px;min-height:64px;padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 2px 24px rgba(0,0,0,.25)}
.hdr-mark{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:-.02em;text-shadow:0 2px 8px rgba(0,0,0,.2);line-height:1;flex-shrink:0}
.hdr-sep{width:1px;height:32px;background:rgba(255,255,255,.25);flex-shrink:0}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:#fff;letter-spacing:.02em;line-height:1.1}
.hdr-title em{font-style:italic;color:#a8d5b5}
.hdr-sub{font-size:10.5px;color:rgba(255,255,255,.6);letter-spacing:.04em;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-h{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;padding:5px 14px;border-radius:18px;font-size:12px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.btn-h:hover{background:rgba(255,255,255,.22)}
/* LANG BAR */
.lbar{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);padding:0 28px;position:sticky;top:64px;z-index:99;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.ltab{display:flex;align-items:center;gap:8px;padding:12px 20px;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Inter',sans-serif;user-select:none}
.ltab:hover{color:var(--tx)}
.ltab.ag{color:var(--gn);border-bottom-color:var(--gn);font-weight:700}
.ltab.ah{color:var(--bl);border-bottom-color:var(--bl);font-weight:700}
.l-icon{font-family:'Noto Serif',serif;font-size:18px;font-weight:700}
.l-cnt{font-size:10px;background:var(--sf2);border-radius:8px;padding:1px 7px;color:var(--tx3)}
/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 104px)}
/* SIDEBAR */
.sbar{width:268px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);height:calc(100vh - 104px);position:sticky;top:104px;overflow-y:auto;display:flex;flex-direction:column}
.prog-w{padding:11px 14px;background:var(--sf2);border-bottom:1px solid var(--bd)}
.prog-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-bottom:5px;font-weight:500}
.prog-bar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}
.fill-g{background:linear-gradient(90deg,var(--gn),#52b788)}
.fill-b{background:linear-gradient(90deg,var(--bl),#4a90d9)}
.sbar-list{flex:1;padding:10px 10px 0;overflow-y:auto}
.li{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px}
.li:hover{background:var(--sf2)}
.li.ag{background:var(--gl)}.li.ag .linum,.li.ag .litit{color:var(--gn);font-weight:600}
.li.ah{background:var(--bll)}.li.ah .linum,.li.ah .litit{color:var(--bl);font-weight:600}
.linum{font-size:11px;font-weight:500;color:var(--tx3);width:24px;flex-shrink:0}
.lidot{width:7px;height:7px;border-radius:50%;flex-shrink:0;opacity:.4}
.li.ag .lidot,.li.ah .lidot{opacity:1}
.liinfo{flex:1;min-width:0}
.litit{font-size:12.5px;font-weight:500;color:var(--tx);line-height:1.3}
.lisub{font-size:10.5px;color:var(--tx3);line-height:1.2;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lichk{font-size:11px;flex-shrink:0;opacity:0}
.li.done .lichk{opacity:1}
/* GRAMMAR PANEL */
.gp{border-top:1px solid var(--bd);padding:12px;background:var(--sf2);margin-top:auto}
.gp-lbl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.gp-i{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:6px;margin-bottom:2px}
.gp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gp-nm{font-size:11px;color:var(--tx2);flex:1}
.gp-bdg{font-size:9px;padding:1px 6px;border-radius:8px;color:#fff;font-weight:700}
.add-btn{width:100%;margin-top:9px;padding:7px;border:1.5px dashed var(--bd);border-radius:8px;background:transparent;color:var(--tx3);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;text-align:center}
.add-btn:hover{border-color:var(--gn);color:var(--gn);background:var(--gl)}
.add-btn.hb:hover{border-color:var(--bl);color:var(--bl);background:var(--bll)}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:36px 40px;max-width:860px}
/* HOME */
.home{text-align:center;padding:50px 20px 30px}
.home-lg{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:700;line-height:1;margin-bottom:10px;display:flex;justify-content:center;gap:14px;align-items:baseline}
.home-lg .gk{color:var(--gn)}.home-lg .hb{color:var(--bl)}.home-lg .sep{color:var(--bd);font-size:38px}
.home-tit{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--tx);margin-bottom:6px}
.home-sub{font-size:13px;color:var(--tx3);margin-bottom:32px}
.home-cards{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:40px}
.lcard{background:var(--sf);border:2px solid var(--bd);border-radius:16px;padding:28px 30px;width:255px;cursor:pointer;transition:all .22s;text-align:left;position:relative;overflow:hidden}
.lcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.lcard.gk::after{background:linear-gradient(90deg,var(--gn),#52b788)}
.lcard.hb::after{background:linear-gradient(90deg,var(--bl),#4a90d9)}
.lcard:hover{box-shadow:var(--shl);transform:translateY(-3px)}
.lcard.gk:hover{border-color:var(--gn)}.lcard.hb:hover{border-color:var(--bl)}
.lc-sym{font-family:'Noto Serif',serif;font-size:46px;line-height:1;margin-bottom:12px;display:block}
.lc-sym.gk{color:var(--gn)}.lc-sym.hb{color:var(--bl)}
.lc-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--tx);margin-bottom:4px}
.lc-desc{font-size:12px;color:var(--tx3);line-height:1.5;margin-bottom:14px}
.lc-sts{display:flex;gap:12px}
.lc-sn{font-size:20px;font-weight:700;font-family:'Cormorant Garamond',serif}
.lc-sn.gk{color:var(--gn)}.lc-sn.hb{color:var(--bl)}
.lc-sl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em}
/* LANG HOME GRID */
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.lcard-sm{padding:14px 14px 14px 18px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.lcard-sm:hover{box-shadow:var(--sh);transform:translateY(-2px)}
/* LESSON */
.lhdr{margin-bottom:28px}
.bc{font-size:12px;color:var(--tx3);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.bcl{cursor:pointer;font-weight:500}
.bcl.gk{color:var(--gn)}.bcl.hb{color:var(--bl)}
.lbadge{display:inline-flex;align-items:center;border-radius:18px;font-size:11px;font-weight:600;padding:3px 11px;margin-bottom:10px;letter-spacing:.05em}
.bg{background:var(--gl);color:var(--gn)}.bb{background:var(--bll);color:var(--bl)}
.ltitle{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;color:var(--tx);line-height:1.1;margin-bottom:4px}
.lsubt{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;font-style:italic;color:var(--tx3);margin-bottom:14px}
.lmeta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.cbadge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;color:#fff}
.done-btn{padding:8px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.done-btn.gk{background:var(--gn);color:#fff}.done-btn.hb{background:var(--bl);color:#fff}
.done-btn.done{background:transparent!important;border:1.5px solid currentColor}
.done-btn.done.gk{color:var(--gn)}.done-btn.done.hb{color:var(--bl)}
/* VERSE */
.vbox{border-left:4px solid var(--gd);background:var(--gdl);border-radius:var(--r);padding:18px 22px;margin-bottom:28px;border:1px solid rgba(184,134,11,.18)}
.vlbl{font-size:9.5px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:7px}
.vtext{font-family:'Noto Serif',serif;font-size:21px;color:var(--tx);margin-bottom:6px;line-height:1.6}
.vtext.rtl{direction:rtl;text-align:right;font-size:23px}
.vtrans{font-size:13px;color:var(--tx2);font-style:italic}
/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--bd)}
.tab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Inter',sans-serif}
.tab:hover{color:var(--tx)}
/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:22px;margin-bottom:14px}
.ctit{font-size:10.5px;font-weight:700;color:var(--tx3);margin-bottom:14px;display:flex;align-items:center;gap:8px;letter-spacing:.07em;text-transform:uppercase}
.ctit::after{content:'';flex:1;height:1px;background:var(--bd)}
.topi{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13.5px;color:var(--tx2)}
.topi:last-child{border-bottom:none}
.topd{width:6px;height:6px;border-radius:50%;margin-top:7px;flex-shrink:0}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:7px}
.tchip{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:7px 11px}
.tlang{font-family:'Noto Serif',serif;font-size:16px;display:block;margin-bottom:2px}
.tlang.hb{direction:rtl;text-align:right;font-size:18px}
.tpt{font-size:11px;color:var(--tx3)}
/* AI */
.aic{font-size:14.5px;line-height:1.82;color:var(--tx2)}
.aic h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--tx);margin:22px 0 10px;line-height:1.2}
.aic h4{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin:18px 0 7px}
.aic p{margin-bottom:12px}
.aic .lw{font-family:'Noto Serif',serif;font-size:16px;font-weight:600}
.aic .lw.gk{color:var(--gn)}.aic .lw.hb{color:var(--bl)}
.aic table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.aic th{background:var(--sf2);padding:7px 11px;text-align:left;font-weight:600;color:var(--tx2);border:1px solid var(--bd);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em}
.aic td{padding:7px 11px;border:1px solid var(--bd);color:var(--tx2);vertical-align:top}
.aic .tip{background:var(--gl);border-left:3px solid var(--gn);border-radius:0 8px 8px 0;padding:11px 15px;margin:14px 0;font-size:13.5px}
.aic .tip.bl{background:var(--bll);border-left-color:var(--bl)}
.aic .warn{background:#fff8e1;border-left:3px solid var(--gd);border-radius:0 8px 8px 0;padding:11px 15px;margin:14px 0;font-size:13.5px;color:#5d4037}
.cit{display:inline-flex;align-items:center;gap:4px;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:2px 7px;font-size:10.5px;color:var(--tx3);margin:4px 3px;font-style:italic}
.citd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.refs{margin-top:22px;padding-top:18px;border-top:1px solid var(--bd)}
.reft{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.refi{display:flex;gap:9px;margin-bottom:7px;font-size:11.5px;color:var(--tx3);align-items:flex-start}
.refd{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
/* QUIZ */
.qcont{display:flex;flex-direction:column;gap:18px}
.qcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:22px;transition:all .2s}
.qcard.ok{border-color:#2d6a4f;background:#f0fff4}
.qcard.bad{border-color:#c0392b;background:#fff5f5}
.qnum{font-size:10.5px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px}
.qq{font-size:15px;font-weight:500;color:var(--tx);margin-bottom:14px;line-height:1.45}
.qopts{display:flex;flex-direction:column;gap:7px}
.qo{padding:10px 14px;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--tx2);transition:all .15s;background:var(--sf);text-align:left;font-family:'Inter',sans-serif;width:100%}
.qo:hover:not(:disabled){border-color:var(--gn);background:var(--gl)}
.qo.blhov:hover:not(:disabled){border-color:var(--bl);background:var(--bll)}
.qo.sok{border-color:#2d6a4f!important;background:#e8f5ee!important;color:#1b5e20!important}
.qo.sbad{border-color:#c0392b!important;background:#fff0f0!important;color:#b71c1c!important}
.qo.show{border-color:#2d6a4f!important;background:#e8f5ee!important;color:#1b5e20!important}
.qo:disabled{cursor:default}
.qfb{margin-top:11px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5}
.qfb.ok{background:#e8f5ee;color:#1b5e20}.qfb.bad{background:#fff0f0;color:#b71c1c}
.qscore{text-align:center;padding:36px 28px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r)}
.qsn{font-size:60px;font-weight:700;font-family:'Cormorant Garamond',serif;line-height:1}
.qsn.gk{color:var(--gn)}.qsn.hb{color:var(--bl)}
.qsl{font-size:13px;color:var(--tx3);margin-top:3px}
.qsm{font-size:17px;font-weight:500;color:var(--tx);margin:14px 0 22px}
/* LOADING */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px;color:var(--tx3)}
.sp{width:34px;height:34px;border:3px solid var(--bd);border-radius:50%;animation:spin .8s linear infinite}
.sp.gk{border-top-color:var(--gn)}.sp.hb{border-top-color:var(--bl)}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-size:13px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
/* NAV */
.lnav{display:flex;justify-content:space-between;align-items:center;margin-top:36px;padding-top:22px;border-top:1px solid var(--bd)}
.nb{display:flex;align-items:center;gap:7px;padding:9px 18px;border:1.5px solid var(--bd);border-radius:8px;background:var(--sf);color:var(--tx2);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;font-family:'Inter',sans-serif}
.nb.gk:hover{border-color:var(--gn);color:var(--gn)}.nb.hb:hover{border-color:var(--bl);color:var(--bl)}
.nb.pg{background:var(--gn);border-color:var(--gn);color:#fff}.nb.pg:hover{background:#235c43}
.nb.pb{background:var(--bl);border-color:var(--bl);color:#fff}.nb.pb:hover{background:#152d56}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.mod{background:var(--sf);border-radius:16px;padding:30px;width:480px;max-width:92vw;box-shadow:var(--shl)}
.modtit{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--tx);margin-bottom:6px}
.modsub{font-size:12.5px;color:var(--tx3);margin-bottom:22px;line-height:1.6}
.ua{border:2px dashed var(--bd);border-radius:12px;padding:36px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
.ua:hover,.ua.ov{border-color:var(--gn);background:var(--gl)}
.ua.hbm:hover,.ua.hbm.ov{border-color:var(--bl);background:var(--bll)}
.uaico{font-size:34px;margin-bottom:10px}
.uatxt{font-size:13.5px;color:var(--tx2)}
.uahnt{font-size:11.5px;color:var(--tx3);margin-top:3px}
.mi{width:100%;padding:9px 13px;border:1.5px solid var(--bd);border-radius:8px;font-size:13.5px;color:var(--tx);background:var(--sf);margin-bottom:10px;font-family:'Inter',sans-serif}
.mi:focus{outline:none;border-color:var(--gn)}
.mi.hbm:focus{border-color:var(--bl)}
.mact{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}
.bcnc{padding:9px 18px;border:1.5px solid var(--bd);border-radius:8px;background:transparent;color:var(--tx2);cursor:pointer;font-family:'Inter',sans-serif;font-size:13px}
.bok{padding:9px 18px;border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600}
.bok.gk{background:var(--gn)}.bok.hb{background:var(--bl)}
.bok:disabled{opacity:.5;cursor:not-allowed}
.adi{display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--sf2);border-radius:8px;font-size:12.5px;color:var(--tx2);margin-bottom:6px}
/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:#1a3d2b;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shl);z-index:300;animation:su .3s ease}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

</style>
<script>const ALL_CONTENT = {"gk": {"1": {"c": "<h3>O Alfabeto Grego</h3>\n<p>O grego do Novo Testamento utiliza um alfabeto de <span class=\"lw gk\">24 letras</span>. Nos manuscritos antigos, o texto aparecia em <em>escrita uncial</em> — somente letras maiúsculas, sem espaços entre palavras.</p>\n<table><tr><th>Maiúsc.</th><th>Minúsc.</th><th>Nome</th><th>Som</th></tr>\n<tr><td>Α</td><td>α</td><td>ἄλφα (alfa)</td><td>a em \"amor\"</td></tr>\n<tr><td>Β</td><td>β</td><td>βῆτα (beta)</td><td>b em \"bondade\"</td></tr>\n<tr><td>Γ</td><td>γ</td><td>γάμμα (gama)</td><td>g em \"gato\"</td></tr>\n<tr><td>Δ</td><td>δ</td><td>δέλτα (delta)</td><td>d em \"dado\"</td></tr>\n<tr><td>Ε</td><td>ε</td><td>ἒψιλόν (épsilon)</td><td>e breve em \"era\"</td></tr>\n<tr><td>Ζ</td><td>ζ</td><td>ζῆτα (zeta)</td><td>dz como em \"Edson\"</td></tr>\n<tr><td>Η</td><td>η</td><td>ἦτα (eta)</td><td>e longo em \"ênfase\"</td></tr>\n<tr><td>Θ</td><td>θ</td><td>θῆτα (theta)</td><td>th inglês em \"the\"</td></tr>\n<tr><td>Ι</td><td>ι</td><td>ἰῶτα (iota)</td><td>i em \"índio\"</td></tr>\n<tr><td>Κ</td><td>κ</td><td>κάππα (kapa)</td><td>k em \"casa\"</td></tr>\n<tr><td>Λ</td><td>λ</td><td>λάμβδα (lambda)</td><td>l em \"lua\"</td></tr>\n<tr><td>Μ</td><td>μ</td><td>μῦ (mi)</td><td>m em \"mar\"</td></tr>\n<tr><td>Ν</td><td>ν</td><td>νῦ (ni)</td><td>n em \"nada\"</td></tr>\n<tr><td>Ξ</td><td>ξ</td><td>ξῖ (xi)</td><td>x em \"táxi\"</td></tr>\n<tr><td>Ο</td><td>ο</td><td>ὄμικρόν (ômicron)</td><td>o breve</td></tr>\n<tr><td>Π</td><td>π</td><td>πῖ (pi)</td><td>p em \"pai\"</td></tr>\n<tr><td>Ρ</td><td>ρ</td><td>ῥῶ (rô)</td><td>r em \"rua\"</td></tr>\n<tr><td>Σ</td><td>σ/ς</td><td>σῖγμα (sigma)</td><td>s em \"sapo\"</td></tr>\n<tr><td>Τ</td><td>τ</td><td>ταῦ (tau)</td><td>t em \"tela\"</td></tr>\n<tr><td>Υ</td><td>υ</td><td>ὕψιλόν (ípsilon)</td><td>u francês</td></tr>\n<tr><td>Φ</td><td>φ</td><td>φῖ (fi)</td><td>f em \"fé\"</td></tr>\n<tr><td>Χ</td><td>χ</td><td>χῖ (qui)</td><td>ch alemão em \"Bach\"</td></tr>\n<tr><td>Ψ</td><td>ψ</td><td>ψῖ (psi)</td><td>ps em \"psicologia\"</td></tr>\n<tr><td>Ω</td><td>ω</td><td>ὦμέγα (ômega)</td><td>o longo</td></tr></table>\n<h3>Vogais e Ditongos</h3>\n<p>O grego tem <strong>7 vogais</strong>: α, ε, η, ι, ο, υ, ω. As vogais <span class=\"lw gk\">ε</span> e <span class=\"lw gk\">ο</span> são sempre <em>breves</em>; <span class=\"lw gk\">η</span> e <span class=\"lw gk\">ω</span> são sempre <em>longas</em>. Os ditongos mais comuns: αι, ει, οι, αυ, ευ, ου (pronuncia-se \"u\" como em \"lua\").</p>\n<div class=\"tip\">💡 <strong>Bergmann destaca:</strong> A distinção entre vogais longas e breves é essencial para entender os paradigmas verbais e nominais que virão nas lições seguintes.</div>\n<h3>Os Três Acentos</h3>\n<table><tr><th>Acento</th><th>Símbolo</th><th>Exemplo</th></tr>\n<tr><td>Agudo</td><td>´</td><td><span class=\"lw gk\">λόγος</span></td></tr>\n<tr><td>Grave</td><td>`</td><td><span class=\"lw gk\">τὸν λόγον</span></td></tr>\n<tr><td>Circunflexo</td><td>˜</td><td><span class=\"lw gk\">λῦσαι</span></td></tr></table>\n<h3>Os Espíritos</h3>\n<p>Toda vogal ou ditongo no início de uma palavra recebe um <em>espírito</em>. O <strong>espírito suave</strong> ( ᾿ ) não altera a pronúncia: <span class=\"lw gk\">ἀγάπη</span>. O <strong>espírito áspero</strong> ( ῾ ) acrescenta o som \"h\": <span class=\"lw gk\">ἁμαρτία</span> = hamartia.</p>\n<div class=\"warn\">⚠️ O ρ (rô) no início de palavra sempre recebe espírito áspero: <span class=\"lw gk\">ῥῆμα</span> (rhēma).</div>\n<p>Dobson recomenda: \"Aprenda o alfabeto cantando-o em ordem — maiúsculas e minúsculas juntas — até conseguir recitá-lo de cor em menos de 30 segundos.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#457b9d\"></span> Dobson, Aprenda o Grego do NT</span></p>\n<h3>Aplicação Exegética</h3>\n<p>Reconhecer o alfabeto permite identificar palavras gregas nas obras de referência. A palavra <span class=\"lw gk\">λόγος</span> (logos) em João 1.1 usa: Λ-ό-γ-ο-ς. Wallace destaca que λόγος carrega tanto o sentido hebraico de \"palavra de Deus\" quanto o filosófico grego de \"razão ordenadora\" — uma riqueza que só o texto original revela. <span class=\"cit\"><span class=\"citd\" style=\"background:#4a148c\"></span> Wallace, Sintaxe Exegética do NT</span></p>", "q": [{"q": "Quantas letras tem o alfabeto grego?", "opts": ["22", "24", "26", "28"], "c": 1, "ok": "Correto! O alfabeto grego possui exatamente 24 letras.", "bad": "O alfabeto grego tem 24 letras. (O hebraico tem 22; o latino tem 26.)"}, {"q": "Qual é o nome da letra <span style='font-family:serif;font-size:20px;color:#2d6a4f'>λ</span>?", "opts": ["Alfa", "Lamed", "Lambda", "Iota"], "c": 2, "ok": "Correto! λ chama-se Lambda e corresponde ao L.", "bad": "A letra λ chama-se Lambda. Lamed é a letra equivalente no hebraico."}, {"q": "As vogais <span style='font-family:serif;font-size:18px;color:#2d6a4f'>η</span> e <span style='font-family:serif;font-size:18px;color:#2d6a4f'>ω</span> são sempre:", "opts": ["Breves", "Longas", "Nasais", "Mudas"], "c": 1, "ok": "Correto! η (eta) e ω (ômega) são sempre vogais longas.", "bad": "η e ω são sempre longas. Já ε e ο são sempre breves. α, ι e υ podem ser breves ou longas."}, {"q": "O sigma tem forma especial <span style='font-family:serif;font-size:20px;color:#2d6a4f'>ς</span> quando aparece:", "opts": ["No início de palavra", "No meio de palavra", "No final de palavra", "Antes de consoante"], "c": 2, "ok": "Correto! O sigma final (ς) é usado apenas na última posição de uma palavra.", "bad": "O sigma usa ς apenas no final de palavras. Em qualquer outra posição, escreve-se σ."}, {"q": "O espírito áspero ( ῾ ) indica que a vogal deve ser pronunciada com:", "opts": ["Tom mais alto", "Som de 'h' antes da vogal", "Vogal longa", "Pausa antes"], "c": 1, "ok": "Correto! O espírito áspero acrescenta o som 'h' — ex.: ἁμαρτία = hamartia.", "bad": "O espírito áspero indica pronunciar 'h' antes da vogal. O espírito suave não altera a pronúncia."}, {"q": "O ditongo <span style='font-family:serif;font-size:20px;color:#2d6a4f'>ου</span> pronuncia-se como:", "opts": ["oi", "au", "u (como em lua)", "eu"], "c": 2, "ok": "Correto! ου pronuncia-se como 'u' longo, como em 'lua'.", "bad": "O ditongo ου pronuncia-se como o 'u' em 'lua'. É o ditongo mais frequente no NT."}, {"q": "Qual letra grega corresponde ao 'f' português?", "opts": ["π (pi)", "χ (qui)", "φ (fi)", "ψ (psi)"], "c": 2, "ok": "Correto! φ (fi) tem o som de 'f', como em φύλαξ (phúlax = guarda).", "bad": "φ (fi) é a letra com som de 'f'. π tem som de 'p'; χ tem som de 'ch' alemão; ψ tem som de 'ps'."}, {"q": "A palavra <span style='font-family:serif;font-size:18px;color:#2d6a4f'>Χριστός</span> começa com que letra e som?", "opts": ["K — som de 'k'", "X — som de 'x' português", "Χ — som de 'ch' como em Bach", "C — som de 'c'"], "c": 2, "ok": "Correto! Χ (qui) tem som de 'ch' alemão. Por isso transliteramos 'Christós' e não 'Kristós'.", "bad": "Χ (qui) tem som de 'ch' alemão (como em Bach), não de 'k' simples nem de 'x' português."}]}, "2": {"c": "<h3>Introdução ao Verbo Grego</h3>\n<p>O verbo grego é um dos sistemas mais ricos e precisos de toda a linguística. Para entendê-lo, é preciso abandonar a ideia de que \"tempo verbal = quando a ação acontece\" e abraçar o conceito central do grego: o <strong>aspecto verbal</strong>.</p>\n<h3>O Aspecto Verbal</h3>\n<p>O aspecto expressa a <em>qualidade</em> ou <em>tipo</em> da ação, não necessariamente o momento em que ela ocorreu. Bergmann identifica três aspectos fundamentais:</p>\n<table><tr><th>Aspecto</th><th>Símbolo</th><th>Descrição</th><th>Tempo verbal típico</th></tr>\n<tr><td><strong>Linear</strong></td><td>───</td><td>Ação contínua, em progresso</td><td>Presente, Imperfeito</td></tr>\n<tr><td><strong>Pontual</strong></td><td>●</td><td>Ação vista como um todo, pontual</td><td>Aoristo</td></tr>\n<tr><td><strong>Resultante</strong></td><td>●─</td><td>Ação passada com resultado presente</td><td>Perfeito</td></tr></table>\n<div class=\"tip\">💡 Wallace explica: \"O aspecto é a contribuição gramatical primária do tempo verbal grego. O tempo cronológico é secundário, especialmente no modo indicativo.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#4a148c\"></span> Wallace, Sintaxe Exegética do NT</span></div>\n<h3>Modo, Voz e Pessoa</h3>\n<p>O verbo grego expressa cinco categorias simultâneas: <strong>tempo/aspecto, modo, voz, pessoa e número</strong>. Uma única forma verbal pode conter toda uma frase em português.</p>\n<p>As <strong>três vozes</strong> fundamentais são:</p>\n<p>• <strong>Ativa</strong> — o sujeito pratica a ação: <span class=\"lw gk\">λύω</span> (eu desato)</p>\n<p>• <strong>Média</strong> — o sujeito pratica a ação em seu próprio interesse: <span class=\"lw gk\">λύομαι</span> (eu me desato / desato para mim)</p>\n<p>• <strong>Passiva</strong> — o sujeito recebe a ação: <span class=\"lw gk\">λύομαι</span> (eu sou desatado)</p>\n<div class=\"warn\">⚠️ No presente, as formas da voz média e passiva são idênticas. O contexto determina qual é.</div>\n<h3>Presente do Indicativo — Voz Ativa</h3>\n<p>O verbo modelo é <span class=\"lw gk\">λύω</span> (desatar). As desinências do presente ativo são:</p>\n<table><tr><th>Pessoa</th><th>Singular</th><th>Tradução</th><th>Plural</th><th>Tradução</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">λύ-ω</span></td><td>eu desato</td><td><span class=\"lw gk\">λύ-ομεν</span></td><td>nós desatamos</td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">λύ-εις</span></td><td>tu desatas</td><td><span class=\"lw gk\">λύ-ετε</span></td><td>vós desatais</td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">λύ-ει</span></td><td>ele/ela desata</td><td><span class=\"lw gk\">λύ-ουσι(ν)</span></td><td>eles/elas desatam</td></tr></table>\n<h3>Presente do Indicativo — Voz Média/Passiva</h3>\n<table><tr><th>Pessoa</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">λύ-ομαι</span></td><td><span class=\"lw gk\">λύ-ομεθα</span></td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">λύ-ῃ</span></td><td><span class=\"lw gk\">λύ-εσθε</span></td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">λύ-εται</span></td><td><span class=\"lw gk\">λύ-ονται</span></td></tr></table>\n<h3>O Verbo εἰμί (ser/estar)</h3>\n<p>O verbo <span class=\"lw gk\">εἰμί</span> é irregular e deve ser memorizado separadamente:</p>\n<table><tr><th>Pessoa</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">εἰμί</span> (sou)</td><td><span class=\"lw gk\">ἐσμέν</span> (somos)</td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">εἶ</span> (és)</td><td><span class=\"lw gk\">ἐστέ</span> (sois)</td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">ἐστί(ν)</span> (é)</td><td><span class=\"lw gk\">εἰσί(ν)</span> (são)</td></tr></table>\n<h3>Usos do Presente</h3>\n<p>O presente do indicativo pode expressar: (1) ação contínua no presente; (2) ação habitual; (3) fato geral (gnômico); (4) presente histórico (ação passada narrada com vivacidade); (5) presente futurístico.</p>\n<p>Rega & Bergmann chamam atenção: \"O presente histórico é muito frequente no Evangelho de Marcos — o autor usa o presente para dar vivacidade à narrativa, mesmo descrevendo eventos passados.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#1d3557\"></span> Rega & Bergmann, Noções do Grego Bíblico</span></p>\n<h3>Aplicação Exegética</h3>\n<p>Em João 10.27, Jesus usa o presente: <span class=\"lw gk\">τὰ πρόβατα τὰ ἐμὰ τῆς φωνῆς μου ἀκούουσιν</span> — \"as minhas ovelhas ouvem (<span class=\"lw gk\">ἀκούουσιν</span>, presente linear) a minha voz.\" O aspecto linear indica uma ação contínua e habitual — não um evento isolado, mas uma característica permanente das ovelhas do Bom Pastor.</p>", "q": [{"q": "O aspecto verbal LINEAR no grego indica:", "opts": ["Ação pontual e concluída", "Ação contínua em progresso", "Ação passada com resultado presente", "Ação futura"], "c": 1, "ok": "Correto! O aspecto linear (─── ) indica ação contínua, em progresso.", "bad": "O aspecto linear indica ação contínua (───). O pontual (●) indica ação vista como um todo; o resultante (●─) indica ação passada com resultado presente."}, {"q": "Qual é a forma correta de 'ele desata' no presente indicativo ativo?", "opts": ["λύω", "λύεις", "λύει", "λύομεν"], "c": 2, "ok": "Correto! λύει é a 3ª pessoa do singular do presente indicativo ativo.", "bad": "λύει é a 3ª pessoa singular (ele/ela desata). λύω = eu; λύεις = tu; λύομεν = nós."}, {"q": "No presente grego, as formas da voz média e passiva são:", "opts": ["Completamente diferentes", "Idênticas", "Diferentes apenas no plural", "Diferentes apenas na 1ª pessoa"], "c": 1, "ok": "Correto! No presente, média e passiva têm as mesmas desinências. O contexto determina o sentido.", "bad": "No presente, as formas da voz média e passiva são idênticas. Só o contexto permite distingui-las."}, {"q": "Como se diz 'nós desatamos' em grego?", "opts": ["λύετε", "λύομεν", "λύουσιν", "λύομαι"], "c": 1, "ok": "Correto! λύομεν é a 1ª pessoa do plural do presente indicativo ativo.", "bad": "λύομεν = nós desatamos (1ª pl.). λύετε = vós; λύουσιν = eles; λύομαι = eu sou desatado (passivo)."}, {"q": "Qual é a 3ª pessoa singular do verbo εἰμί (ser/estar)?", "opts": ["εἰμί", "εἶ", "ἐστί(ν)", "εἰσί(ν)"], "c": 2, "ok": "Correto! ἐστί(ν) significa 'é/está' — 3ª pessoa singular de εἰμί.", "bad": "ἐστί(ν) é a 3ª pessoa singular (é/está). εἰμί = eu sou; εἶ = tu és; εἰσί(ν) = eles são."}, {"q": "O 'presente histórico' em Marcos é usado para:", "opts": ["Indicar ação futura", "Narrar eventos passados com vivacidade", "Expressar uma lei geral", "Indicar ação habitual"], "c": 1, "ok": "Correto! O presente histórico narra eventos passados com vivacidade narrativa — muito comum em Marcos.", "bad": "O presente histórico usa o presente para dar vivacidade a narrativas de eventos passados. É um recurso estilístico frequente em Marcos."}, {"q": "O aspecto PONTUAL no grego é representado pelo símbolo:", "opts": ["───", "●", "●─", "↺"], "c": 1, "ok": "Correto! O símbolo ● representa o aspecto pontual — a ação vista como um ponto, sem detalhar sua duração.", "bad": "O aspecto pontual é representado por ●. O linear é ───; o resultante é ●─."}, {"q": "Em João 10.27, o uso do presente em ἀκούουσιν indica que as ovelhas ouvem a voz de Jesus:", "opts": ["Uma única vez, em momento específico", "De forma contínua e habitual", "No passado", "No futuro"], "c": 1, "ok": "Correto! O aspecto linear do presente indica ação contínua e habitual — uma característica permanente.", "bad": "O presente indicativo em ἀκούουσιν tem aspecto linear, indicando ação contínua e habitual, não pontual."}]}, "3": {"c": "<h3>O Modo Subjuntivo</h3>\n<p>Enquanto o indicativo afirma fatos reais e certos, o <strong>subjuntivo</strong> expressa o mundo da possibilidade, contingência, propósito e incerteza. Chamberlain define: \"O subjuntivo é o modo da possibilidade mental — ele não afirma que algo é, mas que algo pode ser, ou que se deseja que seja.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#6d4c41\"></span> Chamberlain, Gramática Exegética do Grego Neo-Testamentário</span></p>\n<h3>Formação do Presente do Subjuntivo</h3>\n<p>A característica formal do subjuntivo são as <strong>vogais longas</strong> nas desinências (ω/η em vez de ο/ε):</p>\n<h4>Voz Ativa</h4>\n<table><tr><th>Pessoa</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">λύ-ω</span></td><td><span class=\"lw gk\">λύ-ωμεν</span></td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">λύ-ῃς</span></td><td><span class=\"lw gk\">λύ-ητε</span></td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">λύ-ῃ</span></td><td><span class=\"lw gk\">λύ-ωσι(ν)</span></td></tr></table>\n<h4>Voz Média/Passiva</h4>\n<table><tr><th>Pessoa</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">λύ-ωμαι</span></td><td><span class=\"lw gk\">λύ-ώμεθα</span></td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">λύ-ῃ</span></td><td><span class=\"lw gk\">λύ-ησθε</span></td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">λύ-ηται</span></td><td><span class=\"lw gk\">λύ-ωνται</span></td></tr></table>\n<div class=\"warn\">⚠️ Note que a 1ª sg. ativa do subjuntivo (λύω) é idêntica à do indicativo presente. O contexto — especialmente a presença de partículas como ἵνα — é o que distingue os dois modos.</div>\n<h3>Principais Usos do Subjuntivo</h3>\n<p><strong>1. Oração de Propósito com ἵνα</strong> — exprime a finalidade de uma ação:</p>\n<p><span class=\"lw gk\">ἦλθον ἵνα ζωὴν ἔχωσιν</span> — \"vim <em>para que</em> tenham vida\" (Jo 10.10)</p>\n<p><strong>2. Exortativo (1ª pessoa plural)</strong> — convite à ação conjunta:</p>\n<p><span class=\"lw gk\">ἀγαπῶμεν ἀλλήλους</span> — \"<em>amemos</em> uns aos outros\" (1Jo 4.7)</p>\n<p><strong>3. Condicional com ἐάν (3ª classe)</strong> — condição possível:</p>\n<p><span class=\"lw gk\">ἐάν εἴπωμεν ὅτι ἁμαρτίαν οὐκ ἔχομεν</span> — \"<em>se dissermos</em> que não temos pecado\" (1Jo 1.8)</p>\n<p><strong>4. Proibição (μή + aoristo subjuntivo)</strong> — proibição de uma ação específica:</p>\n<p><span class=\"lw gk\">μὴ φοβηθῇς</span> — \"não temas!\" (Mt 1.20)</p>\n<div class=\"tip\">💡 Wallace observa que as orações com ἵνα no NT às vezes expressam resultado (ecbático), não apenas propósito: \"O uso de ἵνα se expandiu no grego do NT para além do sentido clássico de finalidade pura.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#4a148c\"></span> Wallace, Sintaxe Exegética do NT</span></div>\n<h3>A Partícula ἵνα</h3>\n<p><span class=\"lw gk\">ἵνα</span> é uma das conjunções mais frequentes do NT (663 ocorrências em João). Ela introduz quase sempre o subjuntivo e pode expressar: propósito (\"para que\"), resultado (\"de modo que\") ou conteúdo (\"que\").</p>\n<h3>Aplicação Exegética</h3>\n<p>João 20.31 é o versículo-chave para a teologia do quarto evangelho: <span class=\"lw gk\">ταῦτα δὲ γέγραπται ἵνα πιστεύητε ὅτι Ἰησοῦς ἐστιν ὁ Χριστός</span> — \"estas coisas foram escritas <em>para que</em> creiais que Jesus é o Cristo.\" O subjuntivo <span class=\"lw gk\">πιστεύητε</span> (presente, aspecto linear) indica uma crença contínua e progressiva — não apenas uma decisão pontual, mas uma fé que se desenvolve ao longo da leitura do evangelho.</p>", "q": [{"q": "Qual a principal característica formal do modo subjuntivo em grego?", "opts": ["Presença de aumento", "Vogais longas nas desinências", "Reduplicação", "Sufixo -σα-"], "c": 1, "ok": "Correto! O subjuntivo se caracteriza por vogais longas (ω/η) nas desinências.", "bad": "O subjuntivo se caracteriza por vogais longas (ω/η). O aumento é do imperfeito; a reduplicação é do perfeito; -σα- é do aoristo."}, {"q": "A partícula <span style='font-family:serif;font-size:18px;color:#2d6a4f'>ἵνα</span> introduz principalmente:", "opts": ["Indicativo", "Subjuntivo", "Optativo", "Imperativo"], "c": 1, "ok": "Correto! ἵνα quase sempre é seguida do subjuntivo.", "bad": "ἵνα é seguida do subjuntivo. É uma das construções mais frequentes do NT grego."}, {"q": "<span style='font-family:serif;font-size:18px;color:#2d6a4f'>μὴ φοβηθῇς</span> é um exemplo de:", "opts": ["Oração de propósito", "Subjuntivo exortativo", "Proibição pontual", "Oração condicional"], "c": 2, "ok": "Correto! μή + aoristo subjuntivo forma uma proibição pontual: 'não temas!'", "bad": "μή + aoristo subjuntivo = proibição pontual ('não faças isto uma vez'). μή + presente imperativo = proibição de ação contínua."}, {"q": "Em João 20.31, o subjuntivo <span style='font-family:serif;font-size:18px;color:#2d6a4f'>πιστεύητε</span> (presente) indica:", "opts": ["Crença pontual e única", "Crença contínua e progressiva", "Crença no passado", "Dúvida"], "c": 1, "ok": "Correto! O aspecto linear do presente subjuntivo indica fé contínua e progressiva.", "bad": "O presente subjuntivo tem aspecto linear — indica crença contínua. Se fosse aoristo, indicaria uma decisão pontual."}, {"q": "O subjuntivo exortativo usa a:", "opts": ["1ª pessoa singular", "2ª pessoa singular", "1ª pessoa plural", "3ª pessoa plural"], "c": 2, "ok": "Correto! O subjuntivo exortativo usa a 1ª pessoa plural: 'amemos', 'façamos'.", "bad": "O exortativo usa a 1ª pessoa plural — é um convite ao grupo. Ex.: ἀγαπῶμεν = 'amemos'."}, {"q": "Qual a diferença entre os modos indicativo e subjuntivo?", "opts": ["O indicativo é passado, o subjuntivo é futuro", "O indicativo afirma fatos reais; o subjuntivo expressa possibilidade/propósito", "O indicativo é ativo, o subjuntivo é passivo", "Não há diferença prática"], "c": 1, "ok": "Correto! O indicativo afirma realidade; o subjuntivo expressa o mundo da possibilidade, propósito e contingência.", "bad": "A diferença fundamental é modal: o indicativo afirma fatos reais; o subjuntivo expressa possibilidade, propósito e contingência."}, {"q": "A forma <span style='font-family:serif;font-size:18px;color:#2d6a4f'>λύωσιν</span> é:", "opts": ["1ª plural presente indicativo ativo", "3ª plural presente subjuntivo ativo", "2ª plural presente subjuntivo ativo", "3ª singular presente subjuntivo ativo"], "c": 1, "ok": "Correto! λύωσιν é a 3ª pessoa plural do presente subjuntivo ativo.", "bad": "λύωσιν = 3ª plural presente subjuntivo ativo. A vogal longa ω e a desinência -σιν caracterizam o subjuntivo plural."}, {"q": "<span style='font-family:serif;font-size:18px;color:#2d6a4f'>ἐάν</span> + subjuntivo forma uma oração condicional de:", "opts": ["1ª classe (condição assumida como real)", "2ª classe (condição contrária à realidade)", "3ª classe (condição possível)", "4ª classe (condição remota)"], "c": 2, "ok": "Correto! ἐάν + subjuntivo = 3ª classe — condição considerada possível.", "bad": "ἐάν + subjuntivo = 3ª classe condicional (condição possível). εἰ + indicativo = 1ª classe (assumida como real)."}]}, "4": {"c": "<h3>O Futuro do Indicativo</h3>\n<p>O futuro expressa uma ação que ainda não ocorreu no momento da fala. Sua formação é simples: insere-se a letra <span class=\"lw gk\">σ</span> (sigma) entre o radical do verbo e as desinências do presente.</p>\n<h3>Formação do Futuro Ativo e Médio</h3>\n<p>Fórmula: <strong>radical + σ + desinências do presente</strong></p>\n<table><tr><th>Pessoa</th><th>Ativo Sg.</th><th>Ativo Pl.</th><th>Médio Sg.</th><th>Médio Pl.</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">λύ-σ-ω</span></td><td><span class=\"lw gk\">λύ-σ-ομεν</span></td><td><span class=\"lw gk\">λύ-σ-ομαι</span></td><td><span class=\"lw gk\">λυ-σ-όμεθα</span></td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">λύ-σ-εις</span></td><td><span class=\"lw gk\">λύ-σ-ετε</span></td><td><span class=\"lw gk\">λύ-σ-ῃ</span></td><td><span class=\"lw gk\">λύ-σ-εσθε</span></td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">λύ-σ-ει</span></td><td><span class=\"lw gk\">λύ-σ-ουσι(ν)</span></td><td><span class=\"lw gk\">λύ-σ-εται</span></td><td><span class=\"lw gk\">λύ-σ-ονται</span></td></tr></table>\n<h3>Futuro Passivo</h3>\n<p>O futuro passivo tem formação diferente — usa o sufixo <span class=\"lw gk\">-θη-</span> seguido de <span class=\"lw gk\">-σ-</span> e as desinências médias:</p>\n<table><tr><th>Pessoa</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>1ª</td><td><span class=\"lw gk\">λυ-θή-σ-ομαι</span></td><td><span class=\"lw gk\">λυ-θη-σ-όμεθα</span></td></tr>\n<tr><td>2ª</td><td><span class=\"lw gk\">λυ-θή-σ-ῃ</span></td><td><span class=\"lw gk\">λυ-θή-σ-εσθε</span></td></tr>\n<tr><td>3ª</td><td><span class=\"lw gk\">λυ-θή-σ-εται</span></td><td><span class=\"lw gk\">λυ-θή-σ-ονται</span></td></tr></table>\n<div class=\"warn\">⚠️ Atenção às mudanças fonéticas: radicais terminados em consoante oclusiva sofrem alterações ao receber o σ do futuro. Ex.: κηρύσσω → κηρύξω (não κηρύσσσω).</div>\n<h3>Usos do Futuro</h3>\n<p><strong>1. Preditivo</strong> — o uso mais comum, prediz algo que acontecerá: <span class=\"lw gk\">γνώσεσθε τὴν ἀλήθειαν</span> (Jo 8.32 — \"conhecereis a verdade\").</p>\n<p><strong>2. Imperativo</strong> — exprime uma ordem com tom solene (frequente nas citações do AT): <span class=\"lw gk\">ἀγαπήσεις τὸν πλησίον σου</span> — \"amarás o teu próximo\" (Mt 22.39).</p>\n<p><strong>3. Gnômico</strong> — enuncia uma verdade geral.</p>\n<div class=\"tip\">💡 Dobson lembra: \"O futuro imperativo nas citações do Decálogo ('não matarás', 'não roubarás') tem um peso maior que um simples comando — é uma declaração da vontade divina com caráter permanente.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#457b9d\"></span> Dobson, Aprenda o Grego do NT</span></div>\n<h3>Aplicação Exegética</h3>\n<p>Em João 8.32, Jesus promete: <span class=\"lw gk\">ἡ ἀλήθεια ἐλευθερώσει ὑμᾶς</span> — \"a verdade vos libertará\". O futuro <span class=\"lw gk\">ἐλευθερώσει</span> é preditivo — uma promessa certa. Note que o sujeito é <span class=\"lw gk\">ἡ ἀλήθεια</span> (a verdade, com artigo definido), não qualquer verdade, mas A verdade revelada em Cristo (Jo 14.6).</p>", "q": [{"q": "Qual é o sinal característico do futuro grego?", "opts": ["ε- (aumento)", "σ (sigma) entre radical e desinência", "Reduplicação", "Sufixo -κ-"], "c": 1, "ok": "Correto! O σ (sigma) inserido entre o radical e as desinências é a marca do futuro.", "bad": "O futuro se forma inserindo σ entre o radical e as desinências. O aumento (ε-) é do imperfeito; a reduplicação é do perfeito; -κ- é do perfeito ativo."}, {"q": "Como se forma o futuro passivo?", "opts": ["Radical + σ + desinências ativas", "Radical + θη + σ + desinências médias", "Radical + desinências passivas", "Aumento + radical + θη"], "c": 1, "ok": "Correto! O futuro passivo usa o sufixo -θη- + σ + desinências médias.", "bad": "O futuro passivo = radical + θη + σ + desinências médias (λυθήσομαι). Não confundir com o aoristo passivo que usa θη sem o σ futuro."}, {"q": "'Amarás o teu próximo' (Mt 22.39) usa o futuro com valor:", "opts": ["Preditivo", "Imperativo", "Gnômico", "Potencial"], "c": 1, "ok": "Correto! O futuro imperativo nas citações do AT expressa a vontade divina com caráter solene e permanente.", "bad": "Este uso do futuro é imperativo — exprime uma ordem com peso solene, especialmente nas citações do AT como o Decálogo."}, {"q": "Qual a forma correta de 'ele desatará' no futuro ativo?", "opts": ["λύει", "λύσει", "λύσεται", "λυθήσεται"], "c": 1, "ok": "Correto! λύσει = ele desatará (3ª sg. futuro ativo).", "bad": "λύσει é o futuro ativo (ele desatará). λύει é o presente; λύσεται é o futuro médio; λυθήσεται é o futuro passivo."}, {"q": "Em João 8.32, <span style='font-family:serif;font-size:16px;color:#2d6a4f'>ἐλευθερώσει</span> é um futuro de que tipo?", "opts": ["Imperativo", "Gnômico", "Preditivo", "Potencial"], "c": 2, "ok": "Correto! É um futuro preditivo — uma promessa certa de Jesus sobre a libertação que a verdade traz.", "bad": "É um futuro preditivo — Jesus está fazendo uma promessa certa: 'a verdade VOS LIBERTARÁ'."}, {"q": "'Vós sereis desatados' em grego é:", "opts": ["λύσεσθε", "λυθήσεσθε", "λύεσθε", "λυθήσονται"], "c": 1, "ok": "Correto! λυθήσεσθε = 2ª plural do futuro passivo.", "bad": "λυθήσεσθε é o futuro passivo 2ª plural. O sufixo -θη- + σ caracteriza o futuro passivo."}, {"q": "O futuro de κηρύσσω (pregar) é:", "opts": ["κηρύσσσω", "κηρύσσω", "κηρύξω", "κηρύθσω"], "c": 2, "ok": "Correto! κηρύξω — o radical κηρυσσ- + σ se contraem para κηρύξω por mudança fonética.", "bad": "κηρύξω é o correto. Radicais terminados em consoante dupla sofrem alterações fonéticas ao receber o σ do futuro."}, {"q": "Qual a diferença principal entre futuro ativo e futuro médio?", "opts": ["O tempo em que ocorre", "A voz: ativo = sujeito pratica; médio = sujeito pratica em seu próprio interesse", "A pessoa verbal", "Não há diferença"], "c": 1, "ok": "Correto! No futuro médio, o sujeito pratica a ação com interesse próprio ou reflexivo.", "bad": "A diferença é de voz: ativo = sujeito pratica a ação; médio = sujeito pratica com interesse próprio."}]}, "5": {"c": "<h3>Os Casos Gregos</h3>\n<p>O grego usa um sistema de <strong>casos</strong> — desinências nominais que indicam a função sintática de cada palavra na frase. Isso significa que a ordem das palavras é muito mais flexível que em português. O grego tem 5 casos:</p>\n<table><tr><th>Caso</th><th>Função Principal</th><th>Pergunta</th></tr>\n<tr><td><strong>Nominativo</strong></td><td>Sujeito da frase</td><td>Quem pratica a ação?</td></tr>\n<tr><td><strong>Genitivo</strong></td><td>Posse, origem, separação</td><td>De quem? De quê?</td></tr>\n<tr><td><strong>Dativo</strong></td><td>Objeto indireto, instrumento, lugar</td><td>A quem? Para quem? Com quê?</td></tr>\n<tr><td><strong>Acusativo</strong></td><td>Objeto direto, extensão</td><td>A quem? O quê? (diretamente)</td></tr>\n<tr><td><strong>Vocativo</strong></td><td>Invocação direta</td><td>—</td></tr></table>\n<div class=\"tip\">💡 Wallace dedica mais de 100 páginas à sintaxe dos casos, demonstrando que cada caso tem múltiplos usos exegéticos. \"O nominativo é o caso da designação específica; os gregos o chamavam de 'o caso que denomina'.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#4a148c\"></span> Wallace, Sintaxe Exegética do NT</span></div>\n<h3>O Artigo Definido Grego</h3>\n<p>O artigo grego <span class=\"lw gk\">ὁ, ἡ, τό</span> (o, a, o) concorda em gênero, número e caso com o substantivo que acompanha. Diferente do português, o grego não tem artigo indefinido — sua ausência pode indicar indefinição ou ênfase na qualidade.</p>\n<h3>A 2.ª Declinação</h3>\n<p>A maioria dos substantivos masculinos e todos os neutros do NT pertencem à 2.ª declinação. O paradigma padrão é <span class=\"lw gk\">λόγος</span> (palavra, m.) e <span class=\"lw gk\">ἔργον</span> (obra, n.):</p>\n<table><tr><th>Caso</th><th>λόγος (m.)</th><th>Art. m.</th><th>ἔργον (n.)</th><th>Art. n.</th></tr>\n<tr><td>Nom. sg.</td><td><span class=\"lw gk\">λόγ-ος</span></td><td><span class=\"lw gk\">ὁ</span></td><td><span class=\"lw gk\">ἔργ-ον</span></td><td><span class=\"lw gk\">τό</span></td></tr>\n<tr><td>Gen. sg.</td><td><span class=\"lw gk\">λόγ-ου</span></td><td><span class=\"lw gk\">τοῦ</span></td><td><span class=\"lw gk\">ἔργ-ου</span></td><td><span class=\"lw gk\">τοῦ</span></td></tr>\n<tr><td>Dat. sg.</td><td><span class=\"lw gk\">λόγ-ῳ</span></td><td><span class=\"lw gk\">τῷ</span></td><td><span class=\"lw gk\">ἔργ-ῳ</span></td><td><span class=\"lw gk\">τῷ</span></td></tr>\n<tr><td>Acus. sg.</td><td><span class=\"lw gk\">λόγ-ον</span></td><td><span class=\"lw gk\">τόν</span></td><td><span class=\"lw gk\">ἔργ-ον</span></td><td><span class=\"lw gk\">τό</span></td></tr>\n<tr><td>Voc. sg.</td><td><span class=\"lw gk\">λόγ-ε</span></td><td>—</td><td><span class=\"lw gk\">ἔργ-ον</span></td><td>—</td></tr>\n<tr><td>Nom. pl.</td><td><span class=\"lw gk\">λόγ-οι</span></td><td><span class=\"lw gk\">οἱ</span></td><td><span class=\"lw gk\">ἔργ-α</span></td><td><span class=\"lw gk\">τά</span></td></tr>\n<tr><td>Gen. pl.</td><td><span class=\"lw gk\">λόγ-ων</span></td><td><span class=\"lw gk\">τῶν</span></td><td><span class=\"lw gk\">ἔργ-ων</span></td><td><span class=\"lw gk\">τῶν</span></td></tr>\n<tr><td>Dat. pl.</td><td><span class=\"lw gk\">λόγ-οις</span></td><td><span class=\"lw gk\">τοῖς</span></td><td><span class=\"lw gk\">ἔργ-οις</span></td><td><span class=\"lw gk\">τοῖς</span></td></tr>\n<tr><td>Acus. pl.</td><td><span class=\"lw gk\">λόγ-ους</span></td><td><span class=\"lw gk\">τούς</span></td><td><span class=\"lw gk\">ἔργ-α</span></td><td><span class=\"lw gk\">τά</span></td></tr></table>\n<div class=\"warn\">⚠️ Nos neutros, nominativo, acusativo e vocativo são sempre idênticos. No plural, terminam em -α.</div>\n<h3>Regra de Ouro dos Neutros</h3>\n<p>Sujeitos neutros plurais frequentemente usam verbo no singular: <span class=\"lw gk\">τὰ τέκνα παίζει</span> (as crianças brinca). Chamberlain chama isso de \"concordância neutra plural\" — importante para entender textos como Jo 10.29. <span class=\"cit\"><span class=\"citd\" style=\"background:#6d4c41\"></span> Chamberlain, Gramática Exegética</span></p>\n<h3>Aplicação Exegética</h3>\n<p>João 1.1 usa λόγος em três casos diferentes: <span class=\"lw gk\">Ἐν ἀρχῇ ἦν ὁ λόγος</span> (nom. — sujeito), <span class=\"lw gk\">καὶ ὁ λόγος ἦν πρὸς τὸν θεόν</span> (nom. sujeito; acus. após preposição), <span class=\"lw gk\">καὶ θεὸς ἦν ὁ λόγος</span> (nom. predicativo). Neste último, θεός sem artigo indica qualidade (\"o Verbo era de natureza divina\"), enquanto ὁ λόγος com artigo é o sujeito definido — argumento crucial contra a tradução das Testemunhas de Jeová.</p>", "q": [{"q": "Qual caso grego indica o sujeito da oração?", "opts": ["Genitivo", "Dativo", "Nominativo", "Acusativo"], "c": 2, "ok": "Correto! O nominativo é o caso do sujeito — quem pratica ou recebe a ação do verbo.", "bad": "O nominativo é o caso do sujeito. Genitivo = posse; dativo = objeto indireto; acusativo = objeto direto."}, {"q": "A desinência <span style='font-family:serif;font-size:18px;color:#2d6a4f'>-ου</span> no singular da 2ª declinação indica:", "opts": ["Nominativo", "Genitivo", "Dativo", "Acusativo"], "c": 1, "ok": "Correto! -ου é a desinência do genitivo singular da 2ª declinação: λόγ-ου = 'da palavra'.", "bad": "-ου é o genitivo singular: λόγου = 'da palavra'. -ος = nominativo; -ῳ = dativo; -ον = acusativo."}, {"q": "Nos substantivos neutros da 2ª declinação, quais casos têm forma idêntica?", "opts": ["Nominativo e genitivo", "Nominativo, acusativo e vocativo", "Dativo e acusativo", "Genitivo e dativo"], "c": 1, "ok": "Correto! Nos neutros, nominativo, acusativo e vocativo são sempre idênticos.", "bad": "Nos neutros, nominativo, acusativo e vocativo têm sempre a mesma forma — esta é a regra de ouro dos neutros."}, {"q": "Como se diz 'das palavras' (genitivo plural) em grego?", "opts": ["λόγοι", "λόγους", "λόγων", "λόγοις"], "c": 2, "ok": "Correto! λόγων é o genitivo plural da 2ª declinação.", "bad": "λόγων é o genitivo plural. -οι = nom. pl.; -ους = acus. pl.; -οις = dat. pl."}, {"q": "Em João 1.1, θεός aparece SEM artigo. Isso indica:", "opts": ["Que o Verbo não é Deus", "Que o Verbo é de natureza divina (qualidade)", "Erro de cópia", "Que θεός é sujeito"], "c": 1, "ok": "Correto! θεός sem artigo enfatiza a qualidade/natureza divina, não a identidade com o Pai.", "bad": "θεός sem artigo enfatiza qualidade: 'o Verbo era de natureza divina'. ὁ λόγος com artigo é o sujeito identificado."}, {"q": "Qual é a desinência do dativo plural da 2ª declinação?", "opts": ["-ων", "-οις", "-ους", "-οι"], "c": 1, "ok": "Correto! -οις é a desinência do dativo plural: λόγ-οις = 'para/com as palavras'.", "bad": "-οις é o dativo plural. -ων = genitivo pl.; -ους = acusativo pl.; -οι = nominativo pl."}, {"q": "O artigo grego <span style='font-family:serif;font-size:18px;color:#2d6a4f'>ὁ, ἡ, τό</span> concorda com o substantivo em:", "opts": ["Apenas gênero", "Apenas número", "Gênero, número e caso", "Apenas caso"], "c": 2, "ok": "Correto! O artigo grego concorda em gênero, número e caso com o substantivo.", "bad": "O artigo grego concorda em gênero, número E caso — três categorias simultâneas."}, {"q": "A 'regra de ouro dos neutros' estabelece que sujeitos neutros plurais usam verbo no:", "opts": ["Plural", "Singular", "Dual", "Depende do contexto"], "c": 1, "ok": "Correto! Sujeitos neutros plurais frequentemente usam verbo no singular em grego clássico e NT.", "bad": "Sujeitos neutros plurais usam verbo no singular — ex.: τὰ τέκνα παίζει ('as crianças brinca')."}]}, "6": {"c": "<h3>A Primeira Declinação</h3>\n<p>A 1ª declinação é composta principalmente por substantivos <strong>femininos</strong>, com alguns masculinos. O elemento caracterizador é a vogal <span class=\"lw gk\">α</span> (ou <span class=\"lw gk\">η</span>) nas desinências. Rega & Bergmann chamam-na de \"declinação alfa\". <span class=\"cit\"><span class=\"citd\" style=\"background:#1d3557\"></span> Rega & Bergmann, Noções do Grego Bíblico</span></p>\n<h3>Tipos de Femininos da 1ª Declinação</h3>\n<p>Há três tipos principais, determinados pela terminação do nominativo singular:</p>\n<table><tr><th>Tipo</th><th>Nom. sg.</th><th>Gen. sg.</th><th>Exemplo</th></tr>\n<tr><td>α puro (longo)</td><td>-α</td><td>-ας</td><td><span class=\"lw gk\">ἀγάπη... ἀγάπης</span> (não — este é η)</td></tr>\n<tr><td>α impuro</td><td>-α</td><td>-ης</td><td><span class=\"lw gk\">δόξα, δόξης</span></td></tr>\n<tr><td>η</td><td>-η</td><td>-ης</td><td><span class=\"lw gk\">ἀγάπη, ἀγάπης</span></td></tr></table>\n<h4>Paradigma — ἀγάπη (amor, f.)</h4>\n<table><tr><th>Caso</th><th>Singular</th><th>Art. f. sg.</th><th>Plural</th><th>Art. f. pl.</th></tr>\n<tr><td>Nom.</td><td><span class=\"lw gk\">ἀγάπ-η</span></td><td><span class=\"lw gk\">ἡ</span></td><td><span class=\"lw gk\">ἀγάπ-αι</span></td><td><span class=\"lw gk\">αἱ</span></td></tr>\n<tr><td>Gen.</td><td><span class=\"lw gk\">ἀγάπ-ης</span></td><td><span class=\"lw gk\">τῆς</span></td><td><span class=\"lw gk\">ἀγαπ-ῶν</span></td><td><span class=\"lw gk\">τῶν</span></td></tr>\n<tr><td>Dat.</td><td><span class=\"lw gk\">ἀγάπ-ῃ</span></td><td><span class=\"lw gk\">τῇ</span></td><td><span class=\"lw gk\">ἀγάπ-αις</span></td><td><span class=\"lw gk\">ταῖς</span></td></tr>\n<tr><td>Acus.</td><td><span class=\"lw gk\">ἀγάπ-ην</span></td><td><span class=\"lw gk\">τήν</span></td><td><span class=\"lw gk\">ἀγάπ-ας</span></td><td><span class=\"lw gk\">τάς</span></td></tr></table>\n<h4>Paradigma — δόξα (glória, f.)</h4>\n<table><tr><th>Caso</th><th>Singular</th><th>Plural</th></tr>\n<tr><td>Nom.</td><td><span class=\"lw gk\">δόξ-α</span></td><td><span class=\"lw gk\">δόξ-αι</span></td></tr>\n<tr><td>Gen.</td><td><span class=\"lw gk\">δόξ-ης</span></td><td><span class=\"lw gk\">δοξ-ῶν</span></td></tr>\n<tr><td>Dat.</td><td><span class=\"lw gk\">δόξ-ῃ</span></td><td><span class=\"lw gk\">δόξ-αις</span></td></tr>\n<tr><td>Acus.</td><td><span class=\"lw gk\">δόξ-αν</span></td><td><span class=\"lw gk\">δόξ-ας</span></td></tr></table>\n<h3>Masculinos da 1ª Declinação</h3>\n<p>Alguns substantivos masculinos seguem a 1ª declinação, com terminações em <span class=\"lw gk\">-ης</span> ou <span class=\"lw gk\">-ας</span> no nominativo singular:</p>\n<table><tr><th>Caso</th><th>προφήτης (profeta, m.)</th><th>μαθητής (discípulo, m.)</th></tr>\n<tr><td>Nom. sg.</td><td><span class=\"lw gk\">προφήτ-ης</span></td><td><span class=\"lw gk\">μαθητ-ής</span></td></tr>\n<tr><td>Gen. sg.</td><td><span class=\"lw gk\">προφήτ-ου</span></td><td><span class=\"lw gk\">μαθητ-οῦ</span></td></tr>\n<tr><td>Dat. sg.</td><td><span class=\"lw gk\">προφήτ-ῃ</span></td><td><span class=\"lw gk\">μαθητ-ῇ</span></td></tr>\n<tr><td>Acus. sg.</td><td><span class=\"lw gk\">προφήτ-ην</span></td><td><span class=\"lw gk\">μαθητ-ήν</span></td></tr>\n<tr><td>Voc. sg.</td><td><span class=\"lw gk\">προφῆτ-α</span></td><td><span class=\"lw gk\">μαθητ-ά</span></td></tr></table>\n<div class=\"warn\">⚠️ Os masculinos da 1ª declinação usam genitivo singular em -ου (como a 2ª declinação), não em -ης.</div>\n<div class=\"tip\">💡 Dobson recomenda memorizar: \"Todo substantivo grego precisa ser aprendido com seu artigo — este revela o gênero e, portanto, a declinação.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#457b9d\"></span> Dobson, Aprenda o Grego do NT</span></div>\n<h3>Aplicação Exegética</h3>\n<p>Em João 8.32, <span class=\"lw gk\">ἡ ἀλήθεια ἐλευθερώσει ὑμᾶς</span> — \"a verdade vos libertará\". <span class=\"lw gk\">ἀλήθεια</span> é nominativo singular da 1ª declinação — sujeito da frase. O artigo <span class=\"lw gk\">ἡ</span> a define como \"a verdade\" específica (a verdade revelada em Cristo), não qualquer verdade filosófica.</p>", "q": [{"q": "Qual vogal caracteriza as desinências da 1ª declinação grega?", "opts": ["ο", "α/η", "ε", "υ"], "c": 1, "ok": "Correto! A vogal α (ou η) é o elemento característico da 1ª declinação.", "bad": "A 1ª declinação se caracteriza por α/η nas desinências. A 2ª usa ο/ου; a 3ª tem radical consonantal."}, {"q": "A palavra <span style='font-family:serif;font-size:18px;color:#2d6a4f'>ἀγάπη</span> pertence a que declinação?", "opts": ["2ª declinação", "1ª declinação tipo η", "1ª declinação tipo α puro", "3ª declinação"], "c": 1, "ok": "Correto! ἀγάπη pertence à 1ª declinação, tipo η (nominativo em -η).", "bad": "ἀγάπη pertence à 1ª declinação tipo η — terminação -η no nominativo, -ης no genitivo."}, {"q": "O genitivo singular de <span style='font-family:serif;font-size:18px;color:#2d6a4f'>μαθητής</span> (discípulo) é:", "opts": ["μαθητής", "μαθητοῦ", "μαθητῆς", "μαθητήν"], "c": 1, "ok": "Correto! μαθητοῦ — os masculinos da 1ª declinação usam genitivo em -ου (como a 2ª declinação).", "bad": "μαθητοῦ é correto. Masculinos da 1ª declinação usam genitivo em -ου, não -ης."}, {"q": "O vocativo singular de <span style='font-family:serif;font-size:18px;color:#2d6a4f'>προφήτης</span> (profeta) é:", "opts": ["προφήτης", "προφήτου", "προφῆτα", "προφήτην"], "c": 2, "ok": "Correto! προφῆτα — o vocativo dos masculinos da 1ª declinação termina em -α.", "bad": "προφῆτα é o vocativo. Os masculinos da 1ª declinação têm vocativo em -α."}, {"q": "Como se diz 'das glórias' (genitivo plural) em grego?", "opts": ["δόξαι", "δόξαις", "δοξῶν", "δόξας"], "c": 2, "ok": "Correto! δοξῶν é o genitivo plural da 1ª declinação (contração de δοξά-ων → δοξῶν).", "bad": "δοξῶν é o genitivo plural. Todos os femininos da 1ª declinação têm genitivo plural em -ῶν (contração)."}, {"q": "Qual artigo feminino singular acompanha o nominativo da 1ª declinação?", "opts": ["ὁ", "ἡ", "τό", "οἱ"], "c": 1, "ok": "Correto! ἡ é o artigo feminino singular nominativo.", "bad": "ἡ é o artigo feminino sg. nominativo. ὁ = masc. sg.; τό = neutro sg.; οἱ = masc. pl."}, {"q": "Em João 8.32, <span style='font-family:serif;font-size:18px;color:#2d6a4f'>ἡ ἀλήθεια</span> está em que caso?", "opts": ["Genitivo", "Dativo", "Acusativo", "Nominativo"], "c": 3, "ok": "Correto! ἡ ἀλήθεια está no nominativo — é o sujeito da frase ('a verdade libertará').", "bad": "ἡ ἀλήθεια está no nominativo singular — é o sujeito da frase. O artigo ἡ confirma: feminino, singular, nominativo."}, {"q": "A 1ª declinação contém principalmente substantivos de que gênero?", "opts": ["Masculino", "Neutro", "Feminino", "Todos os gêneros igualmente"], "c": 2, "ok": "Correto! A 1ª declinação é predominantemente feminina, com poucos masculinos.", "bad": "A 1ª declinação é predominantemente feminina. Os masculinos são exceção (προφήτης, μαθητής etc.)."}]}, "7": {"c": "<h3>O Adjetivo Grego</h3>\n<p>O adjetivo grego <strong>concorda em gênero, número e caso</strong> com o substantivo que modifica. A maioria dos adjetivos do NT segue a declinação 2-1-2 (masc./neutro = 2ª declinação; fem. = 1ª declinação).</p>\n<h3>Paradigma — ἀγαθός (bom)</h3>\n<table><tr><th>Caso</th><th>Masc.</th><th>Fem.</th><th>Neutro</th></tr>\n<tr><td>Nom. sg.</td><td><span class=\"lw gk\">ἀγαθ-ός</span></td><td><span class=\"lw gk\">ἀγαθ-ή</span></td><td><span class=\"lw gk\">ἀγαθ-όν</span></td></tr>\n<tr><td>Gen. sg.</td><td><span class=\"lw gk\">ἀγαθ-οῦ</span></td><td><span class=\"lw gk\">ἀγαθ-ῆς</span></td><td><span class=\"lw gk\">ἀγαθ-οῦ</span></td></tr>\n<tr><td>Dat. sg.</td><td><span class=\"lw gk\">ἀγαθ-ῷ</span></td><td><span class=\"lw gk\">ἀγαθ-ῇ</span></td><td><span class=\"lw gk\">ἀγαθ-ῷ</span></td></tr>\n<tr><td>Acus. sg.</td><td><span class=\"lw gk\">ἀγαθ-όν</span></td><td><span class=\"lw gk\">ἀγαθ-ήν</span></td><td><span class=\"lw gk\">ἀγαθ-όν</span></td></tr>\n<tr><td>Nom. pl.</td><td><span class=\"lw gk\">ἀγαθ-οί</span></td><td><span class=\"lw gk\">ἀγαθ-αί</span></td><td><span class=\"lw gk\">ἀγαθ-ά</span></td></tr></table>\n<h3>Posição Atributiva vs. Predicativa</h3>\n<p>Esta é uma das distinções mais importantes da sintaxe nominal grega:</p>\n<p><strong>Posição atributiva</strong> — o adjetivo está DENTRO do grupo artigo-substantivo. Traduz-se como adjetivo qualificativo:</p>\n<p>• <span class=\"lw gk\">ὁ ἀγαθὸς λόγος</span> ou <span class=\"lw gk\">ὁ λόγος ὁ ἀγαθός</span> = \"a boa palavra\"</p>\n<p><strong>Posição predicativa</strong> — o adjetivo está FORA do grupo artigo-substantivo. Traduz-se como predicativo (implica o verbo \"ser\"):</p>\n<p>• <span class=\"lw gk\">ἀγαθὸς ὁ λόγος</span> ou <span class=\"lw gk\">ὁ λόγος ἀγαθός</span> = \"a palavra É boa\"</p>\n<div class=\"tip\">💡 Wallace destaca: \"Esta distinção é fundamental para exegese. Em 1 João 1.5 — <span class='lw gk'>ὁ θεὸς φῶς ἐστιν</span> — φῶς está em posição predicativa, afirmando que 'Deus É luz', não apenas que ele é 'o Deus luminoso'.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#4a148c\"></span> Wallace, Sintaxe Exegética do NT</span></div>\n<h3>Graus de Comparação</h3>\n<p><strong>Comparativo</strong> — sufixo <span class=\"lw gk\">-τερος/-τέρα/-τερον</span>:</p>\n<p><span class=\"lw gk\">ἀγαθός → ἀγαθώτερος</span> (mais bom = melhor)</p>\n<p><strong>Superlativo</strong> — sufixo <span class=\"lw gk\">-τατος/-τάτη/-τατον</span>:</p>\n<p><span class=\"lw gk\">ἀγαθός → ἀγαθώτατος</span> (o mais bom = ótimo)</p>\n<p>Adjetivos irregulares importantes:</p>\n<table><tr><th>Positivo</th><th>Comparativo</th><th>Superlativo</th></tr>\n<tr><td><span class=\"lw gk\">ἀγαθός</span> (bom)</td><td><span class=\"lw gk\">κρείττων/κρείσσων</span></td><td><span class=\"lw gk\">κράτιστος</span></td></tr>\n<tr><td><span class=\"lw gk\">κακός</span> (mau)</td><td><span class=\"lw gk\">χείρων</span></td><td><span class=\"lw gk\">χείριστος</span></td></tr>\n<tr><td><span class=\"lw gk\">μέγας</span> (grande)</td><td><span class=\"lw gk\">μείζων</span></td><td><span class=\"lw gk\">μέγιστος</span></td></tr>\n<tr><td><span class=\"lw gk\">μικρός</span> (pequeno)</td><td><span class=\"lw gk\">μικρότερος/ἐλάττων</span></td><td><span class=\"lw gk\">ἐλάχιστος</span></td></tr></table>\n<h3>Aplicação Exegética</h3>\n<p>Em Mateus 7.17, Jesus usa o adjetivo em posição atributiva: <span class=\"lw gk\">πᾶν δένδρον ἀγαθὸν καρποὺς καλοὺς ποιεῖ</span> — \"toda árvore boa produz frutos bons\". A concordância é perfeita: ἀγαθόν concorda com δένδρον (neutro, acusativo) e καλούς concorda com καρπούς (masculino, acusativo).</p>", "q": [{"q": "Em <span style='font-family:serif;font-size:16px;color:#2d6a4f'>ὁ ἀγαθὸς λόγος</span>, o adjetivo está em posição:", "opts": ["Predicativa", "Atributiva", "Substantivada", "Adverbial"], "c": 1, "ok": "Correto! Quando o adjetivo está dentro do grupo artigo-substantivo, está em posição atributiva.", "bad": "O adjetivo está em posição atributiva — dentro do grupo artigo-substantivo. Predicativa seria: ἀγαθὸς ὁ λόγος."}, {"q": "<span style='font-family:serif;font-size:16px;color:#2d6a4f'>ὁ λόγος ἀγαθός</span> significa:", "opts": ["A boa palavra", "A palavra é boa", "Boas palavras", "A palavra mais boa"], "c": 1, "ok": "Correto! Posição predicativa: o adjetivo fora do artigo implica o verbo ser — 'a palavra É boa'.", "bad": "Posição predicativa (adjetivo fora do artigo) implica o verbo ser: 'a palavra É boa', não 'a boa palavra'."}, {"q": "O comparativo de <span style='font-family:serif;font-size:16px;color:#2d6a4f'>μέγας</span> (grande) é:", "opts": ["μέγιστος", "μεγαλύτερος", "μείζων", "μεγάλτερος"], "c": 2, "ok": "Correto! μείζων é o comparativo irregular de μέγας — muito frequente no NT.", "bad": "μείζων é o comparativo irregular de μέγας. É muito usado no NT, especialmente em João."}, {"q": "O adjetivo grego concorda com o substantivo em:", "opts": ["Apenas gênero", "Apenas caso", "Gênero, número e caso", "Apenas número e caso"], "c": 2, "ok": "Correto! O adjetivo concorda em gênero, número e caso — três categorias simultâneas.", "bad": "O adjetivo concorda em gênero, número E caso com o substantivo que modifica."}, {"q": "Qual é o feminino de <span style='font-family:serif;font-size:16px;color:#2d6a4f'>ἀγαθός</span>?", "opts": ["ἀγαθόν", "ἀγαθή", "ἀγαθαί", "ἀγαθῆς"], "c": 1, "ok": "Correto! ἀγαθή é o feminino nominativo singular — segue a 1ª declinação.", "bad": "ἀγαθή é o feminino nom. sg. O masculino usa a 2ª declinação (-ος); o feminino usa a 1ª (-η)."}, {"q": "O superlativo grego se forma com o sufixo:", "opts": ["-τερος", "-τατος", "-ων", "-ιστος"], "c": 1, "ok": "Correto! -τατος/-τάτη/-τατον é o sufixo do superlativo regular.", "bad": "-τατος é o sufixo do superlativo regular. -τερος é do comparativo; -ων e -ιστος são irregulares."}, {"q": "Em Mt 7.17, <span style='font-family:serif;font-size:16px;color:#2d6a4f'>δένδρον ἀγαθόν</span> usa o neutro acusativo porque:", "opts": ["δένδρον é masculino", "O adjetivo sempre vai para o neutro", "δένδρον é neutro e está como objeto direto", "É regra especial para árvores"], "c": 2, "ok": "Correto! δένδρον é substantivo neutro em posição de objeto direto (acusativo), então ἀγαθόν também vai para o neutro acusativo.", "bad": "O adjetivo concorda com o substantivo: δένδρον é neutro acusativo, então ἀγαθόν também é neutro acusativo."}, {"q": "O comparativo irregular de <span style='font-family:serif;font-size:16px;color:#2d6a4f'>ἀγαθός</span> (bom) é:", "opts": ["ἀγαθώτερος", "κρείττων", "μείζων", "χείρων"], "c": 1, "ok": "Correto! κρείττων é o comparativo irregular de ἀγαθός — 'melhor'.", "bad": "κρείττων é o comparativo de ἀγαθός. μείζων é de μέγας; χείρων é de κακός."}]}, "8": {"c": "<h3>As Preposições Gregas</h3>\n<p>As preposições gregas regem casos específicos — este é um dos sistemas mais ricos do NT. Sousa observa: \"Cada preposição pode ter significados muito diferentes dependendo do caso que rege — estudar preposições sem estudar seus casos é estudar apenas metade do conteúdo.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#bf360c\"></span> Sousa, Gramática de Grego Koinê</span></p>\n<h3>Preposições com Um Caso</h3>\n<table><tr><th>Preposição</th><th>Caso</th><th>Sentido Principal</th><th>Exemplo NT</th></tr>\n<tr><td><span class=\"lw gk\">εἰς</span></td><td>Acusativo</td><td>para dentro, em direção a</td><td><span class=\"lw gk\">εἰς τὸν κόσμον</span> (no/para o mundo)</td></tr>\n<tr><td><span class=\"lw gk\">ἐκ / ἐξ</span></td><td>Genitivo</td><td>de dentro de, fora de, de</td><td><span class=\"lw gk\">ἐκ τοῦ θεοῦ</span> (de Deus)</td></tr>\n<tr><td><span class=\"lw gk\">ἐν</span></td><td>Dativo</td><td>em, dentro de, com, por</td><td><span class=\"lw gk\">ἐν Χριστῷ</span> (em Cristo)</td></tr>\n<tr><td><span class=\"lw gk\">πρό</span></td><td>Genitivo</td><td>antes de, diante de</td><td><span class=\"lw gk\">πρὸ τοῦ αἰῶνος</span> (antes dos séculos)</td></tr>\n<tr><td><span class=\"lw gk\">σύν</span></td><td>Dativo</td><td>junto com, em companhia de</td><td><span class=\"lw gk\">σὺν Χριστῷ</span> (com Cristo)</td></tr></table>\n<h3>Preposições com Dois Casos</h3>\n<table><tr><th>Preposição</th><th>Genitivo</th><th>Acusativo</th></tr>\n<tr><td><span class=\"lw gk\">διά</span></td><td>por meio de, através de</td><td>por causa de</td></tr>\n<tr><td><span class=\"lw gk\">κατά</span></td><td>contra, embaixo</td><td>segundo, conforme, ao longo de</td></tr>\n<tr><td><span class=\"lw gk\">μετά</span></td><td>com, em companhia de</td><td>depois de</td></tr>\n<tr><td><span class=\"lw gk\">περί</span></td><td>acerca de, sobre</td><td>ao redor de</td></tr>\n<tr><td><span class=\"lw gk\">ὑπό</span></td><td>pelo agente (voz passiva)</td><td>embaixo de</td></tr></table>\n<h3>Preposições com Três Casos</h3>\n<table><tr><th>Preposição</th><th>Genitivo</th><th>Dativo</th><th>Acusativo</th></tr>\n<tr><td><span class=\"lw gk\">ἐπί</span></td><td>sobre, no tempo de</td><td>sobre, em cima de</td><td>sobre (movimento)</td></tr>\n<tr><td><span class=\"lw gk\">παρά</span></td><td>de junto de (origem)</td><td>junto a, ao lado de</td><td>ao longo de, contra</td></tr>\n<tr><td><span class=\"lw gk\">πρός</span></td><td>de parte de</td><td>próximo a</td><td>para, em direção a, junto a</td></tr></table>\n<div class=\"tip\">💡 A preposição <span class=\"lw gk\">ἐν</span> é a mais frequente do NT (2.752 ocorrências). A fórmula <span class=\"lw gk\">ἐν Χριστῷ</span> (\"em Cristo\") ocorre 83 vezes em Paulo e expressa a união mística do crente com Cristo — Chamberlain chama-a de \"a preposição da espiritualidade paulina\". <span class=\"cit\"><span class=\"citd\" style=\"background:#6d4c41\"></span> Chamberlain, Gramática Exegética</span></div>\n<div class=\"warn\">⚠️ Elisão: ἐκ torna-se ἐξ antes de vogal. ἀπό torna-se ἀπ' ou ἀφ' antes de vogal.</div>\n<h3>Aplicação Exegética</h3>\n<p>João 14.6: <span class=\"lw gk\">ἐγώ εἰμι ἡ ὁδὸς καὶ ἡ ἀλήθεια καὶ ἡ ζωή· οὐδεὶς ἔρχεται πρὸς τὸν πατέρα εἰ μὴ δι᾿ ἐμοῦ</span>. Note: <span class=\"lw gk\">πρὸς τὸν πατέρα</span> (πρός + acusativo = em direção ao Pai) e <span class=\"lw gk\">δι᾿ ἐμοῦ</span> (διά + genitivo = por meio de mim). A preposição διά com genitivo indica o meio exclusivo de acesso ao Pai.</p>", "q": [{"q": "A preposição <span style='font-family:serif;font-size:18px;color:#2d6a4f'>ἐν</span> rege que caso?", "opts": ["Genitivo", "Acusativo", "Dativo", "Nominativo"], "c": 2, "ok": "Correto! ἐν rege sempre o dativo: ἐν Χριστῷ (em Cristo).", "bad": "ἐν rege o dativo. É a preposição mais frequente do NT com uma única regência."}, {"q": "<span style='font-family:serif;font-size:18px;color:#2d6a4f'>διά</span> + genitivo significa:", "opts": ["Por causa de", "Por meio de, através de", "Depois de", "Contra"], "c": 1, "ok": "Correto! διά + genitivo = por meio de, através de (indica o meio ou intermediário).", "bad": "διά + genitivo = por meio de. διά + acusativo = por causa de. A distinção de casos muda completamente o sentido!"}, {"q": "Em João 14.6, <span style='font-family:serif;font-size:18px;color:#2d6a4f'>πρὸς τὸν πατέρα</span> usa πρός com acusativo indicando:", "opts": ["Proximidade estática", "Movimento em direção ao Pai", "Origem junto ao Pai", "Companhia do Pai"], "c": 1, "ok": "Correto! πρός + acusativo indica movimento ou direção — 'em direção ao Pai'.", "bad": "πρός + acusativo indica direção/movimento: 'em direção ao Pai'. πρός + dativo indicaria proximidade estática."}, {"q": "Qual preposição é usada para indicar o agente na voz passiva?", "opts": ["ἐν", "εἰς", "ὑπό + genitivo", "διά + acusativo"], "c": 2, "ok": "Correto! ὑπό + genitivo indica o agente da ação passiva: 'foi batizado por João' (ὑπὸ Ἰωάννου).", "bad": "ὑπό + genitivo indica o agente da voz passiva. É o equivalente do 'por' na voz passiva portuguesa."}, {"q": "A fórmula paulina <span style='font-family:serif;font-size:18px;color:#2d6a4f'>ἐν Χριστῷ</span> usa ἐν com que caso?", "opts": ["Genitivo", "Acusativo", "Nominativo", "Dativo"], "c": 3, "ok": "Correto! ἐν sempre rege o dativo: Χριστῷ é o dativo de Χριστός.", "bad": "ἐν sempre rege o dativo. Χριστῷ é o dativo singular de Χριστός (Cristo)."}, {"q": "<span style='font-family:serif;font-size:18px;color:#2d6a4f'>μετά</span> + acusativo significa:", "opts": ["Com, em companhia de", "Depois de", "Por meio de", "Contra"], "c": 1, "ok": "Correto! μετά + acusativo = depois de (temporal ou sequencial).", "bad": "μετά + acusativo = depois de. μετά + genitivo = com, em companhia de. Casos diferentes, sentidos opostos!"}, {"q": "Antes de vogal, ἐκ (de) torna-se:", "opts": ["ἐκτ", "ἐξ", "ἐκς", "ἐκα"], "c": 1, "ok": "Correto! ἐκ torna-se ἐξ antes de vogal: ἐξ αὐτοῦ (dele).", "bad": "ἐκ torna-se ἐξ antes de vogal. Este fenômeno chama-se elisão."}, {"q": "Quantas ocorrências de <span style='font-family:serif;font-size:18px;color:#2d6a4f'>ἐν</span> há aproximadamente no NT?", "opts": ["Cerca de 200", "Cerca de 800", "Cerca de 2.700", "Cerca de 500"], "c": 2, "ok": "Correto! ἐν ocorre cerca de 2.752 vezes no NT — é a preposição mais frequente.", "bad": "ἐν ocorre cerca de 2.752 vezes — é a preposição mais frequente do NT grego."}]}, "9": {"c": "<h3>Os Pronomes Pessoais</h3>\n<p>O grego possui pronomes pessoais para todas as pessoas, com declinação completa. Nos verbos gregos, a pessoa já está indicada pela desinência — portanto, os pronomes pessoais são usados para <strong>ênfase</strong> ou <strong>contraste</strong>.</p>\n<table><tr><th>Caso</th><th>1ª sg.</th><th>2ª sg.</th><th>1ª pl.</th><th>2ª pl.</th></tr>\n<tr><td>Nom.</td><td><span class=\"lw gk\">ἐγώ</span></td><td><span class=\"lw gk\">σύ</span></td><td><span class=\"lw gk\">ἡμεῖς</span></td><td><span class=\"lw gk\">ὑμεῖς</span></td></tr>\n<tr><td>Gen.</td><td><span class=\"lw gk\">ἐμοῦ/μου</span></td><td><span class=\"lw gk\">σοῦ/σου</span></td><td><span class=\"lw gk\">ἡμῶν</span></td><td><span class=\"lw gk\">ὑμῶν</span></td></tr>\n<tr><td>Dat.</td><td><span class=\"lw gk\">ἐμοί/μοι</span></td><td><span class=\"lw gk\">σοί/σοι</span></td><td><span class=\"lw gk\">ἡμῖν</span></td><td><span class=\"lw gk\">ὑμῖν</span></td></tr>\n<tr><td>Acus.</td><td><span class=\"lw gk\">ἐμέ/με</span></td><td><span class=\"lw gk\">σέ/σε</span></td><td><span class=\"lw gk\">ἡμᾶς</span></td><td><span class=\"lw gk\">ὑμᾶς</span></td></tr></table>\n<div class=\"tip\">💡 As formas longas (ἐμοῦ, ἐμοί, ἐμέ) são <strong>enfáticas</strong>; as curtas (μου, μοι, με) são <strong>átonas</strong> (sem acento, sem ênfase). Ex.: <span class=\"lw gk\">ἀγαπᾷς με;</span> (normal) vs. <span class=\"lw gk\">σύ με ἀγαπᾷς;</span> (enfático — \"és TU que me amas?\").</div>\n<h3>O Pronome αὐτός (3ª Pessoa)</h3>\n<table><tr><th>Caso</th><th>Masc.</th><th>Fem.</th><th>Neutro</th></tr>\n<tr><td>Nom. sg.</td><td><span class=\"lw gk\">αὐτός</span></td><td><span class=\"lw gk\">αὐτή</span></td><td><span class=\"lw gk\">αὐτό</span></td></tr>\n<tr><td>Gen. sg.</td><td><span class=\"lw gk\">αὐτοῦ</span></td><td><span class=\"lw gk\">αὐτῆς</span></td><td><span class=\"lw gk\">αὐτοῦ</span></td></tr>\n<tr><td>Dat. sg.</td><td><span class=\"lw gk\">αὐτῷ</span></td><td><span class=\"lw gk\">αὐτῇ</span></td><td><span class=\"lw gk\">αὐτῷ</span></td></tr>\n<tr><td>Acus. sg.</td><td><span class=\"lw gk\">αὐτόν</span></td><td><span class=\"lw gk\">αὐτήν</span></td><td><span class=\"lw gk\">αὐτό</span></td></tr></table>\n<p>αὐτός tem três usos distintos: (1) <strong>pronome pessoal de 3ª pessoa</strong> (ele/ela/eles); (2) <strong>pronome intensivo</strong> = \"ele mesmo, ela mesma\"; (3) na posição atributiva = \"o mesmo\".</p>\n<h3>Pronomes Demonstrativos</h3>\n<table><tr><th>Caso</th><th>οὗτος (este) m.</th><th>αὕτη f.</th><th>τοῦτο n.</th><th>ἐκεῖνος (aquele) m.</th></tr>\n<tr><td>Nom. sg.</td><td><span class=\"lw gk\">οὗτος</span></td><td><span class=\"lw gk\">αὕτη</span></td><td><span class=\"lw gk\">τοῦτο</span></td><td><span class=\"lw gk\">ἐκεῖνος</span></td></tr>\n<tr><td>Gen. sg.</td><td><span class=\"lw gk\">τούτου</span></td><td><span class=\"lw gk\">ταύτης</span></td><td><span class=\"lw gk\">τούτου</span></td><td><span class=\"lw gk\">ἐκείνου</span></td></tr>\n<tr><td>Dat. sg.</td><td><span class=\"lw gk\">τούτῳ</span></td><td><span class=\"lw gk\">ταύτῃ</span></td><td><span class=\"lw gk\">τούτῳ</span></td><td><span class=\"lw gk\">ἐκείνῳ</span></td></tr>\n<tr><td>Acus. sg.</td><td><span class=\"lw gk\">τοῦτον</span></td><td><span class=\"lw gk\">ταύτην</span></td><td><span class=\"lw gk\">τοῦτο</span></td><td><span class=\"lw gk\">ἐκεῖνον</span></td></tr></table>\n<div class=\"warn\">⚠️ Os demonstrativos usam sempre a posição predicativa: <span class=\"lw gk\">οὗτος ὁ λόγος</span> ou <span class=\"lw gk\">ὁ λόγος οὗτος</span> = \"esta palavra\". Nunca entre artigo e substantivo.</div>\n<h3>O Pronome Relativo</h3>\n<p>O pronome relativo <span class=\"lw gk\">ὅς, ἥ, ὅ</span> (que, o qual) concorda em gênero e número com seu antecedente, mas seu caso é determinado pela função na oração relativa:</p>\n<p><span class=\"lw gk\">ὁ ἄνθρωπος <strong>ὃν</strong> εἶδον</span> — \"o homem <em>que</em> vi\" (ὃν = acus. porque é objeto de εἶδον)</p>\n<h3>Aplicação Exegética</h3>\n<p>João 3.16: <span class=\"lw gk\">οὕτως γὰρ ἠγάπησεν ὁ θεὸς τὸν κόσμον, ὥστε τὸν υἱὸν τὸν μονογενῆ ἔδωκεν</span>. O pronome demonstrativo <span class=\"lw gk\">οὕτως</span> (\"assim, desta forma\") aponta para a extensão do amor de Deus — não apenas \"que\" amou, mas \"desta forma extraordinária\" amou. Chamberlain: \"οὕτως aqui tem valor qualitativo, não apenas quantitativo.\" <span class=\"cit\"><span class=\"citd\" style=\"background:#6d4c41\"></span> Chamberlain, Gramática Exegética</span></p>", "q": [{"q": "Em grego, quando o pronome pessoal <span style='font-family:serif;font-size:16px;color:#2d6a4f'>ἐγώ</span> é expresso explicitamente (além da desinência verbal), indica:", "opts": ["Passado do verbo", "Ênfase ou contraste", "Voz passiva", "Plural"], "c": 1, "ok": "Correto! Expressar ἐγώ quando a desinência já indica a pessoa serve para ênfase ou contraste.", "bad": "Em grego, a desinência verbal já indica a pessoa. Usar ἐγώ explicitamente serve para ênfase ou contraste."}, {"q": "A forma <span style='font-family:serif;font-size:16px;color:#2d6a4f'>μου</span> é a forma ______ do pronome de 1ª pessoa singular:", "opts": ["Nominativa enfática", "Genitiva átona", "Dativa enfática", "Acusativa átona"], "c": 1, "ok": "Correto! μου é o genitivo átono (sem ênfase) de ἐγώ. A forma enfática é ἐμοῦ.", "bad": "μου é o genitivo átono de ἐγώ. As formas curtas (μου, μοι, με) são átonas; as longas (ἐμοῦ, ἐμοί, ἐμέ) são enfáticas."}, {"q": "αὐτός na posição atributiva (<span style='font-family:serif;font-size:16px;color:#2d6a4f'>ὁ αὐτὸς λόγος</span>) significa:", "opts": ["Ele mesmo disse", "O mesmo discurso", "Este discurso", "O discurso dele"], "c": 1, "ok": "Correto! αὐτός em posição atributiva (com artigo) = 'o mesmo'.", "bad": "αὐτός em posição atributiva = 'o mesmo'. Sem artigo = pronome de 3ª pessoa ou intensivo ('ele mesmo')."}, {"q": "O demonstrativo <span style='font-family:serif;font-size:16px;color:#2d6a4f'>ἐκεῖνος</span> indica:", "opts": ["Este (perto)", "Aquele (longe)", "O mesmo", "Tal"], "c": 1, "ok": "Correto! ἐκεῖνος indica o que está distante — 'aquele'. οὗτος indica o que está próximo — 'este'.", "bad": "ἐκεῖνος = 'aquele' (distante). οὗτος = 'este' (pr
